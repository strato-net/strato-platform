worker_processes 1;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 2;

    # Required for lua-resty-openidc
    lua_shared_dict discovery 1m;
    lua_shared_dict jwks 1m;
    lua_shared_dict introspection 10m;

    resolver 8.8.8.8;

    upstream strato_api {
        server host.docker.internal:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Increased body size for contract uploads
        client_max_body_size 50M;

        # OAuth2 callback endpoint
        location /oauth2/callback {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
        }

        # Swagger UI - protected by OAuth
        location /swagger-ui/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger JSON - protected by OAuth
        location /swagger.json {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints - protected by OAuth
        location /strato-api/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bloc API endpoints - protected by OAuth
        location /bloc/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Strato v2.3 endpoints - protected by OAuth
        location /strato/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/openid.lua;
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check - no authentication required
        location /health {
            proxy_pass http://strato_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root redirect to Swagger UI
        location = / {
            return 302 /swagger-ui/;
        }
    }
}

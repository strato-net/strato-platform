services:
  nginx-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strato-api-nginx
    ports:
      - "80:80"
    environment:
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-localhost}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-e4c811c5-d7f1-4e7a-a1fc-8480195e1f01}
      - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL:-https://keycloak.blockapps.net/auth/realms/mercata/.well-known/openid-configuration}
    restart: unless-stopped


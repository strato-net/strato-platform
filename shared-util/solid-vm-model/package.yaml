name: solid-vm-model

dependencies:
  - base

default-extensions:
  - BangPatterns
  - OverloadedStrings

library:
  source-dirs: src/
  dependencies:
  - attoparsec
  - binary
  - bytestring
  - deepseq
  - ethereum-rlp
  - format
  - hashable
  - scientific
  - strato-model
  - text

tests:
  storage-test:
    source-dirs: test/
    main: StorageTest.hs
    other-modules: []
    dependencies:
      - bytestring
      - ethereum-rlp
      - hspec
      - solid-vm-model
      - unliftio

benchmarks:
  storage-bench:
    source-dirs: bench/
    main: StorageBench.hs
    other-modules: []
    dependencies:
      - cereal
      - criterion
      - solid-vm-model

#stripe-ps-version:<VERSION>
#strato-getting-started-min-version:4.2.1
version: '3'
volumes:
  sqlitedb:
   driver: local
services:
  stripe-ps:
    environment:
    - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    - MARKETPLACE_URL=${MARKETPLACE_URL}
    build: .
    image: ${STRIPE_PS_IMAGE:-<REPO_URL>stripe-ps:<VERSION>}
    volumes:
    - sqlitedb:/usr/src/stripe-ps/db.sqlite
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
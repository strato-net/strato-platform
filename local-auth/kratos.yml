version: v1.3.0

dsn: postgres://postgres@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://localhost:8081/auth/kratos/
    cors:
      enabled: true
      allowed_origins:
        - "*"
    request_log:
      disable_for_health: true
  admin:
    base_url: http://localhost:4434/

cookies:
  domain: localhost
  path: /
  same_site: Lax

selfservice:
  default_browser_return_url: http://localhost:8081/auth/ui/
  
  flows:
    login:
      ui_url: http://localhost:8081/auth/ui/login
      lifespan: 10m
    
    registration:
      ui_url: http://localhost:8081/auth/ui/registration
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
    
    settings:
      ui_url: http://localhost:8081/auth/ui/settings
      privileged_session_max_age: 15m
    
    recovery:
      enabled: true
      ui_url: http://localhost:8081/auth/ui/recovery
      use: code
    
    verification:
      enabled: true
      ui_url: http://localhost:8081/auth/ui/verification
      use: code
    
    logout:
      after:
        default_browser_return_url: http://localhost:8081/auth/ui/login

  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false
        min_password_length: 8
        identifier_similarity_check_enabled: true
    
    totp:
      enabled: true
      config:
        issuer: STRATO
    
    lookup_secret:
      enabled: true

log:
  level: info
  format: text

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/identity.schema.json

session:
  lifespan: 24h
  cookie:
    same_site: Lax

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true

version: v2.2.0

dsn: postgres://postgres@postgres:5432/hydra?sslmode=disable

serve:
  public:
    cors:
      enabled: true
      allowed_origins:
        - "*"
  admin:
    host: 0.0.0.0
    port: 4445

urls:
  self:
    issuer: http://localhost:4444
  consent: http://localhost:3000/consent
  login: http://localhost:3000/login
  logout: http://localhost:3000/logout

secrets:
  system:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      salt: PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

strategies:
  access_token: jwt

oauth2:
  expose_internal_errors: true

log:
  level: info
  format: text

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m
  login_consent_request: 30m

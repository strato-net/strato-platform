#payment-server-version:<VERSION>
#strato-getting-started-min-version:4.5.0
version: '3'
volumes:
  paymentserverconfig:
    driver: local
services:
  payment-server:
    environment:
    - SERVER_HOST=${SERVER_HOST}
    - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - POSTGRES_SERVER_URL=${POSTGRES_SERVER_URL}
    - POSTGRES_PORT=${POSTGRES_PORT}
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_DBNAME=${POSTGRES_DBNAME}
    - STRATO_HOST=${STRATO_HOST}
    - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - OAUTH_SERVICE_OAUTH_FLOW=${OAUTH_SERVICE_OAUTH_FLOW}
    - SKIP_CONTRACT_VALIDATION=${SKIP_CONTRACT_VALIDATION}
    - SKIP_DEPLOYMENT=${SKIP_DEPLOYMENT}
    - BASE_CODE_COLLECTION=${BASE_CODE_COLLECTION}
    - METAMASK_CHECKOUT_ROUTE_VALUE=${METAMASK_CHECKOUT_ROUTE_VALUE}
    - METAMASK_CHECKOUT_TEXT_VALUE=${METAMASK_CHECKOUT_TEXT_VALUE}
    - METAMASK_IMAGE_URL_VALUE=${METAMASK_IMAGE_URL_VALUE}
    - METAMASK_ONBOARDING_ROUTE_VALUE=${METAMASK_ONBOARDING_ROUTE_VALUE}
    - METAMASK_ONBOARDING_STATUS_ROUTE_VALUE=${METAMASK_ONBOARDING_STATUS_ROUTE_VALUE}
    - METAMASK_ONBOARDING_TEXT_VALUE=${METAMASK_ONBOARDING_TEXT_VALUE}
    - METAMASK_ORDER_STATUS_ROUTE_VALUE=${METAMASK_ORDER_STATUS_ROUTE_VALUE}
    - METAMASK_PRIMARY_SALE_FEE_PERCENTAGE_VALUE=${METAMASK_PRIMARY_SALE_FEE_PERCENTAGE_VALUE}
    - METAMASK_SECONDARY_SALE_FEE_PERCENTAGE_VALUE=${METAMASK_SECONDARY_SALE_FEE_PERCENTAGE_VALUE}
    - METAMASK_SERVICE_NAME_VALUE=${METAMASK_SERVICE_NAME_VALUE}
    - REDEMPTIONS_CLOSE_REDEMPTION_ROUTE_VALUE=${REDEMPTIONS_CLOSE_REDEMPTION_ROUTE_VALUE}
    - REDEMPTIONS_CREATE_CUSTOMER_ADDRESS_ROUTE_VALUE=${REDEMPTIONS_CREATE_CUSTOMER_ADDRESS_ROUTE_VALUE}
    - REDEMPTIONS_CREATE_REDEMPTION_ROUTE_VALUE=${REDEMPTIONS_CREATE_REDEMPTION_ROUTE_VALUE}
    - REDEMPTIONS_GET_CUSTOMER_ADDRESS_ROUTE_VALUE=${REDEMPTIONS_GET_CUSTOMER_ADDRESS_ROUTE_VALUE}
    - REDEMPTIONS_GET_REDEMPTION_ROUTE_VALUE=${REDEMPTIONS_GET_REDEMPTION_ROUTE_VALUE}
    - REDEMPTIONS_IMAGE_URL_VALUE=${REDEMPTIONS_IMAGE_URL_VALUE}
    - REDEMPTIONS_INCOMING_REDEMPTIONS_ROUTE_VALUE=${REDEMPTIONS_INCOMING_REDEMPTIONS_ROUTE_VALUE}
    - REDEMPTIONS_OUTGOING_REDEMPTIONS_ROUTE_VALUE=${REDEMPTIONS_OUTGOING_REDEMPTIONS_ROUTE_VALUE}
    - REDEMPTIONS_REDEEM_TEXT_VALUE=${REDEMPTIONS_REDEEM_TEXT_VALUE}
    - REDEMPTIONS_SERVICE_NAME_VALUE=${REDEMPTIONS_SERVICE_NAME_VALUE}
    - STRIPE_CHECKOUT_ROUTE_VALUE=${STRIPE_CHECKOUT_ROUTE_VALUE}
    - STRIPE_CHECKOUT_TEXT_VALUE=${STRIPE_CHECKOUT_TEXT_VALUE}
    - STRIPE_IMAGE_URL_VALUE=${STRIPE_IMAGE_URL_VALUE}
    - STRIPE_ONBOARDING_ROUTE_VALUE=${STRIPE_ONBOARDING_ROUTE_VALUE}
    - STRIPE_ONBOARDING_STATUS_ROUTE_VALUE=${STRIPE_ONBOARDING_STATUS_ROUTE_VALUE}
    - STRIPE_ONBOARDING_TEXT_VALUE=${STRIPE_ONBOARDING_TEXT_VALUE}
    - STRIPE_ORDER_STATUS_ROUTE_VALUE=${STRIPE_ORDER_STATUS_ROUTE_VALUE}
    - STRIPE_PRIMARY_SALE_FEE_PERCENTAGE_VALUE=${STRIPE_PRIMARY_SALE_FEE_PERCENTAGE_VALUE}
    - STRIPE_SECONDARY_SALE_FEE_PERCENTAGE_VALUE=${STRIPE_SECONDARY_SALE_FEE_PERCENTAGE_VALUE}
    - STRIPE_SERVICE_NAME_VALUE=${STRIPE_SERVICE_NAME_VALUE}
    - UPGRADE_CONTRACTS=${UPGRADE_CONTRACTS}
    build: .
    image: ${PAYMENT_SERVER_IMAGE:-<REPO_URL>payment-server:<VERSION>}
    volumes:
       - paymentserverconfig:/config:rw
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - payment-server
    environment:
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    build: .
    image: ${PAYMENT_SERVER_NGINX_IMAGE:-<REPO_URL>payment-server-nginx:<VERSION>}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

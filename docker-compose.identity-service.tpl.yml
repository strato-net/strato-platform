#vault-version:<VERSION>
#strato-getting-started-min-version:4.2.1
version: "3"
services:
  identity-service:
    environment:
    - CLIENT_ID=${CLIENT_ID}
    - CLIENT_SECRET=${CLIENT_SECRET}
    - IDENTITYSERVICE_DEBUG=${IDENTITYSERVICE_DEBUG}
    - identityServicePort=${identityServicePort:-8014}
    - NODE_URL=${NODE_URL}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - USER_REGISTRY_ADDRESS=${USER_REGISTRY_ADDRESS}
    - USER_REGISTRY_CODEHASH=${USER_REGISTRY_CODEHASH}
    - USER_CONTRACT_NAME=${USER_CONTRACT_NAME}
    - PROCESS_MONITORING=${PROCESS_MONITORING}
    build: .
    image: ${IDENTTIYSERVICE_IMAGE:-<REPO_URL>identity-service:<VERSION>}
    restart: unless-stopped
    volumes: 
      - ./identity-service/certs:/identity-service/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - identity-service
    environment:
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - IDENTITY_PROVIDER_HOSTNAME=identity-service
    build: .
    image: ${IDENTITYNGINX_IMAGE:-<REPO_URL>identity-nginx:<VERSION>}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
#highway-version:<VERSION>
#strato-getting-started-min-version:4.2.1
version: "3"
services:
  highway-wrapper:
    environment:
    - EXT_STORAGE_S3_ACCESS_KEY_ID=${EXT_STORAGE_S3_ACCESS_KEY_ID}
    - EXT_STORAGE_S3_SECRET_ACCESS_KEY=${EXT_STORAGE_S3_SECRET_ACCESS_KEY}
    - EXT_STORAGE_S3_BUCKET=${EXT_STORAGE_S3_BUCKET}
    - minLogLevel=${minLogLevel}
    build: .
    image: ${HIGHWAYWRAPPER_IMAGE:-<REPO_URL>highway-wrapper:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - highway-wrapper
    environment:
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - HIGHWAY_WRAPPER_HOSTNAME=${HIGHWAY_WRAPPER_HOSTNAME}
    - HIGHWAY_PORT=${HIGHWAY_PORT}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    build: .
    image: ${HIGHWAYNGINX_IMAGE:-<REPO_URL>highway-nginx:<VERSION>}
    ports:
    - ${HTTP_PORT:-8080}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-8081}:443 #TAG_REMOVE_WHEN_NO_SSL
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

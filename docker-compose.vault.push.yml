version: "3"
volumes:
  vaultpgdata:
    driver: local
services:
  vault-wrapper:
    depends_on:
    - postgres
    environment:
    - keyStoreCacheTimeout=${keyStoreCacheTimeout:-60}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - postgres_vault_wrapper_db=oauth
    - VAULTWRAPPER_DEBUG=${VAULTWRAPPER_DEBUG}
    build: .
    image: ${VAULTWRAPPER_IMAGE:-vault-wrapper:pink}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  postgres:
    environment:
      - POSTGRES_PASSWORD=${postgres_password:-api}
    image: postgres:9.6
    volumes:
      - vaultpgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - vault-wrapper
    environment:
    - INITIAL_OAUTH_DISCOVERY_URL=${INITIAL_OAUTH_DISCOVERY_URL}
    - INITIAL_OAUTH_ISSUER=${INITIAL_OAUTH_ISSUER}
    - INITIAL_OAUTH_JWT_USERNAME_PROPERTY=${INITIAL_OAUTH_JWT_USERNAME_PROPERTY}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - VAULT_WRAPPER_HOST=${VAULT_WRAPPER_HOST}
    build: .
    image: ${VAULTNGINX_IMAGE:-vault-nginx:pink}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

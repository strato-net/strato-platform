name:                server
version:             0.1.0.0
github:              "githubuser/server"
license:             BSD3
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2018 Author name here"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/server#readme>

dependencies:
- base
- API
- text
- servant
- servant-server
- servant-client
- warp
- wai
- wai-extra
- wai-middleware-static
- monad-control >=1.0 && <1.1
- aeson
- ansi-wl-pprint
- base16-bytestring
- ethereum-rlp
- binary
- bytestring
# - cryptonite
- lens
- path-pieces
- memory
- nibblestring
- time
- QuickCheck
- deepseq
- byteable
- conduit 
- containers
- cryptohash
- mtl       
- murmur3   
- network   
- pbkdf     
- split     
- transformers
- largeword

library:
  source-dirs: src

executable:
  source-dirs: [src/, app/]
  main: Main.hs

tests:
  server-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - server

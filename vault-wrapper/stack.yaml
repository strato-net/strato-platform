# This file was automatically generated by 'stack init'
resolver: lts-12.4 #also duplicated in docker section below

packages:
- Strato/Strato23/api
- Strato/Strato23/client
- Strato/Strato23/server

extra-deps:
  - ../core-strato/blockapps-haskoin
  - ../core-strato/blockapps-milena
  - ../core-strato/blockapps-util
  - ../core-strato/ethereum-encryption
  - ../core-strato/strato-model
  - Crypto-4.2.5.1
  - ethereum-rlp-0.1.0
  - global-lock-0.1
  - hflags-0.4.3
  - murmur3-1.0.3
  - nibblestring-0.0.3
  - pbkdf-1.1.1.1
  - transformers-0.5.5.0

flags: {}

ghc-options:
  "$locals": -Wall -Werror

# Extra package databases containing global packages
extra-package-dbs: []

extra-include-dirs: [/usr/local/include]
extra-lib-dirs: [/usr/local/lib]

docker:
  enable: false
  image: "stack-vault-wrapper-buildbase:lts-12.4"
  set-user: true
  run-args: ["--ulimit=nofile=60000"]
  mount: ["/var/tmp/strato-platform/core-strato:/mnt/core-strato"]

resolver: lts-12.1 #also duplicated in docker section below
#compiler: ghc-8.0.2
compiler-check: newer-minor # remove?

packages:
- Strato/Strato23/API
- Strato/Strato23/client
- Strato/Strato23/server

extra-deps:
  - transformers-0.5.5.0

flags: {}

ghc-options:
  "$locals": -Wall -Werror

# Extra package databases containing global packages
extra-package-dbs: []

extra-include-dirs: [/usr/local/include]
extra-lib-dirs: [/usr/local/lib]

docker:
  enable: true
  image: "stack-oauth-buildbase:lts-12.1"
  set-user: true
  run-args: ["--ulimit=nofile=60000"]

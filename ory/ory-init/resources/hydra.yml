serve:
  cookies:
    same_site_mode: Lax

urls:
  self:
    issuer: https://${domainName}:8443
  consent: https://${domainName}:8443/ui/consent
  login: https://${domainName}:8443/ui/login
  logout: https://${domainName}:8443/ui/logout

secrets:
  system:
    - youReallyNeedToChangeThis

oidc:
  subject_identifiers:
    supported_types:
      - pairwise
      - public
    pairwise:
      salt: youReallyNeedToChangeThis

apiVersion: apps/v1
kind: Deployment
metadata:
  name: strato-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: strato-platform
  template:
    metadata:
      labels:
        app: strato-platform
    spec:
      containers:
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/smd:7.6.0
        name: smd
        env:
        - name: NODE_NAME
          value: "localhost"
        - name: NODE_HOST
          value: "localhost"
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/apex:7.6.0
        name: apex
        env:
        - name: NODE_HOST
          value: "localhost"
        - name: postgres_host
          value: "localhost"
        - name: postgres_password
          value: "api"
        - name: postgres_port
          value: "5432"
        - name: postgres_user
          value: "postgres"
        - name: prometheusHost
          value: "localhost:9090"
        - name: stratoHost
          value: "localhost:3000"
        - name: vaultWrapperHost
          value: "localhost:8000"
      - image: redis:3.2
        name: redis
        command:
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/strato:7.6.0
        name: strato
        ports:
          - containerPort: 30303
          - containerPort: 30303
            protocol: UDP
        env:
        - name: blockstanbul
          value: "true"
        - name: gasOn
          value: "false"
        - name: generateKey
          value: "true"
        - name: genesis
          value: "gettingStarted"
        - name: isAdmin
          value: "false"
        - name: isRootNode
          value: "false"
        - name: kafkaHost
          value: "localhost"
        - name: kafkaPort
          value: "9092"
        - name: mineBlocks
          value: "false"
        - name: network
          value: "blockappsnet"
        - name: networkID
          value: "unset - using default"
        - name: postgres_host
          value: "localhost"
        - name: postgres_password
          value: "api"
        - name: postgres_port
          value: "5432"
        - name: postgres_slipstream_db
          value: "cirrus"
        - name: postgres_user
          value: "postgres"
        - name: redisHost
          value: "localhost"
        - name: redisPort
          value: "6379"
        - name: splitinit
          value: "true"
        - name: stratoHost
          value: "localhost:3000"
        - name: vaultWrapperHost
          value: "localhost:8000"
        - name: zkHost
          value: "localhost"
        - name: indexEVM
          value: "false"
        - name: USE_OLD_STRATO_API
          value : "true"
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/postgrest:7.6.0
        name: postgrest
        env:
        - name: blocHost
          value: "localhost:3000"
        - name: PG_ENV_POSTGRES_DB
          value: "cirrus"
        - name: PG_ENV_POSTGRES_HOST
          value: "localhost"
        - name: PG_ENV_POSTGRES_PASSWORD
          value: "api"
        - name: PG_ENV_POSTGRES_USER
          value: "postgres"
        - name: PG_PORT_5432_TCP_PORT
          value: "5432"
        - name: POSTGREST_LOG_LEVEL
          value: "error"
      - image: postgres:9.6
        name: postgres
        command: ["docker-entrypoint.sh"]
        args: ["-c", "max_connections=300", "-c", "shared_buffers=512MB"]
        env:
        - name: POSTGRES_PASSWORD
          value: "api"
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/nginx:7.6.0
        name: nginx
        ports:
          - containerPort: 80
          - containerPort: 443
        env:
        - name: blockstanbul
          value: "true"
        - name: OAUTH_CLIENT_ID
          value: "dev"
        - name: OAUTH_CLIENT_SECRET
          value: "d5e67b8c-4fbf-42c6-a8d9-29a4dd13575f"
        - name: OAUTH_DISCOVERY_URL
          value: "https://keycloak.blockapps.net/auth/realms/strato-devel/.well-known/openid-configuration"
        - name: OAUTH_JWT_USERNAME_PROPERTY
          value: "not set (using default)"
        - name: OAUTH_SCOPE
          value: "not set (using default)"
        - name: APEX_HOST
          value: "localhost"
        - name: VAULT_WRAPPER_HOST
          value: "localhost"
      - image: wurstmeister/zookeeper:3.4.6
        name: zookeeper
      - image: wurstmeister/kafka:1.1.0
        name: kafka
        env:
        - name: KAFKA_ADVERTISED_HOST_NAME
          value: "localhost"
        - name: KAFKA_ADVERTISED_PORT
          value: "9092"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "localhost:2181"
        - name: KAFKA_DELETE_TOPIC_ENABLE
          value: "true"
        - name: KAFKA_LOG_CLEANER_ENABLE
          value: "false"
        - name: KAFKA_LOG_DIRS
          value: "/kafka/kafka-logs"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "2147483647"
        - name: KAFKA_OFFSET_METADATA_MAX_BYTES
          value: "1048576"
        - name: KAFKA_OFFSETS_RETENTION_MINUTES
          value: "2147483647"
        - name: KAFKA_MAX_REQUEST_SIZE
          value: "100663296"
        - name: KAFKA_MESSAGE_MAX_BYTES
          value: "100663296"
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/prometheus:7.6.0
        name: prometheus
        env:
        - name: NODE_HOST
          value: "localhost"
      - image: 406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/vault-wrapper:7.6.0
        name: vault-wrapper
        env:
        - name: keyStoreCacheTimeout
          value: "60"
        - name: postgres_host
          value: "localhost"
        - name: postgres_password
          value: "api"
        - name: postgres_port
          value: "5432"
        - name: postgres_user
          value: "postgres"
        - name: postgres_vault_wrapper_db
          value: "oauth"
        - name: VAULTWRAPPER_DEBUG
          value: "true"
      - image: swaggerapi/swagger-ui:v3.22.1
        name:  docs
        env:
        - name: API_URL
          value: "/strato-api/eth/v1.2/swagger.json"

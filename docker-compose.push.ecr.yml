#strato-version:8.1.0-bfaf852d9
#strato-getting-started-min-version:2.7
version: "3"
volumes:
  pgdata:
    driver: local
  prometheusdata:
    driver: local
  kafkadata:
    driver: local
  redisdata:
    driver: local
  stratodata:
    driver: local
  zookeeperdata:
    driver: local
services:
  smd:
    depends_on:
    - apex
    - postgrest
    - prometheus
    - strato
    environment:
    - NODE_HOST=${NODE_HOST}
    - NODE_NAME=${NODE_NAME}
    - ssl=${ssl:-false}
    build: .
    image: ${SMD_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/smd:8.1.0-bfaf852d9}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  apex:
    depends_on:
    - postgres
    - prometheus
    - strato
    - vault-wrapper
    environment:
    - NODE_HOST=${NODE_HOST}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - prometheusHost=prometheus:9090
    - STATS_ENABLED=${STATS_ENABLED}
    - STATS_DEBUG_CUSTOM_SERVER_URL=${STATS_DEBUG_CUSTOM_SERVER_URL}
    - STATS_SUBMIT_ENABLED=${STATS_SUBMIT_ENABLED}
    - STATS_SUBMIT_CONTRACT_TYPES_ENABLED=${STATS_SUBMIT_CONTRACT_TYPES_ENABLED}
    - stratoHost=strato:3000
    - vaultWrapperHost=vault-wrapper:8000
    build: .
    image: ${APEX_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/apex:8.1.0-bfaf852d9}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  redis:
    command: [redis-server, --appendonly, "yes"]
    image: redis:3.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - redisdata:/data
  vault-wrapper:
    depends_on:
    - postgres
    environment:
    - keyStoreCacheTimeout=${keyStoreCacheTimeout:-60}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - postgres_vault_wrapper_db=oauth
    - VAULTWRAPPER_DEBUG=${VAULTWRAPPER_DEBUG}
    build: .
    image: ${VAULTWRAPPER_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/vault-wrapper:8.1.0-bfaf852d9}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  strato:
    depends_on:
    - kafka
    - postgres
    - redis
    - vault-wrapper
    environment:
    - addBootnodes=${addBootnodes}
    - appFetchLimit=${appFetchLimit}
    - averageTxsPerBlock=${averageTxsPerBlock}
    - blockstanbul=${blockstanbul}
    - blockstanbulAdmins=${blockstanbulAdmins}
    - blockstanbulBlockPeriodMs=${blockstanbulBlockPeriodMs}
    - blockstanbulRoundPeriodS=${blockstanbulRoundPeriodS}
    - blockTime=${blockTime}
    - bootnode=${bootnode}
    - brokenRefundReenable=${brokenRefundReenable}
    - cacheTransactionResults=${cacheTransactionResults}
    - connectionTimeout=${connectionTimeout}
    - debugFail=${debugFail}
    - debugPort=${debugPort}
    - debugWSPort=${debugWSPort}
    - validatorBehavior=${validatorBehavior:-true}
    - evmDebugMode=${evmDebugMode}
    - evmTraceMode=${evmTraceMode}
    - extraFaucets=${extraFaucets}
    - faucetEnabled=${faucetEnabled}
    - gasOn=${gasOn:-false}
    - generateKey=${generateKey:-true}
    - genesis=${genesis}
    - genesisBlock=${genesisBlock}
    - isAdmin=${isAdmin:-false}
    - isRootNode=${isRootNode:-false}
    - kafkaHost=kafka
    - kafkaPort=9092
    - lazyBlocks=${lazyBlocks}
    - maxConn=${maxConn}
    - maxReturnedHeaders=${maxReturnedHeaders}
    - maxTxsPerBlock=${maxTxsPerBlock}
    - minBlockDifficulty=${minBlockDifficulty}
    - mineBlocks=${mineBlocks:-true}
    - miningAlgorithm=${miningAlgorithm}
    - miningThreads=${miningThreads}
    - network=${network:-blockappsnet}
    - networkID=${networkID}
    - numMinPeers=${numMinPeers}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_slipstream_db=cirrus
    - postgres_user=postgres
    - PROCESS_MONITORING=${PROCESS_MONITORING}
    - redisBDBNumber=${redisBDBNumber}
    - redisHost=redis
    - redisPort=6379
    - requireCerts=${requireCerts:-true}
    - seqDebugMode=${seqDebugMode}
    - seqEventsBatchSize=${seqEventsBatchSize}
    - seqEventsCostHeuristic=${seqEventsCostHeuristic}
    - seqMaxEventsPerIter=${seqMaxEventsPerIter}
    - seqMaxUsPerIter=${seqMaxUsPerIter}
    - seqRTSOPTs=${seqRTSOPTs}
    - SLIPSTREAM_DEBUG=${SLIPSTREAM_DEBUG}
    - SLIPSTREAM_OPTIONAL=${SLIPSTREAM_OPTIONAL}
    - splitinit=true
    - START_EXPERIMENTAL_STRATO_API=${START_EXPERIMENTAL_STRATO_API}
    - stratoHost=strato:3000
    - svmTrace=${svmTrace}
    - sqlDiff=${sqlDiff}
    - svmDev=${svmDev}
    - useSyncMode=${useSyncMode}
    - validators=${validators}
    - vaultWrapperHost=${vaultWrapperHost:-vault-wrapper:8000}
    - vmDebug=${vmDebug}
    - vmRunnerRTSOPTs=${vmRunnerRTSOPTs}
    - wireMessageCacheSize=${wireMessageCacheSize}
    - wsDebug=${wsDebug}
    - zkHost=zookeeper
    - EVM_COMPATIBLE=${EVM_COMPATIBLE}
    - indexEVM=${indexEVM:-false}
    build: .
    image: ${STRATO_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/strato:8.1.0-bfaf852d9}
    ports:
    - 30303:30303
    - 30303:30303/udp
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - stratodata:/var/lib/strato
  postgrest:
    depends_on:
    - postgres
    environment:
    - blocHost=${blocHost:-strato:3000}
    - PG_ENV_POSTGRES_DB=cirrus
    - PG_ENV_POSTGRES_HOST=postgres
    - PG_ENV_POSTGRES_PASSWORD=${postgres_password:-api}
    - PG_ENV_POSTGRES_USER=postgres
    - PG_PORT_5432_TCP_PORT=5432
    - POSTGREST_LOG_LEVEL=${POSTGREST_LOG_LEVEL:-error}
    build: .
    image: ${POSTGREST_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/postgrest:8.1.0-bfaf852d9}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  postgres:
    environment:
      - POSTGRES_PASSWORD=${postgres_password:-api}
    image: postgres:9.6
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - apex
    - docs
    - postgrest
    - prometheus
    - smd
    - strato
    - vault-wrapper
    environment:
    - APEX_HOST=${APEX_HOST}
    - blockstanbul=${blockstanbul}
    - blockTime=${blockTime}
    - debugPort=${debugPort}
    - debugWSPort=${debugWSPort}
    - DOCS_HOST=${DOCS_HOST}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_JWT_USERNAME_PROPERTY=${OAUTH_JWT_USERNAME_PROPERTY}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - POSTGREST_HOST=${POSTGREST_HOST}
    - PROMETHEUS_HOST=${PROMETHEUS_HOST}
    - SERVE_LOGS=${SERVE_LOGS}
    - SMD_DEV_MODE=${SMD_DEV_MODE}
    - SMD_DEV_MODE_HOST_IP=${SMD_DEV_MODE_HOST_IP}
    - SMD_HOST=${SMD_HOST}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - START_EXPERIMENTAL_STRATO_API=${START_EXPERIMENTAL_STRATO_API}
    - STATS_ENABLED=${STATS_ENABLED}
    - STRATO_HOSTNAME=${STRATO_HOSTNAME}
    - STRATO_PORT_API=${STRATO_PORT_API}
    - STRATO_PORT_API2=${STRATO_PORT_API2}
    - STRATO_PORT_LOGS=${STRATO_PORT_LOGS}
    - STRATO_PORT_BLOCKSTANBUL_VOTE=${STRATO_PORT_BLOCKSTANBUL_VOTE}
    - VAULT_WRAPPER_HOST=${VAULT_WRAPPER_HOST}
    - vmDebug=${vmDebug}
    build: .
    image: ${NGINX_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/nginx:8.1.0-bfaf852d9}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  docs:
    environment:
    - API_URL=/strato-api/eth/v1.2/swagger.json
    image: swaggerapi/swagger-ui:v3.22.1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  zookeeper:
    image: wurstmeister/zookeeper:3.4.6
    restart: unless-stopped
    volumes:
      - zookeeperdata:/opt/zookeeper-3.4.6/data
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  kafka:
    depends_on:
    - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LOG_DIRS: '/kafka/kafka-logs'
      KAFKA_LOG_RETENTION_HOURS: 2147483647
      KAFKA_OFFSET_METADATA_MAX_BYTES: 1048576
      KAFKA_OFFSETS_RETENTION_MINUTES: 2147483647
      KAFKA_MAX_REQUEST_SIZE: ${KAFKA_MAX_REQUEST_SIZE:-100663296}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-100663296}
    image: wurstmeister/kafka:1.1.0
    restart: unless-stopped
    volumes:
    - kafkadata:/kafka
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  prometheus:
    build: .
    environment:
      - NODE_HOST=${NODE_HOST}
    image: ${PROMETHEUS_IMAGE:-406773134706.dkr.ecr.us-east-1.amazonaws.com/strato/prometheus:8.1.0-bfaf852d9}
    volumes:
    - prometheusdata:/prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

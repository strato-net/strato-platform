user root;
worker_processes  1;

error_log  /usr/local/openresty/nginx/logs/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 10000;
}

http {
    include       mime.types;

    default_type  application/octet-stream;

    real_ip_recursive on;
    real_ip_header X-Forwarded-For;
    # Set the CIDRs of the trusted proxy if you run your node behind one. Allowing all IPs is a security risk (attacker can spoof IPs by setting a random one in X-Forwarded-For).
    # Cloudflare CIDRs below: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    
    # Custom CIDRs can be added with NGINX_TRUST_PROXY_CIDRS
__TRUST_PROXY_CIDRS__

    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"msec":"$msec",'
        '"remote_addr":"$remote_addr",'
        '"X-Forwarded-For":"$http_x_forwarded_for",'
        '"CF-Connecting-IP":"$http_cf_connecting_ip",'
        '"request_method":"$request_method",'
        '"request":"$request",'
        '"status": "$status",'
        '"request_time":"$request_time",'
        '"request_length":"$request_length",'
        '"bytes_sent":"$bytes_sent",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referrer":"$http_referer",'
        '"remote_user":"$remote_user",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time"'
      '}';

    map $request_uri $loggable {
        default   1;
        /metrics  0;
        /_ping    0;
    }

    access_log  /usr/local/openresty/nginx/logs/access.log  json_combined if=$loggable;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict  discovery 1m;
    lua_shared_dict  jwks 1m;
    lua_shared_dict introspection 10m;
    lua_shared_dict prometheus_metrics 10M;
    lua_shared_dict csrf_tokens 10M;
    init_by_lua '
      prometheus = require("prometheus").init("prometheus_metrics")
      metric_requests = prometheus:counter(
        "nginx_http_requests_total", "Number of HTTP requests", {"host", "status"})
      metric_latency = prometheus:histogram(
        "nginx_http_request_duration_seconds", "HTTP request latency", {"host"})
      metric_connections = prometheus:gauge(
        "nginx_http_connections", "Number of HTTP connections", {"state"})
      
      -- Initialize CSRF Protection Module
      csrf = require("csrf")
      csrf.init(ngx.shared.csrf_tokens)
    ';
    log_by_lua '
      metric_requests:inc(1, {ngx.var.server_name, ngx.var.status})
      metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.server_name})
    ';

    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;         #TEMPLATE_MARK_SSL
    lua_ssl_verify_depth 5;                                                 #TEMPLATE_MARK_SSL

    client_body_buffer_size 64K;
    client_header_buffer_size 16k;
    client_max_body_size 4M;

    absolute_redirect off;

    # Exclude the docker network CIDR from rate limiting (e.g. for mercata-backend calls to nginx)
    geo $bypass_limit {
      default   0;
      __DOCKER_NETWORK_CIDR__   1;
    }
    map $bypass_limit $limit_req_key {
        1   "";
        default   $binary_remote_addr;
    }

    limit_req_zone $limit_req_key zone=server:10m rate=80r/s; # E.g. allows 8 calls within 10ms
    limit_req_status 429;

    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=strato_short_term_cache:1m max_size=5m inactive=1s use_temp_path=off;

    server {
      listen 80;
      listen 443 ssl;                                                       #TEMPLATE_MARK_SSL

      ssl_certificate    /etc/ssl/certs/server.<SSL_CERT_FILE_TYPE>;        #TEMPLATE_MARK_SSL
      ssl_certificate_key  /etc/ssl/private/server.key;                     #TEMPLATE_MARK_SSL
                                                                            #TEMPLATE_MARK_SSL
      # Restrict older SSL and TLS versions for better security             #TEMPLATE_MARK_SSL
      ssl_protocols TLSv1.2 TLSv1.3;                                        #TEMPLATE_MARK_SSL
                                                                            #TEMPLATE_MARK_SSL
      # Redirect http traffic to https, except internal calls to 'nginx'    #TEMPLATE_MARK_SSL
      set $RWHTTPS "";                                                      #TEMPLATE_MARK_SSL
      if ($ssl_protocol = "") {                                             #TEMPLATE_MARK_SSL
        set $RWHTTPS "Y";                                                   #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL
      if ($host = "nginx") {                                                #TEMPLATE_MARK_SSL
        set $RWHTTPS "";                                                    #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL
      if ($RWHTTPS = "Y") {                                                 #TEMPLATE_MARK_SSL
        rewrite ^ https://$host$request_uri? permanent;                     #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL

      set $session_name   strato_session;
      set $ssl_session_tickets off;
      set $session_check_ssi off;
      set $session_cookie_persistent on;
      set $session_cookie_renew 600;
      set $session_cookie_lifetime 259200; # 3 days for "SSO Session Idle Remember Me" case in OAuth2
      resolver 127.0.0.11 8.8.8.8 ipv6=off;

      limit_req zone=server burst=100; # E.g. adds minor delays when exceeding 8 calls within 10ms

      large_client_header_buffers 4 16k;

       # Global Security Headers - Applied to all responses
       add_header X-Frame-Options 'DENY' always;
       add_header X-Content-Type-Options 'nosniff' always;
       add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
       # Restrictive global CSP - maximum security for most routes
       add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

      set $is_ui "false";
      set $allow_optional_anon_access "false";

      location /metrics {
        content_by_lua '
          metric_connections:set(ngx.var.connections_reading, {"reading"})
          metric_connections:set(ngx.var.connections_waiting, {"waiting"})
          metric_connections:set(ngx.var.connections_writing, {"writing"})
          prometheus:collect()
        ';
      }

      location /_ping {
        return 200 'pong';
      }

      location /auth/openidc/return {
        access_by_lua_file  lua/openid.lua;
      }

      location /auth/logout {
        # Clear CSRF token from shared memory AND cookie on logout
        rewrite_by_lua_block {
          local session_id = ngx.var.cookie_strato_session
          if session_id and csrf and csrf.csrf_tokens then
            -- Delete token from shared memory so it wont be regenerated during logout
            csrf.csrf_tokens:delete(session_id)
            ngx.log(ngx.INFO, "CSRF: Deleted token for session on logout")
          end
          -- Clear the cookie (conditional Secure flag based on HTTPS)
          local clear_cookie = "CSRF-TOKEN=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Strict"
          if ngx.var.https == "on" then
            clear_cookie = clear_cookie .. "; Secure"
          end
          ngx.header["Set-Cookie"] = clear_cookie
        }
        access_by_lua_file  lua/openid.lua;
      }

      location / {
        set $is_ui "true";
        rewrite_by_lua_file lua/csrf.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        # Permissive CSP for Mercata UI - allows external resources and inline styles
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://tools.luckyorange.com https://js.stripe.com https://crypto-js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://fileserver.mercata.blockapps.net https://fileserver.strato.nexus data: https:; font-src 'self'; connect-src 'self' ws: wss: http: https:; frame-src https://js.stripe.com https://crypto-js.stripe.com; manifest-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://mercata-ui:8080/;
      }

      location /login {
        set $is_ui "true";
        rewrite_by_lua_file  lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        access_by_lua_block {
          local destination = "/dashboard"
          local return_to = ngx.var.arg_returnTo
          if return_to then
            return_to = ngx.unescape_uri(return_to)
            -- Validate to prevent open redirects and header injection
            if return_to:sub(1, 1) == "/"
                and return_to:sub(1, 2) ~= "//"
                and not return_to:find("://", 1, true)
                and not return_to:find("[\r\n]")
            then
              destination = return_to
            else
              ngx.log(ngx.WARN, "Invalid returnTo parameter rejected: ", return_to)
            end
          end
          return ngx.redirect(destination, 302)
        }
      }
 
      location /api/v1 {
       return 410;
      }

      location /api/ {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        set $allow_optional_anon_access "true";
        proxy_set_header Accept-Encoding "";
        proxy_pass http://mercata-backend:3001$request_uri;
        client_max_body_size 1m;
      }
      
      location = /api/onramp/webhook {
        rewrite_by_lua_file lua/csrf.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://mercata-backend:3001$request_uri;
        client_max_body_size 1m;
      }

      # Enforce the authentication flow when accessing the Mercata API swagger docs
      location /api/docs {
        set $is_ui "true";
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://mercata-backend:3001$request_uri;
        client_max_body_size 1m;
      }

      location /sockjs-node {                                               #TEMPLATE_SMD_DEV_MODE
        proxy_set_header Upgrade $http_upgrade;                             #TEMPLATE_SMD_DEV_MODE
        proxy_set_header Connection "upgrade";                              #TEMPLATE_SMD_DEV_MODE
        proxy_http_version 1.1;                                             #TEMPLATE_SMD_DEV_MODE
        proxy_pass http://<SMD_DEV_MODE_HOST_IP>:3002/sockjs-node;          #TEMPLATE_SMD_DEV_MODE
      }                                                                     #TEMPLATE_SMD_DEV_MODE

      location = /favicon.ico {
        proxy_pass http://__SMD_HOST__/favicon.ico;
      }

      # This solves the issue with oauth reauthorization when SMD is refreshed after getting 401 Unauthorized in any API response; merge favicon locations when served as static file;
      location = /smd/favicon.ico {
        proxy_pass http://__SMD_HOST__/favicon.ico;
      }

      location = /smd {
        return 302 /smd/;
      }

      # Allow manifest.json without authentication
      location = /smd/manifest.json {
        proxy_pass http://__SMD_HOST__/manifest.json;
      }

      location /smd/ {
        set $is_ui "true";
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file  lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__SMD_HOST__/;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' ws: wss: http: https:; manifest-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
      }

      location = /apex-api {
        return 302 /apex-api/;
      }

      # Publicly available node health endpoint
      location /health {
        proxy_cache strato_short_term_cache;
        proxy_cache_valid any 1s;
        proxy_pass http://__APEX_HOST__/health;
      }

      # CSRF token initialization endpoint
      # Used by frontends (especially Swagger UI) to ensure CSRF token is generated
      # before making state-changing requests
      location = /csrf-init {
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block {
          csrf.handle_session_rotation()
          csrf.initialize_token()
        }
        default_type application/json;
        return 200 '{"status":"ok","message":"CSRF token initialized"}';
      }

      location /apex-api/user {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__APEX_HOST__/user;
        client_max_body_size 100m;
      }

      location /apex-api/status {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__APEX_HOST__/status;
        client_max_body_size 100m;
      }

      location /apex-ws/ {
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        #TEMPLATE_MARK_SSL
        proxy_set_header Host $host;                                        #TEMPLATE_MARK_SSL
        proxy_pass http://__APEX_HOST__/apex-ws/;
      }

      location /cirrus/search {
        return 302 /cirrus/search/;
      }

      location = /cirrus/search/ {
        deny all;
      }

      location /cirrus/search/ {
        limit_except GET {
          deny all;
        }
        # adjust proxy buffer size as postgrest can return long headers with Content-Location including the full url path
        proxy_buffer_size   128k;
        proxy_buffers   4 256k;
        proxy_busy_buffers_size   256k;
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__POSTGREST_HOST__/;
      }

      location = /bloc/v2.2/ {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_read_timeout <BLOC_TIMEOUT>s;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__STRATO_HOSTNAME__:__STRATO_PORT_API__/bloc/v2.2/;
      }

      location /bloc/v2.2/ {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_read_timeout <BLOC_TIMEOUT>s;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__STRATO_HOSTNAME__:__STRATO_PORT_API__/bloc/v2.2/;
      }

      location /docs {
        return 302 /docs/;
      }

      location /docs/ {
        set $is_ui "true";
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_read_timeout 300;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://__DOCS_HOST__/;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-xvfx8/ASiI4WTC0qcR5yqZBMBFKq1a75iM0mECbH3sk=' 'sha256-mW7ZW9DjbUkTBaBf+shwEtmAUJaW3T9OXcbr+hP719k='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
      }

      location /docs/swagger.yaml {
        alias /usr/local/openresty/nginx/html/swagger/swagger.yaml;
        add_header Content-Type application/x-yaml;
      }

      location /docs/swagger-initializer.js {
        alias /usr/local/openresty/nginx/html/swagger/swagger-initializer.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
      }

      location /prometheus {
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_pass http://__PROMETHEUS_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forward-For $proxy_add_x_forwarded_for;
        proxy_set_header X-NginX-Proxy true;
      }

      location /logs/strato/ {                                                  #TEMPLATE_MARK_LOGS
        access_by_lua_file lua/openid.lua;                                      #TEMPLATE_MARK_LOGS
        header_filter_by_lua_block { csrf.handle_session_rotation() }          #TEMPLATE_MARK_LOGS
        proxy_pass http://__STRATO_HOSTNAME__:__STRATO_PORT_LOGS__/;            #TEMPLATE_MARK_LOGS
        add_header Content-Type text/plain;                                     #TEMPLATE_MARK_LOGS
      }                                                                         #TEMPLATE_MARK_LOGS
                                                                                #TEMPLATE_MARK_LOGS
      location /strato-api/eth/v1.2/docs {
        proxy_read_timeout 300;
        proxy_set_header Accept-Encoding "";
        return 301 /docs/?url=/strato-api/eth/v1.2/swagger.json;
      }

      location = /strato-api {
        return 302 /strato-api/;
      }

      location /strato-api/ {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_pass http://__STRATO_HOSTNAME__:__STRATO_PORT_API__/;
      }

      location /strato/v2.3/transaction {
        rewrite_by_lua_file lua/csrf.lua;
        access_by_lua_file lua/openid.lua;
        header_filter_by_lua_block { csrf.handle_session_rotation() }
        proxy_pass http://__STRATO_HOSTNAME__:__STRATO_PORT_API__/bloc/v2.2/transaction;
      }

      location /strato/v2.3/key {
        access_by_lua_block {
          local token = ngx.req.get_headers()["X-USER-ACCESS-TOKEN"] or ngx.req.get_headers()["Authorization"]
          if not token or token == "" then
            ngx.status = 401
            ngx.say("Missing authentication token")
            ngx.exit(ngx.HTTP_UNAUTHORIZED)
          end
          if not token:match("^Bearer ") then
            token = "Bearer " .. token
          end
          ngx.req.set_header("Authorization", token)
        }
        proxy_pass __VAULT_URL__/strato/v2.3/key;
      }

      location /strato/v2.3/users {
        access_by_lua_block {
          local token = ngx.req.get_headers()["X-USER-ACCESS-TOKEN"] or ngx.req.get_headers()["Authorization"]
          if not token or token == "" then
            ngx.status = 401
            ngx.say("Missing authentication token")
            ngx.exit(ngx.HTTP_UNAUTHORIZED)
          end
          if not token:match("^Bearer ") then
            token = "Bearer " .. token
          end
          ngx.req.set_header("Authorization", token)
        }
        proxy_pass __VAULT_URL__/strato/v2.3/users;
      }

      location /vm-debug/ {                                                 #TEMPLATE_MARK_DEBUG
        access_by_lua_file lua/openid.lua;                                  #TEMPLATE_MARK_DEBUG
        header_filter_by_lua_block { csrf.handle_session_rotation() }      #TEMPLATE_MARK_DEBUG
        proxy_pass http://__STRATO_HOSTNAME__:<DEBUG_PORT_PLACEHOLDER>/;    #TEMPLATE_MARK_DEBUG
      }                                                                     #TEMPLATE_MARK_DEBUG

      location /vm-debug-ws/ {                                              #TEMPLATE_MARK_DEBUG
        access_by_lua_file lua/openid.lua;                                  #TEMPLATE_MARK_DEBUG
        header_filter_by_lua_block { csrf.handle_session_rotation() }      #TEMPLATE_MARK_DEBUG
        proxy_pass http://__STRATO_HOSTNAME__:<WS_DEBUG_PORT_PLACEHOLDER>/; #TEMPLATE_MARK_DEBUG
        proxy_http_version 1.1;                                             #TEMPLATE_MARK_DEBUG
        proxy_set_header Upgrade $http_upgrade;                             #TEMPLATE_MARK_DEBUG
        proxy_set_header Connection "Upgrade";                              #TEMPLATE_MARK_DEBUG
        proxy_set_header Host $host;                                        #TEMPLATE_MARK_DEBUG
      }                                                                     #TEMPLATE_MARK_DEBUG
    }
}

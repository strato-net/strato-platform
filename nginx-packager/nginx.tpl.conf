user root;
worker_processes  1;

error_log  /usr/local/openresty/nginx/logs/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;

    default_type  application/octet-stream;

    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"msec":"$msec",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request":"$request",'
        '"status": "$status",'
        '"request_time":"$request_time",'
        '"request_length":"$request_length",'
        '"bytes_sent":"$bytes_sent",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referrer":"$http_referer",'
        '"remote_user":"$remote_user",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time"'
      '}';
      
    map $request_uri $loggable {
        default   1;
        /metrics  0;
        /_ping    0;
    }
    
    access_log  /usr/local/openresty/nginx/logs/access.log  json_combined if=$loggable;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict  discovery 1m;                                          #TEMPLATE_MARK_OAUTH
    lua_shared_dict  jwks 1m;                                               #TEMPLATE_MARK_OAUTH
    lua_shared_dict introspection 10m;                                      #TEMPLATE_MARK_OAUTH
    #lua_code_cache   off; # debugging only                                 #TEMPLATE_MARK_OAUTH
    lua_shared_dict prometheus_metrics 10M;
    init_by_lua '
      prometheus = require("prometheus").init("prometheus_metrics")
      metric_requests = prometheus:counter(
        "nginx_http_requests_total", "Number of HTTP requests", {"host", "status"})
      metric_latency = prometheus:histogram(
        "nginx_http_request_duration_seconds", "HTTP request latency", {"host"})
      metric_connections = prometheus:gauge(
        "nginx_http_connections", "Number of HTTP connections", {"state"})
    ';
    log_by_lua '
      metric_requests:inc(1, {ngx.var.server_name, ngx.var.status})
      metric_latency:observe(tonumber(ngx.var.request_time), {ngx.var.server_name})
    ';

    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;         #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_SSL
    lua_ssl_verify_depth 5;                                                 #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_SSL

    client_body_buffer_size 64K;
    client_header_buffer_size 64k;
    client_max_body_size 4M;

    absolute_redirect off;

    limit_req_zone $binary_remote_addr zone=healthcheck:5m rate=5r/s;
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=strato_short_term_cache:1m max_size=5m inactive=1s use_temp_path=off;

    server {
      listen 80;
      listen 443 ssl;                                                       #TEMPLATE_MARK_SSL

      ssl_certificate    /etc/ssl/certs/server.<SSL_CERT_FILE_TYPE>;        #TEMPLATE_MARK_SSL
      ssl_certificate_key  /etc/ssl/private/server.key;                     #TEMPLATE_MARK_SSL

      # Redirect all non-SSL traffic to SSL.                                #TEMPLATE_MARK_SSL
      if ($ssl_protocol = "") {                                             #TEMPLATE_MARK_SSL
        rewrite ^ https://$host$request_uri? permanent;                     #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL

      set $session_name   strato_session;                                   #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
      #set $session_secret <SESSION_SECRET>; # for lua_code_cache=off only  #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE

      resolver 127.0.0.11 8.8.8.8 ipv6=off;

      large_client_header_buffers 4 32k;

      set $is_ui "false";

      location /metrics {
        content_by_lua '
          metric_connections:set(ngx.var.connections_reading, {"reading"})
          metric_connections:set(ngx.var.connections_waiting, {"waiting"})
          metric_connections:set(ngx.var.connections_writing, {"writing"})
          prometheus:collect()
        ';
      }
      
      location /_ping {
        return 200 'pong';
      }

      location /auth/openidc/return {                                       #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        rewrite_by_lua_file  lua/openid.lua;                                #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
      }                                                                     #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE

      location /auth/logout {                                               #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        rewrite_by_lua_file  lua/openid.lua;                                #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
      }                                                                     #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE

      location / {
        if ($http_user_agent ~* "android.+mobile|avantgo|bada\/|blackberry|blazer|compal|elaine|fennec|hiptop|iemobile|ip(hone|od|ad)|iris|kindle|lge |maemo|midp|mmp|netfront|opera m(ob|in)i|palm( os)?|phone|p(ixi|re)\/|plucker|pocket|psp|symbian|treo|up\.(browser|link)|vodafone|wap|windows (ce|phone)|xda|xiino") {
          return 302 /dappstore/;
        }
        return 302 /dashboard/;
      }

      location = /favicon.ico {
        proxy_pass http://smd:3002/favicon.ico;
      }

      # This solves the issue with oauth reauthorization when SMD is refreshed after getting 401 Unauthorized in any API response; merge favicon locations when served as static file;
      location = /dashboard/favicon.ico {
        proxy_pass http://smd:3002/favicon.ico;
      }

      location = /dashboard {
        return 302 /dashboard/;
      }

      location /dashboard/ {
        set $is_ui "true";
        rewrite_by_lua_file  lua/openid.lua;                                #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://smd:3002/;
      }

      location = /dappstore {
        return 302 /dappstore/;
      }

      location /dappstore/ {
        set $is_ui "true";
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        proxy_set_header Accept-Encoding "";
        proxy_pass http://dappstore:3000/;
      }

      location = /apps {
        return 302 /apps/;
      }

      location /apex-api/apps {
        return 302 /apps/;
      }

      location /apps/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        proxy_set_header Accept-Encoding "";
        proxy_pass http://apex:3001/apps/;
      }

      location = /apex-api {
        return 302 /apex-api/;
      }

      # Publicly available node health endpoint
      location /health {
        limit_req zone=healthcheck burst=20;
        limit_req_status 429;
        proxy_cache strato_short_term_cache;
        proxy_cache_valid any 1s;
        proxy_pass http://apex:3001/health;
      }

      location /apex-api/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        proxy_set_header Accept-Encoding "";
        proxy_pass http://apex:3001/;
        client_max_body_size       100m;
        # Here for possible future use:
        #limit_except POST          { deny all; }
        #client_body_temp_path      /tmp/;
        #client_body_in_file_only   on;
        #client_body_buffer_size    128K;
        #proxy_pass_request_headers on;
        #proxy_set_header           X-FILE $request_body_file;
        #proxy_set_body             off;
        #proxy_redirect             off;
      }

      location /apex-ws/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        #TEMPLATE_MARK_SSL
        proxy_set_header Host $host;                                        #TEMPLATE_MARK_SSL
        proxy_pass http://apex:3001/apex-ws/;
      }

      location /cirrus/contract {
        return 410;
      }

      location /cirrus/search {
        return 302 /cirrus/search/;
      }

      location /cirrus/search/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_request /_track;                                               #TEMPLATE_MARK_TRACK
        proxy_set_header Accept-Encoding "";
        proxy_pass http://postgrest:3001/;
      }

      location = /bloc/v2.2/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_read_timeout <BLOC_TIMEOUT>s;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://bloc:8000/bloc/v2.2/;
      }

      location /bloc/v2.2/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_request /_track;                                               #TEMPLATE_MARK_TRACK
        proxy_read_timeout <BLOC_TIMEOUT>s;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://bloc:8000/bloc/v2.2/;
      }

      location /docs {
        return 302 /docs/;
      }

      location /docs/ {
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_read_timeout 300;
        proxy_set_header Accept-Encoding "";
        proxy_pass http://docs:8080/;
      }

      location /bloc/v2.2/docs {
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_read_timeout 300;
        proxy_set_header Accept-Encoding "";
        return 301 /docs/?url=/bloc/v2.2/swagger.json;
      }

      location /prometheus {
        rewrite_by_lua_file lua/openid.lua;                               #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_pass http://prometheus:9090;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forward-For $proxy_add_x_forwarded_for;
        proxy_set_header X-NginX-Proxy true;
      }

      location /logs/strato/ {                   #TEMPLATE_MARK_LOGS
        rewrite_by_lua_file lua/openid.lua;      #TEMPLATE_MARK_LOGS   #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";                 #TEMPLATE_MARK_LOGS
        auth_basic_user_file auth.htpasswd;      #TEMPLATE_MARK_LOGS
        proxy_pass http://strato:7065/;          #TEMPLATE_MARK_LOGS
        add_header Content-Type text/plain;      #TEMPLATE_MARK_LOGS
      }                                          #TEMPLATE_MARK_LOGS
                                                 #TEMPLATE_MARK_LOGS
      location /logs/bloc/ {                     #TEMPLATE_MARK_LOGS
        rewrite_by_lua_file lua/openid.lua;      #TEMPLATE_MARK_LOGS   #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";                 #TEMPLATE_MARK_LOGS
        auth_basic_user_file auth.htpasswd;      #TEMPLATE_MARK_LOGS
        proxy_pass http://bloc:7065/;            #TEMPLATE_MARK_LOGS
        add_header Content-Type text/plain;      #TEMPLATE_MARK_LOGS
      }                                          #TEMPLATE_MARK_LOGS
                                                 #TEMPLATE_MARK_LOGS
      location /strato-api/eth/v1.2/docs {
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_read_timeout 300;
        proxy_set_header Accept-Encoding "";
        return 301 /docs/?url=/strato-api/eth/v1.2/swagger.json;
      }

      location /strato-api/eth/v1.2/swagger.json {
        proxy_pass http://bloc:8002/swagger.json;
      }

      location = /strato-api {
        return 302 /strato-api/;
      }

      location = /strato-api/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_basic "Restricted";
        auth_basic_user_file auth.htpasswd;
        proxy_pass http://strato:3000/;
      }

      location /strato-api/ {
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH  #TEMPLATE_MARK_OAUTH_STRATO_43_AND_ABOVE
        auth_request /_track;                                               #TEMPLATE_MARK_TRACK
        proxy_pass http://strato:3000/;
      }

      location /strato/v2.3/transaction {                                   #TEMPLATE_MARK_OAUTH
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH
        proxy_pass http://bloc:8000/bloc/v2.2/transaction;                  #TEMPLATE_MARK_OAUTH
      }                                                                     #TEMPLATE_MARK_OAUTH

      location /strato/v2.3/key {                                           #TEMPLATE_MARK_OAUTH
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH
        proxy_pass http://vault-wrapper:8000/strato/v2.3/key;               #TEMPLATE_MARK_OAUTH
      }                                                                     #TEMPLATE_MARK_OAUTH

      location /strato/v2.3/users {                                         #TEMPLATE_MARK_OAUTH
        rewrite_by_lua_file lua/openid.lua;                                 #TEMPLATE_MARK_OAUTH
        proxy_pass http://vault-wrapper:8000/strato/v2.3/users;             #TEMPLATE_MARK_OAUTH
      }                                                                     #TEMPLATE_MARK_OAUTH

      location /strato/v2.3/metrics {                                       #TEMPLATE_MARK_OAUTH
        proxy_pass http://vault-wrapper:8000/strato/v2.3/metrics;           #TEMPLATE_MARK_OAUTH
      }                                                                     #TEMPLATE_MARK_OAUTH

      location /strato/v2.3/verify-password {                               #TEMPLATE_MARK_OAUTH
        proxy_pass http://vault-wrapper:8000/strato/v2.3/verify-password;   #TEMPLATE_MARK_OAUTH
      }                                                                     #TEMPLATE_MARK_OAUTH

      location /strato/v2.3/ {                                              #TEMPLATE_MARK_NO_OAUTH
        return 501 "Oauth is disabled on this strato node";                 #TEMPLATE_MARK_NO_OAUTH
      }                                                                     #TEMPLATE_MARK_NO_OAUTH

      location /blockstanbul/ {                                             #TEMPLATE_MARK_BLOCKSTANBUL
        proxy_pass http://strato:8050/;                                     #TEMPLATE_MARK_BLOCKSTANBUL
      }                                                                     #TEMPLATE_MARK_BLOCKSTANBUL

      location = /_track {                                                  #TEMPLATE_MARK_TRACK
        internal;                                                           #TEMPLATE_MARK_TRACK
        proxy_pass http://apex:3001/_track;                                 #TEMPLATE_MARK_TRACK
        proxy_pass_request_body off;                                        #TEMPLATE_MARK_TRACK
        proxy_set_header X-Original-URI $request_uri;                       #TEMPLATE_MARK_TRACK
        proxy_set_header X-Original-METHOD $request_method;                 #TEMPLATE_MARK_TRACK
        proxy_set_header X-Real-IP $remote_addr;                            #TEMPLATE_MARK_TRACK
        proxy_set_header Content-Length "";                                 #TEMPLATE_MARK_TRACK
      }                                                                     #TEMPLATE_MARK_TRACK
    }
}

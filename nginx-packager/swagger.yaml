openapi: 3.0.0
info:
  version: "12"
  title: STRATO Mercata API
  license:
    url: https://www.apache.org/licenses/LICENSE-2.0.html
    name: APACHE LICENSE, VERSION 2.0
  description: |
    #### STRATO Mercata API reference
tags:
  - name: Users - Addresses
    description: User accounts management
  - name: Transactions
    description: Endpoints related to transaction management
  - name: Smart Contracts
    description: Endpoints related to contract management
  - name: Health Checks
    description: Endpoints related to the health of the system
paths:
  /strato/v2.3/users:
    get:
      tags:
        - Users - Addresses
      summary: Get list of users and account address
      parameters:
        - required: false
          in: query
          name: address
          description: Address of user to look up the username of
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                properties:
                  username:
                    type: string
                  address:
                    type: string
        "400":
          description: Internal Error! Something is broken in the STRATO database. Please contact your network administrator to have this problem fixed.
  /strato/v2.3/key:
    post:
      tags:
        - Users - Addresses
      summary:  Create the user address and key based on Bearer token
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                properties:
                  status:
                    type: string
                  address:
                    type: string
    get:
      tags:
        - Users - Addresses
      summary: Get user address based on Bearer token
      parameters:
        - required: false
          in: query
          name: username
          description: (optional) Username to get another user's address
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                properties:
                  status:
                    type: string
                  address:
                    type: string
        "400":
          description: User doesn't exist
  /strato-api/eth/v1.2/account:
    get:
      tags:
        - Users - Addresses
      summary: Get user blockchain account details
      description: Returns account info from given parameters
      parameters:
        - required: false
          in: query
          name: address
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
        - required: false
          in: query
          name: balance
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
        - required: false
          in: query
          name: minbalance
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
        - required: false
          in: query
          name: maxbalance
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
        - required: false
          in: query
          name: nonce
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
        - required: false
          in: query
          name: minnonce
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
        - required: false
          in: query
          name: maxnonce
          schema:
            type: integer
            minimum: 0
            exclusiveMinimum: false
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/Account"
                type: array
        "400":
          description: Invalid parameters or `maxnonce` or `minnonce` or `nonce` or
            `maxbalance` or `minbalance` or `balance` or `address`
  /strato/v2.3/transaction:
    post:
      tags:
        - Transactions
      summary: Post Transaction (create contract, function call, token transfer)
      parameters:
        - in: query
          name: resolve
          allowEmptyValue: true
          schema:
            type: boolean
            default: false
      requestBody:
        description: Create a Contract, Call a Function, Transfer Tokens
        required: true
        content:
          application/json;charset=utf-8:
            schema:
              $ref: '#/components/schemas/SingleTransaction' 
            examples:
              CreateContract:
                value:
                  txs:
                    - 
                      payload:
                        contract: "SimpleStorage"
                        src: "contract SimpleStorage {uint storedData; constructor SimpleStorage(uint _storedData) {storedData = _storedData;} function set(uint x) {storedData = x;} function get() constant returns (uint) {return storedData;}}"
                        args:
                          _storedData: 1
                        metadata:
                          history: "SimpleStorage"
                          VM: "SolidVM"
                      type: "CONTRACT"
                  txParams:
                    gasLimit: 10000000000
                    gasPrice: 1
              FunctionCall:
                value:
                  txs:
                    - 
                      payload:
                        contractName: "SimpleStorage"
                        contractAddress: "90f0a711cd0ab921bbc9b54c4a6bdb3219e590f9"
                        method: "set"
                        args:
                          x: 5
                      type: "FUNCTION"
                  txParams:
                    gasLimit: 32100000000
                    gasPrice: 1
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8::
              schema:
                items:
                  $ref: "#/components/schemas/BlocTransactionResultTrue"
                type: array

  /strato/v2.3/transaction/parallel:
    post:
      tags:
        - Transactions
      summary: Post Transactions in parallel (create contract, function call, token transfer)
      parameters:
        - in: query
          name: resolve
          allowEmptyValue: true
          schema:
            type: boolean
            default: false
      requestBody:
        description: Create Multiple Contracts, Call Multiple Functions, Transfer Tokens
        required: true
        content:
          application/json;charset=utf-8:
            schema:
              $ref: '#/components/schemas/MultipleTransactions' 
            examples:
              CreateContract:
                value:
                  txs:
                    - 
                      payload:
                        contract: "SimpleStorage"
                        args: {}
                        metadata:
                          history: ""
                          index: ""
                          VM: "SolidVM"
                      type: "CONTRACT"
                    -
                      payload:
                        contract: "SimpleStorage2"
                        args: {}
                        metadata:
                          history: ""
                          index: ""
                          VM: "SolidVM"
                      type: "CONTRACT"
                      
                  txParams:
                    gasLimit: 10000000000
                    gasPrice: 1
                  srcs:
                    SimpleStorage: "contract SimpleStorage {uint storedData; function SimpleStorage() {storedData = 1;} function set(uint x) {storedData = x;} function get() constant returns (uint) {return storedData;}}"
                    SimpleStorage2: "contract SimpleStorage2 {uint storedData; function SimpleStorage2() {storedData = 2;} function set(uint x) {storedData = x;} function get() constant returns (uint) {return storedData;}}"
              FunctionCall:
                value:
                  txs:
                    - 
                      payload:
                        contractName: "SimpleStorage"
                        contractAddress: "90f0a711cd0ab921bbc9b54c4a6bdb3219e590f9"
                        method: "set"
                        args:
                          x: 5
                      type: "FUNCTION"
                    -
                      payload:
                        contractName: "SimpleStorage2"
                        contractAddress: "aa24835ecf86777c767f2055efe2779dcb2b8bb2"
                        method: "set"
                        args:
                          x: 6
                      type: "FUNCTION"
                  txParams:
                    gasLimit: 32100000000
                    gasPrice: 1
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/BlocTransactionResult"
                type: array
  /cirrus/search/contract:
    get:
      tags:
        - Smart Contracts
      summary: Get a list of existing contracts (indexed blockchain data)
      description: "Note: refer to <a href='https://postgrest.org/en/v9.0/api.html'>PostgREST documentation</a> for additional query options"
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - required: false
          in: query
          name: query
          description: Additional query parameter
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/contract"
        "206":
          description: Partial Content
  "/cirrus/search/{contractName}":
    get:
      tags:
        - Smart Contracts
      summary: Search if a contract name exists (indexed blockchain data)
      description: "Note: refer to <a href='https://postgrest.org/en/v9.0/api.html'>PostgREST documentation</a> for additional query options"
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: false
          in: query
          name: query
          description: Additional query parameter
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/ContractName-Latest-OrAddress"
                type: array
        "404":
          description: "`contractName` not found"
  "/cirrus/search/history@{contractName}":
    get:
      tags:
        - Smart Contracts
      summary: Search if a contract's history exists (indexed blockchain data)
      description: "Note: refer to <a href='https://postgrest.org/en/v9.0/api.html'>PostgREST documentation</a> for additional query options"
      parameters:
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: false
          in: query
          name: query
          description: Additional query parameter
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/ContractName-Latest-OrAddress"
                type: array
        "404":
          description: "`contractName` not found"
  /bloc/v2.2/contracts:
    get:
      tags:
        - Smart Contracts
      summary: Get a list of all existing contracts
      description: "Returns an object with contract names as keys, and the value is an array of each instance of that contract type. \
          Limits and offsets are calculated by contract instances, not contract types"
      parameters:
        - required: false
          in: query
          name: offset
          schema:
            type: number
            format: number
            minimum: 0
            maximum: 1.157920892373162e+77
        - required: false
          in: query
          name: limit
          schema:
            type: number
            format: number
            minimum: 0
            maximum: 1.157920892373162e+77
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/GetContractResponse"
        "400":
          description: Invalid parameters
  "/bloc/v2.2/contracts/{contractName}":
    get:
      tags:
        - Smart Contracts
      summary: Get a contract's address
      description: ""
      parameters:
        - required: true
          in: path
          name: contractName
          description: Name of an existing contract
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/ContractName-Latest-OrAddress"
                type: array
        "404":
          description: "`contractName` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}":
    get:
      tags:
        - Smart Contracts
      summary: Get info of a Contract
      parameters:
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/ContractDetails"
        "400":
          description: Invalid parameters
        "404":
          description: "`contractName` or `contractAddress` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}/state":
    get:
      tags:
        - Smart Contracts
      summary: Get state of a contract
      parameters:
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
        - required: false
          in: query
          name: name
          schema:
            type: string
        - required: false
          in: query
          name: count
          schema:
            type: integer
        - required: false
          in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: length
          allowEmptyValue: true
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                additionalProperties:
                  $ref: "#/components/schemas/SolidityValue"
                type: object
        "400":
          description: Invalid `length` or `offset` or `count` or `name`
        "404":
          description: "`contractName` or `contractAddress` not found"
  "/bloc/v2.2/contracts/contract/{contractAddress}/details":
    get:
      tags:
        - Smart Contracts
      summary: Get the details of a contract
      parameters:
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/ContractDetails"
        "400":
          description: Invalid parameters
        "404":
          description: "`contractAddress` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}/functions":
    get:
      tags:
        - Smart Contracts
      summary: Get a list of functions in an existing contract
      description: ""
      parameters:
        - required: true
          in: path
          name: contractName
          description: Name of an existing contract
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          description: Address of an existing contract
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/FunctionName"
                type: array
        "400":
          description: Invalid parameters
        "404":
          description: "`contractName` or `contractAddress` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}/symbols":
    get:
      tags:
        - Smart Contracts
      summary: Get Symbols from contract
      parameters:
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  example: SymbolName
                  type: string
                type: array
        "400":
          description: Invalid parameters
        "404":
          description: "`contractName` or `contractAddress` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}/state/{mapping}/{key}":
    get:
      tags:
        - Smart Contracts
      summary: Get contract mapping and keys
      parameters:
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
        - required: true
          in: path
          name: mapping
          schema:
            type: string
        - required: true
          in: path
          name: key
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/GetContractStatesMappingResponse"
        "400":
          description: Invalid parameters
        "404":
          description: "`contractName` or `contractAddress` or `mapping` or `key` not found"
  "/bloc/v2.2/contracts/{contractName}/{contractAddress}/enum/{enumName}":
    get:
      tags:
        - Smart Contracts
      summary: Get enum from a contract
      parameters:
        - required: true
          in: path
          name: contractName
          schema:
            type: string
        - required: true
          in: path
          name: contractAddress
          schema:
            type: string
            format: hex string
            minimum: 0
            maximum: 1.461501637330903e+48
        - required: true
          in: path
          name: enumName
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/EnumValue"
                type: array
        "400":
          description: Invalid parameters
        "404":
          description: "`contractName` or `contractAddress` or `enumName` not found"
  /bloc/v2.2/contracts/compile:
    post:
      tags:
        - Smart Contracts
      summary: Compile contracts
      requestBody:
        content:
          application/json;charset=utf-8:
            schema:
              items:
                $ref: "#/components/schemas/PostCompileRequest"
              type: array
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/PostCompileResponse"
                type: array
        "400":
          description: Invalid `body`
  #deprecate-7.5
  /bloc/v2.2/contracts/xabi:
    post:
      tags:
        - Smart Contracts
      summary: (EVM contracts only, deprecated in STRATO 7.5) Post a Xabi Request
      description: ""
      requestBody:
        content:
          application/json;charset=utf-8:
            schema:
              $ref: "#/components/schemas/PostXabiRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/PostXabiRequest"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/PostXabiResponse"
        "400":
          description: Invalid `body`
  "/bloc/v2.2/transactions/{hash}/result":
    get:
      tags:
        - Transactions
      summary: "Get the result of a transaction"
      description: ""
      parameters:
        - required: true
          in: path
          name: hash
          description: Hash of a transaction
          schema:
            type: string
            default: 
        - in: query
          name: resolve
          allowEmptyValue: true
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/BlocTransactionResult"
        "400":
          description: Invalid `resolve`
        "404":
          description: "`hash` not found"
  /bloc/v2.2/transactions/results:
    post:
      tags:
        - Transactions
      summary: Get the results of multiple transactions
      description: ""
      parameters:
        - in: query
          name: resolve
          allowEmptyValue: true
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json;charset=utf-8:
            schema:
              items:
                $ref: "#/components/schemas/Keccak256_hash-32_byte_hex_encoded_stri\
                  ng"
              type: array
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                items:
                  $ref: "#/components/schemas/BlocTransactionResult"
                type: array
        "400":
          description: Invalid `body` or `resolve`
  /health:
    get:
      tags:
        - Health Checks
      summary: Get overall health status of STRATO node, indicates if the node health needs administrator's attention. Useful for monitoring the node's health with external tools. Does not require authentication.
      responses:
        "200":
          description: ""
          content:
            text/html;charset=utf-8:
              schema:
                $ref: "#/components/schemas/HealthResult"
  /strato-api/eth/v1.2/metadata:
    get:
      tags:
        - Health Checks
      summary: Get the STRATO node's addresss, public key and list of validators. Also check if the node is synced and the vault's password is set.  Requires authentication.
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                $ref: "#/components/schemas/Metadata"
  /apex-api/status:
    get:
      tags:
        - Health Checks
      summary: Get detailed health information of the STRATO node, includes warning messages, resource usage, and other relevant health checks. Requires authentication.
      responses:
        "200":
          description: ""
          content:
            application/json;charset=utf-8:
              schema:
                  $ref: "#/components/schemas/StratoStatus"
components:
  parameters:
    preferParams:
      name: Prefer
      description: Preference
      required: false
      in: header
      schema:
        type: string
        enum:
          - params=single-object
    preferReturn:
      name: Prefer
      description: Preference
      required: false
      in: header
      schema:
        type: string
        enum:
          - return=representation
          - return=minimal
          - return=none
    preferCount:
      name: Prefer
      description: Preference
      required: false
      in: header
      schema:
        type: string
        enum:
          - count=none
    select:
      name: select
      description: Filtering Columns
      required: false
      in: query
      schema:
        type: string
    order:
      name: order
      description: Ordering
      required: false
      in: query
      schema:
        type: string
    range:
      name: Range
      description: Limiting and Pagination
      required: false
      in: header
      schema:
        type: string
    rangeUnit:
      name: Range-Unit
      description: Limiting and Pagination
      required: false
      in: header
      schema:
        type: string
        default: items
    offset:
      name: offset
      description: "Pagination offset (default: 0)"
      required: false
      in: query
      schema:
        type: string
    limit:
      name: limit
      description: "Pagination limit per page (default: 100)"
      required: false
      in: query
      schema:
        type: string
    rowFilter.cold_storage.address:
      name: address
      required: false
      in: query
      schema:
        type: string
        format: text
    rowFilter.cold_storage.chain_id:
      name: chain_id
      required: false
      in: query
      schema:
        type: string
        format: text
    rowFilter.cold_storage.binary_values:
      name: binary_values
      required: false
      in: query
      schema:
        type: string
        format: bytea
    rowFilter.contract.id:
      name: id
      required: false
      in: query
      schema:
        type: string
        format: integer
    rowFilter.contract.codeHash:
      name: codeHash
      required: false
      in: query
      schema:
        type: string
        format: text
    rowFilter.contract.contract:
      name: contract
      required: false
      in: query
      schema:
        type: string
        format: text
    rowFilter.contract.abi:
      name: abi
      required: false
      in: query
      schema:
        type: string
        format: text
  requestBodies:
    PostBlocTransactionRequest:
      content:
        application/json;charset=utf-8:
          schema:
            $ref: "#/components/schemas/PostBlocTransactionRequest"
      required: true
  schemas:
    UserName:
      description: User Name
      example: Martin
      type: string
    Address:
      description: Ethereum Address, 20 byte hex encoded string
      example: address=deadbeef
      type: string
    Password:
      description: Password
      example: '"securePassword"'
      type: string
    KeyStoreEntry:
      required:
        - password
        - keyStore
      properties:
        password:
          $ref: "#/components/schemas/Password"
        keyStore:
          $ref: "#/components/schemas/KeyStoreEntry"
      example:
        password: hunter2
        keyStore:
          accountAddress: 97b8c8d8334b6f3cd15e4e09986741e76b32c0f1
          publicKey: BN7xUUo/jRkUcOCGZ9kLblhLMjX+l6onmrXSGyU9Vi+FepkXyn6INsJy1fXGXOfEAZHShgArFQIG+TuPEbaBG5M=
          keystoreNonce: r1bGHtEsQ25mtNwagcc1YfAlvJ/dwR/V

name:                strato-api
license:             Apache-2.0

dependencies:
- base
- bloc2
- hflags
- source-tools

executables:
  strato-api:
    main:                Main.hs
    source-dirs:         exec_src
    dependencies:
    - aeson
    - bloc2api
    - blockapps-data
    - blockapps-datadefs
    - blockapps-mpdbs
    - blockapps-init
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - blockDB
    - bytestring
    - cache
    - clock
    - common-log
    - containers
    - core-api2
    - ethereum-discovery
    - format
    - http-types
    - insert-ordered-containers
    - lens
    - monad-alter
    - process-monitor
    - regex-compat
    - servant-client-core
    - servant-multipart
    - servant-server
    - servant-openapi3
    - servant-swagger-ui
    - solid-vm-model
    - strato-auth
    - strato-conf
    - sql-monad
    - strato-model
    - strato-redis-blockdb
    - openapi3
    - text
    - transformers
    - unliftio
    - vault-monad
    - wai
    - wai-cors
    - wai-extra
    - wai-middleware-prometheus
    - warp
    # Don't touch this next setting, leave -threaded, otherwise it WILL NOT WORK
    # https://blockappsdev.slack.com/archives/G5E7K3ETX/p1645104924934129
    ghc-options: -threaded

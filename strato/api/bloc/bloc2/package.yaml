name: bloc2
version: 0.1.0.0
synopsis: Bloc microservice
description: Bloc microservice
category: Web
build-type: Simple
license: Apache-2.0

dependencies:
  - base


library:
  source-dirs: src/
  ghc-options: -Wall -Werror -fsimpl-tick-factor=15000
  dependencies:
    - base16-bytestring
    - bimap
    - bloc2api
    - blockapps-data
    - blockapps-datadefs
    - blockapps-mpdbs
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - blockDB
    - bytestring
    - cache
    - clock
    - common-log
    - containers
    - core-api2
    - deepseq
    - esqueleto
    - ethereum-rlp
    - evm-solidity
    - extra
    - format
    - hashable
    - insert-ordered-containers
    - labeled-error
    - lens
    - monad-alter
    - monad-logger
    - ordered-containers
    - mtl
    - parsec
    - blockapps-secp256k1-haskell
    - seqevents
    - servant-client
    - servant-server
    - servant-swagger
    - solid-vm-compiler
    - solid-vm-model
    - solid-vm-parser
    - source-tools
    - sql-monad
    - strato-model
    - strato-redis-blockdb
    - swagger2
    - text
    - time
    - transformers
    - unliftio
    - vault-monad
    - vector

tests:
  blockapps-bloc22-server-test:
    source-dirs: test/
    main: Spec.hs
    ghc-options: -Wall -Werror
    dependencies:
      - bloc2
      - hspec

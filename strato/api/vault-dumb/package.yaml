name: vaultProxy
version: 0.0.0
synopsis: Vault Proxy
description: This is where strato communicates to the central vault
category: Security
homepage: github.com/blockapps/strato-platform
bug-reports: github.com/blockapps/strato-platform/issues
author: BlockApps, Inc
        Steven Glasford

build-type: Simple
github: blockapps/strato-platform
git: https://github.com/blockapps/strato-platform

dependencies:
- base
- bloc-sql-monad
- bloc2
- hflags
- monad-alter
- mtl
- postgresql-simple
- transformers
- source-tools

executables:
  vaultProxy:
    main:                Main.hs
    source-dirs:         src
    other-modules:
    - Options
    - SelectAccessible
    dependencies:
    - aeson
    - bloc2api
    - blockapps-data
    - blockapps-datadefs
    - blockapps-mpdbs
    - blockapps-init
    - bytestring
    - cache
    - clock
    - common-log
    - core-api-monad
    - core-api2
    - evm-solidity
    - format
    - http-types
    - insert-ordered-containers
    - lens
    - servant-multipart
    - servant-server
    - servant-swagger
    - servant-swagger-ui
    - sql-monad
    - strato-model
    - swagger2
    - text
    - unliftio
    - vault-monad
    - wai
    - wai-cors
    - wai-extra
    - wai-middleware-prometheus
    - warp
    ghc-options: -threaded
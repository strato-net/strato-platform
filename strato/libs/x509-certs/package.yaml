name: x509-certs
version: 0.0.1
build-type: Simple
author: dpmesko
maintainer:   daniel@blockapps.net
synopsis: A Haskell x509 certificate generator
category:      Data Structures
description:
    A Haskell x509 certificate generator

dependencies:
  - base >= 4 && < 5
  - monad-alter


ghc-options: -Wall -Werror


library:
  source-dirs: src
  ghc-options: -Wall -O2 
  dependencies:
  - aeson
  - asn1-encoding
  - asn1-types
  - base16-bytestring
  - binary
  - bytestring
  - containers
  - cryptonite
  - deepseq
  - ethereum-rlp
  - ethereum-encryption
  - hourglass
  - lens
  - memory
  - monad-alter
  - pem
  - text
  - format
  - transformers
  - secp256k1-haskell
  - servant-docs
  - strato-model
  - swagger2
  - x509
  - x509-validation
  - deepseq
  - QuickCheck

tests:
  x509-test:
    main: Spec.hs
    source-dirs: test/
    dependencies:
      - x509-certs
      - aeson
      - bytestring
      - cryptonite
      - ethereum-rlp
      - hspec
      - strato-model
      - transformers
      - hourglass

name: groth16-native
version: 0.1.0
synopsis: Native Haskell Groth16 prover for BN254 curve
description: |
  Pure Haskell implementation of Groth16 zero-knowledge proof generation
  for the BN254 (alt_bn128) curve. Parses snarkjs/circom format files.
  
  EXPERIMENTAL: May produce invalid proofs - use for development/testing only.
license: AllRightsReserved
author: BlockApps
maintainer: info@blockapps.net

library:
  source-dirs: src
  exposed-modules:
    - Groth16.BN254
  dependencies:
    - base
    - aeson
    - bytestring
    - binary
    - text
    - vector
    # Cryptographic libraries
    - pairing
    - galois-field
    - elliptic-curve
    - groups
    # Utilities
    - random
    - deepseq
    - parallel
    - containers

ghc-options:
  - -Wall
  - -Werror
  - -O2

executables:
  bench-groth16-native:
    source-dirs: bench
    main: Main.hs
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -O2
    dependencies:
      - base
      - groth16-native
      - text
      - time

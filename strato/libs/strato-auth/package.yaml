name:                strato-auth
version:             0.1.0.0
synopsis:            OAuth authentication library for STRATO CLI tools
description:         Provides transparent OAuth device flow authentication for Servant clients and raw HTTP requests

dependencies:
  - base >= 4.7 && < 5
  - aeson
  - base64
  - bytestring
  - directory
  - filelock
  - filepath
  - http-client
  - http-client-tls
  - http-types
  - modern-uri
  - req
  - servant-client
  - servant-client-core
  - text
  - time
  - yaml

library:
  source-dirs: src
  exposed-modules:
    - Strato.Auth
    - Strato.Auth.Client
    - Strato.Auth.ClientCredentials
    - Strato.Auth.Token

executables:
  strato-auth:
    main: Main.hs
    source-dirs: exec_src
    dependencies:
      - strato-auth

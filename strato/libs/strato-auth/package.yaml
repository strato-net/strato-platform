name:                strato-auth
version:             0.1.0.0
synopsis:            OAuth authentication library for STRATO CLI tools
description:         Provides transparent OAuth device flow authentication for Servant clients and raw HTTP requests

dependencies:
  - base >= 4.7 && < 5
  - aeson
  - bytestring
  - directory
  - filepath
  - http-client
  - http-client-tls
  - http-types
  - servant-client
  - servant-client-core
  - text
  - time

library:
  source-dirs: src
  exposed-modules:
    - Strato.Auth

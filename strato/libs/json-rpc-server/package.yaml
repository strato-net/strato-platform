name: json-rpc-server
version: 0.3.0.0
synopsis: JSON-RPC 2.0 on the server side (BlockApps fork)
description: |
  BlockApps-maintained fork of json-rpc-server.
  
  An implementation of the server side of JSON-RPC 2.0.
  See <http://www.jsonrpc.org/specification>. This library uses
  'ByteString' for input and output, leaving the choice of transport
  up to the user.
  
  Originally by Kristen Kozak (grayjay). Forked and maintained by
  BlockApps with updated dependency bounds for modern GHC.

license: MIT
license-file: LICENSE
author: Kristen Kozak
maintainer: BlockApps <support@blockapps.net>
copyright: (c) 2013 Kristen Kozak, (c) 2024-2026 BlockApps Inc.
category: Network, JSON
extra-source-files:
  - changelog.md

github: blockapps/strato-platform

library:
  source-dirs: src
  exposed-modules:
    - Network.JsonRpc.Server
  other-modules:
    - Network.JsonRpc.Types
  dependencies:
    - base >= 4.3 && < 5
    - aeson >= 0.6 && < 3
    - deepseq >= 1.1 && < 2
    - bytestring >= 0.9 && < 1
    - mtl >= 2.2.1 && < 2.4
    - text >= 0.11 && < 3
    - vector >= 0.7.1 && < 1
    - unordered-containers >= 0.1 && < 0.3
  ghc-options:
    - -Wall

tests:
  tests:
    source-dirs: tests
    main: TestSuite.hs
    other-modules:
      - TestParallelism
      - Internal
    dependencies:
      - base
      - json-rpc-server
      - HUnit >= 1.2 && < 1.7
      - test-framework >= 0.7 && < 0.9
      - test-framework-hunit >= 0.3 && < 0.4
      - aeson
      - bytestring
      - mtl
      - text
      - vector
    ghc-options:
      - -Wall

name:        strato-index
author:      Jamshid
copyright:   2016 Blockapps
description: Please see README.md
version:     0.1.0.0
license:     Apache-2.0

ghc-options: -threaded -rtsopts -with-rtsopts=-N

dependencies:
  - base

library:
  source-dirs: src/
  dependencies:
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockDB
  - common-log
  - containers
  - format
  - kafka-monad
  - monad-alter
  - seqevents
  - strato-conf
  - strato-model
  - text

executables:
  strato-api-indexer:
    main: ApiIndexerMain.hs
    source-dirs: exec_src
    dependencies:
      - blockapps-data
      - blockapps-init
      - blockDB
      - common-log
      - containers
      - evm-solidity
      - hflags
      - monad-alter
      - process-monitor
      - redis-monad
      - sql-monad
      - strato-conf
      - strato-index
      - strato-model
    other-modules:
      - Wiring

  strato-p2p-indexer:
    main: P2PIndexerMain.hs
    source-dirs: exec_src
    dependencies:
      - blockapps-data
      - blockapps-init
      - blockDB
      - common-log
      - containers
      - evm-solidity
      - hflags
      - monad-alter
      - process-monitor
      - redis-monad
      - strato-conf
      - strato-index
      - strato-model
    other-modules:
      - Wiring

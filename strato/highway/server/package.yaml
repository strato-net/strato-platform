name:                blockapps-highway-server
version:             0.1.0.0
github:              "githubuser/blockapps-highway-server"
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2018 Author name here"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/server#readme>

dependencies:
- base
- blockapps-highway-api
- bytestring
- common-log
- conduit
- conduit-extra
- filepath
- http-client-tls
- http-conduit
- monad-logger
- servant
- servant-client
- servant-client-core
- servant-multipart
- servant-multipart-api
- servant-multipart-client
- raw-strings-qq
- resourcet
- unliftio-core

library:
  source-dirs: src
  dependencies:
    - aeson
    - aws
    - bytestring
    - cache
    - clock
    - cryptonite
    - http-client
    - lens
    - monad-control
    - mtl
    - opaleye
    - product-profunctors
    - profunctors
    - saltine
    - servant-multipart
    - servant-swagger
    - strato-model
    - swagger2
    - transformers
    - unliftio
    - resource-pool
    - secp256k1-haskell == 0.2.0
    - servant-server
    - text
    - yaml

executables:
  blockapps-highway-server:
    source-dirs: app
    main: Main.hs
    other-modules: [Options]
    dependencies:
      - blockapps-highway-server
      - blockapps-init
      - cache
      - clock
      - hflags
      - http-client
      - resource-pool
      - servant-options
      - servant-server
      - text
      - wai-cors
      - wai-extra
      - wai-middleware-prometheus
      - warp
    ghc-options: -threaded 

tests:
  highway-spec:
    source-dirs: test/
    main: Spec.hs
    dependencies:
      - blockapps-data
      - bytestring
      - clockwork
      - cryptonite
      - hspec
      - labeled-error
      - secp256k1-haskell
      - strato-model

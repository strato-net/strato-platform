name:                blockapps-highway-server
version:             0.1.0.0
github:              "githubuser/blockapps-highway-server"
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2018 Author name here"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/server#readme>

dependencies:
- base
- common-log
- unliftio-core

library:
  source-dirs: src
  dependencies:
    - aws
    - blockapps-highway-api
    - bytestring
    - common-log
    - conduit
    - filepath
    - http-client
    - http-conduit
    - monad-logger
    - mtl
    - resourcet
    - servant-multipart
    - strato-model
    - transformers
    - unliftio
    - servant-server
    - text
    - unliftio-core

executables:
  blockapps-highway-server:
    source-dirs: app
    main: Main.hs
    other-modules: [Options]
    dependencies:
      - blockapps-highway-api
      - blockapps-highway-server
      - blockapps-init
      - bytestring
      - common-log
      - hflags
      - http-client
      - http-client-tls
      - raw-strings-qq
      - servant-multipart-client
      - servant-server
      - text
      - unliftio-core
      - wai-cors
      - wai-middleware-prometheus
      - warp
    ghc-options: -threaded 

tests:
  highway-spec:
    source-dirs: test/
    main: Spec.hs

name: seqevents

dependencies:
  - base
  - binary
  - blockapps-data
  - blockapps-datadefs
  - QuickCheck

library:
  source-dirs: src/
  ghc-options: -fconstraint-solver-iterations=8 # needed for compiler not to crash, remove when neccessary
  dependencies:
    - aeson
    - blockstanbul
    - bytestring
    - conduit
    - deepseq
    - ethereum-rlp
    - format
    - generic-arbitrary
    - lens
    - milena
    - monad-alter
    - prometheus-client
    - strato-conf
    - strato-model
    - text
    - x509-certs

tests:
  seqevents-spec:
    source-dirs: test/
    ghc-options: -dynamic 
    main: EventSpec.hs
    dependencies:
      - hspec
      - seqevents

name: vm-runner
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: The executable that runs VMs for transactions
category:      Data Structures

dependencies:
  - base
  - blockstanbul # This dependency doesn't appear to be used at all, except for one symbol that doesn't exist.
                 # To avoid breaking builds, please leave this here: https://blockapps.atlassian.net/browse/OPS-65

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.BlockChain
    - Blockchain.Event
    - Executable.EthereumVM
    - Executable.EthereumVM2
  ghc-options: -Wall -O2
  dependencies:
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-mpdbs
  - bytestring
  - common-log
  - composable-monads-base
  - conduit
  - containers
  - cross-monitoring
  - debugger
  - dlist
  - ethereum-rlp
  - extra
  - format
  - lens
  - kafka-monad
  - merkle-patricia-db
  - milena
  - milena-tools
  - monad-alter
  - mtl
  - prometheus-client
  - seqevents
  - solid-vm
  - sql-monad
  - stm
  - strato-conf
  - strato-genesis
  - strato-index
  - strato-model
  - strato-statediff
  - text
  - time
  - transformers
  - unliftio
  - vm-tools
  - ordered-containers

executables:
  vm-runner:
    source-dirs: exec_src
    main: Main.hs
    dependencies:
      - async
      - blockapps-init
      - common-log
      - debugger
      - hflags
      - solid-vm-fuzzer
      - strato-model
      - vm-runner
      - vm-tools
      - wai-middleware-prometheus
      - warp
    ghc-options: -Wall -O2 -threaded -rtsopts -fprof-auto 

benchmarks:
  microbench:
    source-dirs: bench/
    main: Microbench.hs
    other-modules: []
    ghc-options: -dynamic
    dependencies:
      - bytestring
      - containers
      - criterion
      - deepseq
      - strato-model
      - vector

  extractbench:
    source-dirs: bench/
    main: ExtractBench.hs
    ghc-options: -dynamic
    other-modules: []
    dependencies:
      - bytestring
      - criterion

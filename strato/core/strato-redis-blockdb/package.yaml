name:                strato-redis-blockdb
version:             0.1.0.0
author:              BlockApps
maintainer:          blockapps
build-type:          Simple
description:         Functions to operate against the Redis-backed BlockDB
license:             Apache-2.0

dependencies:
  - base
  - blockapps-data
  - containers

library:
  source-dirs: src
  ghc-options: -Wall -Werror -O2
  dependencies:
  - QuickCheck
  - base16-bytestring
  - binary
  - bytestring
  - ethereum-rlp
  - format
  - hedis
  - monad-alter
  - mtl
  - strato-conf
  - strato-model


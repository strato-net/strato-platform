name: strato-p2p
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: a microservice that handles peer to peer connections for strato
license: Apache-2.0

dependencies:
  - base
  - common-log

ghc-options: -Wall -threaded


executables:
  strato-p2p:
    source-dirs: exec_src/
    main: StratoP2PMain.hs
    dependencies:
      - blockapps-init
      - ethereum-discovery
      - hflags
      - lifted-async
      - ordered-containers
      - process-monitor
      - strato-conf
      - strato-model
      - strato-p2p
      - vault-monad
      - vm-tools
      - wai-middleware-prometheus
      - warp
      
library:
  source-dirs: src
  ghc-options: -Wall -O2
  dependencies:
    - aeson
    - base16-bytestring
    - blockapps-data
    - blockapps-datadefs
    - blockDB
    - blockstanbul
    - bytestring
    - composable-monads-base
    - conduit
    - conduit-extra
    - containers
    - cross-monitoring
    - crypto-pubkey-types
    - dns
    - either
    - ethereum-discovery
    - ethereum-encryption
    - ethereum-rlp
    - format
    - hedis
    - hflags
    - http-client
    - iproute
    - kafka-monad
    - lens
    - lifted-async
    - lifted-base
    - merkle-patricia-db
    - monad-alter
    - mtl
    - network
    - ordered-containers
    - persistent
    - prometheus-client
    - resourcet
    - seqevents
    - servant-client
    - servant-server
    - split
    - sql-monad
    - stm-conduit
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - text
    - time
    - unliftio-core
    - unliftio
    - vault-monad
    - warp


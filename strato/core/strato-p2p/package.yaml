name: strato-p2p
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: a microservice that handles peer to peer connections for strato

dependencies:
  - base
  - blockapps-data
  - common-log
  - extra
  - vm-tools
  - x509-certs

ghc-options: -Wall -threaded

executables:
  strato-p2p:
    source-dirs: exec_src/
    main: StratoP2PMain.hs
    dependencies:
      - blockapps-init
      - ethereum-discovery
      - hflags
      - lifted-async
      - ordered-containers
      - resourcet
      - strato-model
      - strato-p2p
      - thread-hierarchy
      - unagi-chan
      - wai-middleware-prometheus
      - warp
      
library:
  source-dirs: src
  ghc-options: -Wall -O2
  dependencies:
    - SafeSemaphore
    - aeson
    - async
    - alarmclock
    - ansi-wl-pprint
    - base16-bytestring
    - blockapps-datadefs
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - blockstanbul
    - broadcast-chan
    - bytestring
    - concurrency
    - conduit

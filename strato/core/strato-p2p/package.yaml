    - dlist
    - dns
    - either
    - ethereum-discovery
    - ethereum-encryption
    - ethereum-rlp
    - format
    - ghc
    - hedis
    - hflags
    - http-client
    - iproute
    # - json-rpc
    - json-rpc-server
    - json-rpc-client
    - lens
    - lifted-async
    - lifted-base
    - milena
    - milena-tools
    - monad-alter
    - monad-control
    - monad-logger
    - monadIO
    - mtl
    - network
    - ordered-containers
    - persistent
    - prometheus-client
    - random
    - Ranged-sets
    - resourcet
    - seqevents
    - servant-client
    - servant-server
    - split
    - stm
    - stm-conduit
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - text
    - these
    - thread-hierarchy
    - time
    - transformers
      #- unagi-chan
    - unliftio-core
    - unliftio 

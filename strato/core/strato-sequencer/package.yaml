name:                strato-sequencer
version:             0.1.0.0
author:              Ilya Ostrovskiy
maintainer:          ilya@blockapps.net
copyright:           2016 BlockApps Inc
category:            Blockchain
build-type:          Simple
license:             Apache-2.0

dependencies:
  - base

ghc-options: -Wall -O2 -threaded -rtsopts -fprof-auto

library:
  source-dirs:     src
  dependencies:
    - alarmclock
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-init
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - blockDB
    - blockstanbul
    - bytestring
    - clock
    - common-log
    - conduit
    - directory
    - format
    - hflags
    - http-client
    - kafka-monad
    - labeled-error
    - lens
    - leveldb-haskell
    - monad-alter
    - prometheus-client
    - seqevents
    - stm-conduit
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - servant-client
    - text
    - time
    - classy-prelude
    - containers
    - mtl
    - stm-chans
    - transformers
    - resourcet

executables:
  strato-sequencer:
    source-dirs:      exec-src
    main:             Main.hs
    dependencies:
      - async
      - blockapps-data
      - blockapps-init
      - blockapps-vault-wrapper-api
      - blockapps-vault-wrapper-client
      - blockDB
      - blockstanbul
      - common-log
      - format
      - hedis
      - hflags
      - http-client
      - process-monitor
      - prometheus-client
      - seqevents
      - servant-client
      - stm
      - stm-chans
      - strato-conf
      - strato-model
      - strato-redis-blockdb
      - strato-sequencer
      - text
      - wai-middleware-prometheus
      - warp
    other-modules: []

  forced-config-change:
    source-dirs: exec-src
    main: ForcedConfigChange.hs
    other-modules: []
    dependencies:
      - blockstanbul
      - hflags
      - kafka-monad
      - seqevents
      - strato-conf


benchmarks:
  send-to-blockstanbul:
    source-dirs: bench/
    main: BlockstanbulSend.hs
    ghc-options: -dynamic
    dependencies:
      - blockstanbul
      - strato-sequencer
      - blockapps-data
      - classy-prelude

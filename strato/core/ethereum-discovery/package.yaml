name:                ethereum-discovery
version:             0.1.0.0
author:              jamshid
maintainer:          jim
build-type:          Simple

ghc-options: -Wall -O2

dependencies:
  - base
  - network

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.Strato.Discovery.Data.Peer
    - Blockchain.Strato.Discovery.UDP
    - Blockchain.Strato.Discovery.P2PUtil
    - Executable.EthereumDiscovery
    - Executable.EthDiscoverySetup
    - Executable.Options
  dependencies:
    - base16-bytestring
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-proxy-wrapper-api #Will need to be changed
    - blockapps-proxy-wrapper-client
    - bytestring
    - common-log
    - cpu
    - crypto-pubkey-types
    - either
    - entropy
    - errors
    - ethereum-encryption
    - ethereum-rlp
    - exceptions
    - format
    - hflags
    - http-client
    - labeled-error
    - monad-alter
    - mtl
    - network-uri
    - persistent
    - persistent-postgresql
    - prometheus-client
    - random
    - resourcet
    - servant-client
    - split
    - strato-conf
    - strato-model
    - text
    - time
    - unliftio
    - unliftio-core

executables:
  ethereum-discover:
    source-dirs:       exec_src/
    main:             Main.hs
    dependencies:
      - blockapps-init
      - common-log
      - ethereum-discovery
      - hflags

tests:
  ethereum-discover-test:
    source-dirs: test/
    main: Spec.hs
    ghc-options: -Wall -Werror
    dependencies:
      - ethereum-discovery
      - format
      - hspec

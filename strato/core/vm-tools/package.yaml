name: vm-tools
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: types and tools needed to write a VM for Strato
category:      Data Structures

dependencies:
  - base
  - hflags

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.Bagger
    - Blockchain.Bagger.BaggerState
    - Blockchain.Bagger.Transactions
    - Blockchain.Data.BlockSummary
    - Blockchain.Data.ExecResults
    - Blockchain.DB.BlockSummaryDB
    - Blockchain.DB.ModifyStateDB
    - Blockchain.Stream.Action
    - Blockchain.Stream.VMEvent
    - Blockchain.Stream.VMOutput
    - Blockchain.Timing
    - Blockchain.TxRunResultCache
    - Blockchain.MemVMContext
    - Blockchain.VMContext
    - Blockchain.VMOptions
    - Blockchain.VM.VMException
    - Blockchain.VMMetrics
    - Blockchain.Wiring
    - Executable.EVMFlags
  ghc-options: -Wall -O2
  dependencies:
    - aeson
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-init
    - blockapps-mpdbs
    - bytestring
    - common-log
    - composable-monads-base
    - conduit
    - containers
    - cross-monitoring
    - data-default
    - debugger
    - deepseq
    - directory
    - dlist
    - ethereum-rlp
    - exceptions
    - extra
    - format
    - generic-arbitrary
    - hedis
    - lens
    - leveldb-haskell
    - lrucache
    - merkle-patricia-db
    - milena
    - milena-tools
    - monad-alter
    - mtl
    - nibblestring
    - persistent-sqlite
    - prometheus-client
    - QuickCheck
    - quickcheck-instances
    - resourcet
    - seqevents
    - solid-vm-model
    - sql-monad
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - strato-statediff
    - text
    - time
    - transformers
    - unliftio
    - x509-certs



tests:
  contextm-test:
    source-dirs: test/
    main: Spec.hs
    ghc-options: -Wall -O2 -dynamic
    dependencies:
      - hspec
      - vm-tools

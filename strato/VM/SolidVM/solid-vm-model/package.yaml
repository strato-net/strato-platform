name: solid-vm-model
license: Apache-2.0

dependencies:
  - base

default-extensions:
  - BangPatterns
  - OverloadedStrings

library:
  source-dirs: src/
  dependencies:
  - aeson >=2.1.1.0 && <2.3
  - aeson-casing
  - attoparsec
  - base16-bytestring
  - binary
  - bytestring
  - containers
  - cryptonite
  - data-default
  - Decimal
  - deepseq
  - esqueleto
  - ethereum-rlp
  - format
  - generic-random
  - hashable
  - labeled-error
  - lens
  - persistent
  - QuickCheck
  - quickcheck-instances
  - regex-tdfa
  - scientific
  - servant-server
  - source-tools
  - strato-model
  - openapi3
  - text
  - utf8-string
  - vector

tests:
  storage-test:
    source-dirs: test/
    main: Main.hs
    ghc-options: -dynamic
    other-modules:
      - BasicValueStringTest
      - StorageTest
    dependencies:
      - bytestring
      - ethereum-rlp
      - format
      - hspec
      - persistent
      - solid-vm-model
      - unliftio

benchmarks:
  storage-bench:
    source-dirs: bench/
    main: StorageBench.hs
    ghc-options: -dynamic
    other-modules: []
    dependencies:
      - binary
      - bytestring
      - cereal
      - ethereum-rlp
      - solid-vm-model
      - strato-model
      - criterion

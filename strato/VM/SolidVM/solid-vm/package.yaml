name: solid-vm

dependencies:
  - base
  - blockapps-haskoin

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.SolidVM
    - Blockchain.SolidVM.Simple
    - Blockchain.SolidVM.SM
    - Blockchain.SolidVM.CodeCollectionDB
    - SolidVM.CodeCollectionTools
  ghc-options: -Wall -O2
  dependencies:
  - aeson
  - base16-bytestring
  - binary
  - bloc2
  - blockapps-data
  - blockapps-datadefs
  - blockapps-mpdbs
  - bytestring
  - common-log
  - containers
  - cryptohash
  - data-default
  - debugger
  - deepseq
  - ethereum-rlp
  - exceptions
  - extra
  - format
  - labeled-error
  - lens
  - memory
  - merkle-patricia-db
  - monad-alter
  - nibblestring
  - parsec
  - prometheus-client
  - solid-vm-model
  - solid-vm-parser
  - solid-vm-static-analysis
  - source-tools
  - strato-model
  - text
  - time
  - transformers
  - unliftio
  - utf8-string
  - vector
  - vm-tools



executables:
  exprs-needed:
    source-dirs: exec_src
    other-modules: []
    main: ExprsNeeded.hs
    dependencies:
      - containers
      - parsec
      - solid-vm
      - solid-vm-model
      - solid-vm-parser
      - solid-vm-static-analysis
      - text
      - deepseq

tests:
  solid-vm-spec:
    source-dirs: tests/
    main: Main.hs
    dependencies:
      - async
      - base16-bytestring
      - blockapps-datadefs
      - blockapps-mpdbs
      - bytestring
      - common-log
      - containers
      - deepseq
      - ethereum-rlp
      - hflags
      - hspec
      - hspec-expectations-lifted
      - labeled-error
      - lens
      - merkle-patricia-db
      - monad-alter
      - raw-strings-qq
      - solid-vm
      - solid-vm-model
      - solid-vm-static-analysis
      - source-tools
      - strato-model
      - text
      - time
      - vm-tools
      - utf8-string
      - test-framework
      - QuickCheck
      - solid-vm-parser

benchmarks:
    codebench:
      source-dirs: bench/
      main: CodeBench.hs
      dependencies:
        - file-embed
        - solid-vm
        - deepseq
        - criterion
        - binary
        - memory
        - bytestring
        - containers
        - text
        - parsec
        - strato-model
        - solid-vm-parser
        - solid-vm-static-analysis
        - solid-vm-model
        - lens
        - common-log
        - vm-tools
        - hflags

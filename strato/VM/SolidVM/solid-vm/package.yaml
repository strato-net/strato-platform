name: solid-vm

dependencies:
  - base
  - blockapps-haskoin
  - x509-certs
  - monad-logger

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.SolidVM
    - Blockchain.SolidVM.Simple
    - Blockchain.SolidVM.SM
    - Blockchain.SolidVM.CodeCollectionDB
    - SolidVM.CodeCollectionTools
  ghc-options: -Wall -O2
  dependencies:
  - aeson
  - base16-bytestring
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-mpdbs
  - bytestring
  - common-log
  - containers
  - cryptohash
  - data-default
  - debugger
  - deepseq
  - ethereum-rlp
  - exceptions
  - extra
  - format
  - labeled-error
  - lens
  - lrucache
  - memory
  - merkle-patricia-db
  - monad-alter
  - nibblestring
  - parsec
  - prometheus-client
  - solid-vm-model
  - solid-vm-parser
  - solid-vm-static-analysis
  - source-tools
  - strato-model
  - text
  - time
  - transformers
  - unliftio
  - utf8-string
  - vector
  - vm-tools



executables:
  exprs-needed:
    source-dirs: exec_src
    other-modules: []
    main: ExprsNeeded.hs
    dependencies:
      - containers
      - parsec
      - solid-vm
      - solid-vm-model
      - solid-vm-parser
      - solid-vm-static-analysis
      - text
      - deepseq

tests:
  solid-vm-spec:
    source-dirs: tests/
    main: Main.hs
    ghc-options: -dynamic
    dependencies:
      - QuickCheck
      - aeson
      - ansi-wl-pprint
      - async
      - base16-bytestring
      - binary
      - blockapps-data
      - blockapps-datadefs
      - blockapps-init
      - blockapps-mpdbs
      - bytestring
      - common-log
      - composable-monads-base
      - containers
      - core-api2
      - crypto-api
      - data-default
      - debugger
      - deepseq
      - directory
      - ethereum-rlp
      - exceptions
      - extra
      - hedis
      - hflags
      - hspec
      - hspec-expectations-lifted
      - json-stream
      - labeled-error
      - lens
      - leveldb-haskell
      - merkle-patricia-db
      - milena
      - monad-alter
      - mtl
      - nibblestring
      - persistent-sqlite
      - raw-strings-qq
      - resourcet
      - seqevents
      - solid-vm
      - solid-vm-model
      - solid-vm-parser
      - solid-vm-static-analysis
      - source-tools
      - strato-conf
      - strato-genesis
      - strato-init
      - strato-model
      - strato-redis-blockdb
      - strato-statediff
      - test-framework
      - text
      - time
      - transformers
      - unliftio
      - utf8-string
      - vm-tools

benchmarks:
    codebench:
      source-dirs: bench/
      main: CodeBench.hs
      ghc-options: -dynamic
      dependencies:
        - file-embed
        - solid-vm
        - deepseq
        - criterion
        - binary
        - memory
        - bytestring
        - containers
        - text
        - parsec
        - strato-model
        - solid-vm-parser
        - solid-vm-static-analysis
        - solid-vm-model
        - lens
        - common-log
        - vm-tools
        - hflags

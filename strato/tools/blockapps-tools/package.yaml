name: blockapps-tools
version: 0.0.1
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum client
category:      Data Structures
description:
              Tool to query the ethereum databases
license: Apache-2.0

dependencies:
  - base


library:
  source-dirs: src/
  dependencies:
    - aeson
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-mpdbs
    - blockDB
    - blockstanbul
    - bytestring
    - common-log
    - data-default
    - ethereum-discovery
    - ethereum-rlp
    - filepath
    - format
    - hedis
    - hflags
    - kafka-monad
    - labeled-error
    - leveldb-haskell
    - merkle-patricia-db
    - monad-logger
    - monad-loops
    - nibblestring
    - persistent-postgresql
    - resourcet
    - seqevents
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - time
    - transformers
    - vm-tools

executables:
  strato-barometer:
    source-dirs: exec_src/
    main: Main.hs
    other-modules: []
    dependencies:
      - blockapps-tools
      - bytestring
      - cmdargs
      - labeled-error
      - merkle-patricia-db
      - process
      - seqevents
      - strato-model
      - strato-p2p
      - text

  b16decode:
    source-dirs: exec_src/
    main: B16Decode.hs
    dependencies:
      - base
      - bytestring
      - labeled-error
    other-modules: []
   
  modifyDate:
    source-dirs: exec_src/
    main: ModifyDate.hs
    dependencies:
      - base
      - hflags
      - time
    other-modules: []

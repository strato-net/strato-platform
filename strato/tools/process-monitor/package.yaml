name: process-monitor
version: 0.0.1
build-type: Simple
author: Dustin
maintainer:    dustin@blockapps.net
synopsis:      A per-process resource monitor for STRATO services
category:      Monitoring?
description:   A per-process resource monitor for STRATO services
license:       Apache-2.0

dependencies:
  - base
  - prometheus-client

library:
  source-dirs: src/
  dependencies:
    - containers
    - text

executables:
  process-monitor-exe:
    source-dirs: exec_src/
    main: Main.hs
    other-modules: []
    dependencies:
      - async
      - process
      - process-monitor
      - wai-middleware-prometheus
      - warp

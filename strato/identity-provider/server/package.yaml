name:                blockapps-identity-provider-server
version:             0.1.0.0
github:              "githubuser/blockapps-identity-provider-server"
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2023 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/identity-provider#readme>

dependencies:
- base
- common-log


library:
  source-dirs: src
  dependencies:
  - aeson
  - base64
  - bloc2api
  - bloc2client
  - blockapps-identity-provider-api
  - blockapps-vault-wrapper-client
  - blockapps-vault-wrapper-api
  - bytestring
  - containers
  - core-api2
  - evm-solidity
  - hflags
  - http-client
  - http-client-tls
  - http-types
  - monad-alter
  - mtl
  - resourcet
  - servant-client
  - servant-server
  - split
  - strato-model
  - text
  - transformers
  - unliftio
  - utf8-string
  - vault-monad
  - x509-certs

executables:
  identity-provider-server:
    main:                Main.hs
    source-dirs:         app
    other-modules: [Options]
    ghc-options:
    - -threaded
    dependencies:
    - aeson
    - blockapps-identity-provider-api
    - blockapps-identity-provider-server
    - bytestring
    - containers
    - hflags
    - http-client
    - transformers
    - warp
    - x509-certs
    - yaml

tests:
  identity-provider-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - blockapps-identity-provider-server

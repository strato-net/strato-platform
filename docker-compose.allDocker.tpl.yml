#strato-version:<VERSION>
#strato-getting-started-min-version:4.4.0
version: "3"
volumes:
  pgdata:
    driver: local
  prometheusdata:
    driver: local
  kafkadata:
    driver: local
  redisdata:
    driver: local
  zookeeperdata:
    driver: local
services:
  mercata-backend:
    depends_on:
      - strato
      - postgrest
    build: ./mercata/backend
    image: ${MERCATABACKEND_IMAGE:-<REPO_URL>mercata-backend:<VERSION>-<HASH_MERCATA_BACKEND>}
    init: true
    environment:
      - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - NODE_URL=http://nginx  # no TLS required within the docker network
      - BASE_URL=https://${NODE_HOST}  # todo: protocol to depend on ssl=true|false
      - RPC_URL_MAINNET=${RPC_URL_MAINNET}
      - RPC_URL_MAINNET_FALLBACK=${RPC_URL_MAINNET_FALLBACK}
      - RPC_URL_SEPOLIA=${RPC_URL_SEPOLIA}
      - RPC_URL_SEPOLIA_FALLBACK=${RPC_URL_SEPOLIA_FALLBACK}
      - RPC_URL_BASE=${RPC_URL_BASE}
      - RPC_URL_BASE_FALLBACK=${RPC_URL_BASE_FALLBACK}
      - RPC_URL_BASE_SEPOLIA=${RPC_URL_BASE_SEPOLIA}
      - RPC_URL_BASE_SEPOLIA_FALLBACK=${RPC_URL_BASE_SEPOLIA_FALLBACK}
      - POOL_FACTORY=${POOL_FACTORY}
      - LENDING_REGISTRY=${LENDING_REGISTRY}
      - TOKEN_FACTORY=${TOKEN_FACTORY}
      - ADMIN_REGISTRY=${ADMIN_REGISTRY}
      - MERCATA_BRIDGE=${MERCATA_BRIDGE}
      - WAGMI_PROJECT_ID=${WAGMI_PROJECT_ID}
      - STRATO_HOSTNAME=${STRATO_HOSTNAME:-strato}
      - STRATO_PORT_API=${STRATO_PORT_API:-3000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ONRAMP_HOT_WALLET_ADDRESS=${ONRAMP_HOT_WALLET_ADDRESS}
      - BA_USERNAME=${BA_USERNAME}
      - BA_PASSWORD=${BA_PASSWORD}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  mercata-ui:
    depends_on:
      - mercata-backend
    build: ./mercata/ui
    image: ${MERCATAUI_IMAGE:-<REPO_URL>mercata-ui:<VERSION>-<HASH_MERCATA_UI>}
    environment:
      - LUCKY_ORANGE_SITE_ID=${LUCKY_ORANGE_SITE_ID}
      - GOOGLE_ANALYTICS_ID=${GOOGLE_ANALYTICS_ID}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  smd:
    depends_on:
    - apex
    - postgrest
    - prometheus
    - strato
    environment:
    - NODE_HOST=${NODE_HOST}
    - ssl=${ssl:-false}
    build: .
    image: ${SMD_IMAGE:-<REPO_URL>smd:<VERSION>-<HASH_SMD>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  apex:
    depends_on:
    - postgres
    - prometheus
    - strato
    environment:
    - ADMIN_EMAIL=${ADMIN_EMAIL}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - PROMETHEUS_HOST=${PROMETHEUS_HOST:-prometheus:9090}
    - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    - STRATO_HOSTNAME=${STRATO_HOSTNAME:-strato}
    - STRATO_PORT_API=${STRATO_PORT_API:-3000}
    - STRATO_PORT_VAULT_PROXY=${STRATO_PORT_VAULT_PROXY:-8013}
    - MONITOR_URL=${MONITOR_URL}
    build: .
    image: ${APEX_IMAGE:-<REPO_URL>apex:<VERSION>-<HASH_APEX>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  redis:
    command: [redis-server, --appendonly, "yes"]
    image: redis:3.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - redisdata:/data
  strato:
    depends_on:
    - kafka
    - postgres
    - redis
    environment:
    - addBootnodes=${addBootnodes}
    - API_DEBUG_LOG=${API_DEBUG_LOG:-false}
    - appFetchLimit=${appFetchLimit}
    - averageTxsPerBlock=${averageTxsPerBlock}
    - blockstanbulBlockPeriodMs=${blockstanbulBlockPeriodMs}
    - blockstanbulRoundPeriodS=${blockstanbulRoundPeriodS}
    - blockTime=${blockTime}
    - bootnode=${bootnode}
    - connectionTimeout=${connectionTimeout}
    - validatorBehavior=${validatorBehavior:-true}
    - evmDebugMode=${evmDebugMode}
    - FILE_SERVER_URL=${FILE_SERVER_URL}
    - FULL_DEBUG_LOG=${FULL_DEBUG_LOG:-false}
    - gasLimit=${gasLimit}
    - generateKey=${generateKey:-true}
    - INSTRUMENTATION=${INSTRUMENTATION:-false}
    - kafkaHost=kafka
    - kafkaPort=9092
    - lazyBlocks=${lazyBlocks}
    - maxConn=${maxConn}
    - maxReturnedHeaders=${maxReturnedHeaders}
    - maxTxsPerBlock=${maxTxsPerBlock}
    - minBlockDifficulty=${minBlockDifficulty}
    - network=${network}
    - networkID=${networkID}
    - NOTIFICATION_SERVER_URL=${NOTIFICATION_SERVER_URL}
    - numMinPeers=${numMinPeers}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_VAULT_PROXY_ALT_CLIENT_ID=${OAUTH_VAULT_PROXY_ALT_CLIENT_ID}
    - OAUTH_VAULT_PROXY_ALT_CLIENT_SECRET=${OAUTH_VAULT_PROXY_ALT_CLIENT_SECRET}
    - OAUTH_RESERVE_SECONDS=${OAUTH_RESERVE_SECONDS}
    - P2P_DEBUG_LOG=${P2P_DEBUG_LOG}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_slipstream_db=cirrus
    - postgres_user=postgres
    - PROCESS_MONITORING=${PROCESS_MONITORING:-true}
    - redisBDBNumber=${redisBDBNumber}
    - redisHost=redis
    - redisPort=6379
    - seqMaxEventsPerIter=${seqMaxEventsPerIter}
    - seqMaxUsPerIter=${seqMaxUsPerIter}
    - seqRTSOPTs=${seqRTSOPTs}
    - SEQUENCER_DEBUG_LOG=${SEQUENCER_DEBUG_LOG:-false}
    - SLIPSTREAM_DEBUG_LOG=${SLIPSTREAM_DEBUG_LOG:-false}
    - SLIPSTREAM_OPTIONAL=${SLIPSTREAM_OPTIONAL}
    - strictBlockstanbul=${strictBlockstanbul}
    - strictGas=${strictGas}
    - strictGasLimit=${strictGasLimit}
    - svmTrace=${svmTrace}
    - sqlDiff=${sqlDiff}
    - svmDev=${svmDev}
    - test_mode_bypass_blockstanbul=${test_mode_bypass_blockstanbul:-false} \
    - txSizeLimit=${txSizeLimit}
    - useCustomGenesis=${useCustomGenesis}
    - VAULT_URL=${VAULT_URL}
    - VAULT_PROXY_DEBUG=${VAULT_PROXY_DEBUG}
    - VM_DEBUG_LOG=${VM_DEBUG_LOG:-false}
    - vmRunnerRTSOPTs=${vmRunnerRTSOPTs}
    - zkHost=zookeeper
    build: .
    image: ${STRATO_IMAGE:-<REPO_URL>strato:<VERSION>-<HASH_STRATO>}
    ports:
    - 30303:30303
    - 30303:30303/udp
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - ./nodedata:/var/lib/strato
  postgrest:
    depends_on:
    - postgres
    environment:
    - blocHost=${blocHost:-strato:3000}
    - PG_ENV_POSTGRES_DB=cirrus
    - PG_ENV_POSTGRES_HOST=postgres
    - PG_ENV_POSTGRES_PASSWORD=${postgres_password:-api}
    - PG_ENV_POSTGRES_USER=postgres
    - PG_PORT_5432_TCP_PORT=5432
    - POSTGREST_LOG_LEVEL=${POSTGREST_LOG_LEVEL:-error}
    build: .
    image: ${POSTGREST_IMAGE:-<REPO_URL>postgrest:<VERSION>-<HASH_POSTGREST>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  postgres:
    environment:
      - POSTGRES_DB=eth
      - POSTGRES_PASSWORD=${postgres_password:-api}
    image: postgres:14.18
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - apex
    - docs
    - postgrest
    - prometheus
    - smd
    - strato
    - mercata-backend
    - mercata-ui
    environment:
    - APEX_HOST=${APEX_HOST}
    - blockTime=${blockTime}
    - DOCS_HOST=${DOCS_HOST}
    - NGINX_TRUST_PROXY_CIDRS=${NGINX_TRUST_PROXY_CIDRS}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - POSTGREST_HOST=${POSTGREST_HOST}
    - PROMETHEUS_HOST=${PROMETHEUS_HOST:-prometheus:9090}
    - SERVE_LOGS=${SERVE_LOGS}
    - SMD_DEV_MODE=${SMD_DEV_MODE}
    - SMD_DEV_MODE_HOST_IP=${SMD_DEV_MODE_HOST_IP}
    - SMD_HOST=${SMD_HOST}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - STATS_ENABLED=${STATS_ENABLED}
    - STRATO_HOSTNAME=${STRATO_HOSTNAME:-strato}
    - STRATO_PORT_API=${STRATO_PORT_API:-3000}
    - STRATO_PORT_API2=${STRATO_PORT_API2}
    - STRATO_PORT_LOGS=${STRATO_PORT_LOGS}
    - STRATO_PORT_VAULT_PROXY=${STRATO_PORT_VAULT_PROXY:-8013}
    - VAULT_URL=${VAULT_URL}
    build: .
    image: ${NGINX_IMAGE:-<REPO_URL>nginx:<VERSION>-<HASH_NGINX>}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  docs:
    environment:
    - API_URL=/docs/swagger.yaml
    image: swaggerapi/swagger-ui:v5.29.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  zookeeper:
    image: zookeeper:3.9.3
    restart: unless-stopped
    volumes:
      - zookeeperdata:/data
    environment:
      ZOO_DATA_LOG_DIR: /data
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  kafka:
    depends_on:
    - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_CLEANER_ENABLE: "true"
      KAFKA_LOG_DIRS: '/kafka/kafka-logs'
      KAFKA_LOG_RETENTION_HOURS: 168  # Set to 7 days
      KAFKA_OFFSET_METADATA_MAX_BYTES: 1048576
      KAFKA_OFFSETS_RETENTION_MINUTES: 2147483647 # Leaving as infinite for now
      KAFKA_MAX_REQUEST_SIZE: ${KAFKA_MAX_REQUEST_SIZE:-2500000}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-2500000}
    image: registry-aws.blockapps.net:5000/blockapps-repo/kafka:2.12-2.0.1
    restart: unless-stopped
    volumes:
    - kafkadata:/kafka
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  prometheus:
    build: .
    environment:
      - NODE_HOST=${NODE_HOST}
      - STRATO_HOSTNAME=${STRATO_HOSTNAME:-strato}
    image: ${PROMETHEUS_IMAGE:-<REPO_URL>prometheus:<VERSION>-<HASH_PROMETHEUS>}
    volumes:
    - prometheusdata:/prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

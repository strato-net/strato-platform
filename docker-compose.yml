version: '2'

services:
  zookeeper:
    image: zookeeper-packager
    restart: always
  kafka:
    image: kafka-packager
    restart: always
    links:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_HOST_NAME: "kafka"
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 2147483647
  postgres:
    image: postgres-packager
    restart: always
  strato:
    image: strato
    links:
      - zookeeper
      - kafka
      - postgres
    restart: always
    ports:
      - "3000:3000"
      - "30303:30303"
      - "30303:30303/udp"
    environment:
      fqdn : "${fqdn}"
      mode : "${mode}"
      networkId : "${networkId}"
      peers : "${peers}"
      genesisBlock: "${genesisBlock}"
  bloc:
    image: bloc
    restart: always
    ports:
      - 8000:8000
    environment:
      fqdn: "${fqdn}/strato-api"
  nginx:
    image: nginx-packager
    restart: always
    volumes: 
      - /etc/ssl/private:/etc/ssl/private
      - /etc/ssl/certs:/etc/ssl/certs
    ports:
      - "443:443"
    depends_on:
      - strato
      - bloc

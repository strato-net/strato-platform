version: '2'

services:
  zookeeper:
    image: zookeeper-packager
    restart: always
    ports:
      - "2181:2181"
  kafka:
    image: kafka-packager
    restart: always
    links:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_HOST_NAME: "kafka"
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 2147483647
    ports:
      - "9092:9092"
  postgres:
    image: postgres-packager
    restart: always
  strato:
    image: strato
    links:
      - zookeeper
      - kafka
      - postgres
    restart: always
    ports:
      - "30303:30303"
      - "30303:30303/udp"
    environment:
      networkId : "${networkId}"
      genesis: "${genesis}"
      genesisBlock: "${genesisBlock}"
      bootnode: "${bootnode}"
      addBootnodes: "${addBootnodes}"
      lazyBlocks: "${lazyBlocks}"
      miningAlgorithm: "${miningAlgorithm}"
  bloc:
    image: bloc
    restart: always
    environment:
      ssl: "${ssl}"
      stratoHost: "${stratoHost}"
      apiUrlOverride: "${apiUrlOverride}"

  postgres-cirrus:
    image: postgres:9.6
    environment:
      POSTGRES_DB: cirrus
      POSTGRES_USER: postgres
      PG_ENV_POSTGRES_DB: cirrus
      PG_ENV_POSTGRES_USER: postgres
    ports:
      - '5434:5432'
  postgrest:
    image:  postgrest-packager
    restart: always
    environment:
      POSTGRES_DB: cirrus
      POSTGRES_USER: postgres
      PG_ENV_POSTGRES_DB: cirrus
      PG_ENV_POSTGRES_USER: postgres
      PG_PORT_5433_TCP_PORT: 5432
    links:
      - postgres-cirrus:postgres
    ports:
      - '3001:3001'
  cirrus:
    image: cirrus
    links:
      - strato:strato
      - postgres-cirrus:postgres
  explorer:
    image: strato-explorer
    ports:
      - 9000:9000
    restart: always
    environment:
      peers: "${peers}"
    links:
      - strato:strato
      - bloc:bloc
  
  nginx:
    image: nginx-packager
    restart: always
    volumes:
      - /etc/ssl/private:/etc/ssl/private
      - /etc/ssl/certs:/etc/ssl/certs
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - strato
      - bloc
      - cirrus
      - postgrest
      - explorer
    environment:
      ssl: "${ssl}"

postgres:
  image: postgres:9.6
  environment:
    POSTGRES_DB: cirrus
    POSTGRES_USER: postgres
    PG_ENV_POSTGRES_DB: cirrus
    PG_ENV_POSTGRES_USER: postgres    
  ports:
    - '5433:5432'

postgrest:
  image: cirrus-postgrest
  environment:
    POSTGRES_DB: cirrus
    POSTGRES_USER: postgres
    PG_ENV_POSTGRES_DB: cirrus
    PG_ENV_POSTGRES_USER: postgres
    PG_PORT_5433_TCP_PORT: 5433
  links:
    - postgres:postgres
  ports:
    - '3000:3000'
#  entrypoint: ./wait-for-it.sh postgres:5432

service:
  build: .
  command: node_modules/.bin/nodemon cirrus.js
  environment:
    NODE_ENV: development
  ports:
    - '3333:3333'
  volumes:
    - .:/home/app/cirrus
    - /home/app/cirrus/node_modules
  links:
    - postgrest:postgrest
    - postgres:postgres
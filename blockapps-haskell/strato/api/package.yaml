name: blockapps-strato-api
version: 0.1.0.0
synopsis: Strato microservice
description: Strato microservice API definitions
author: Eitan Chatav
maintainer: eitan@blockapps.net
copyright: 2016 BlockApps
category: Web
build-type: Simple

ghc-options: -Wall -Werror

dependencies:
  - base
  - blockapps-ethereum
  - aeson
  - generic-random
  - QuickCheck
  - quickcheck-instances
  - strato-model
  - text

library:
  source-dirs: src/
  dependencies:
  - aeson-casing
  - binary
  - bytestring
  - containers
  - lens
  - servant
  - servant-docs
  - swagger2

tests:
  blockapps-strato-api-test:
    main: Spec.hs
    source-dirs: test/
    dependencies:
      - aeson-qq
      - blockapps-strato-api
      - hspec

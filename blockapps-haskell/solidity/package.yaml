name: blockapps-solidity
version: 0.1.0.0
synopsis: Solidity datatypes
description: Solidity datatypes
github: blockapps/strato-platform/blockapps-haskall/blockapps-solidity
license: BSD3
license-file: LICENSE
author: Eitan Chatav
maintainer: eitan@blockapps.net
copyright: 2016 BlockApps
category: Web
build-type: Simple

ghc-options: -Wall -Werror

default-extensions:
  - DeriveGeneric
  - DeriveAnyClass
  - LambdaCase

dependencies:
  - base
  - blockapps-ethereum
  - aeson
  - aeson-casing
  - base16-bytestring
  - bimap
  - binary
  - bytestring
  - classy-prelude
  - containers
  - cryptonite
  - deepseq
  - extra
  - generic-random
  - hashable
  - http-api-data
  - ilist
  - lens
  - logging-effect
  - memory
  - mtl
  - ordered-containers
  - parsec
  - parsec3-numbers
  - QuickCheck
  - quickcheck-instances
  - raw-strings-qq
  - semver-range
  - servant
  - servant-docs
  - solid-vm-model
  - strato-model
  - swagger2
  - text
  - unordered-containers
  - vector

library:
  source-dirs: src/

tests:
  blockapps-solidity-test:
    main: Main.hs
    source-dirs: test/
    dependencies:
     - aeson-qq
     - blockapps-solidity
     - blockapps-strato-api
     - hspec

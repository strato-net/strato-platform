name: blockapps-bloc22-server
version: 0.1.0.0
synopsis: Bloc microservice
description: Bloc microservice
github: blockapps/strato-platform/blockapps-haskell/blockapps-bloc
license: BSD3
license-file: LICENSE
author: Eitan Chatav
maintainer: eitan@blockapps.net
copyright: 2016 BlockApps
category: Web
build-type: Simple


dependencies:
  - base
  - blockapps-solidity
  - containers
  - text

library:
  source-dirs: src/
  ghc-options: -Wall -Werror -fsimpl-tick-factor=15000
  dependencies:
    - aeson
    - base16-bytestring
    - blockapps-bloc22-api
    - blockapps-ethereum
    - blockapps-strato-api
    - blockapps-strato-client
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - bytestring
    - classy-prelude
    - common-log
    - cryptonite
    - directory
    - extra
    - filepath
    - haskoin-shim
    - http-client
    - http-types
    - insert-ordered-containers
    - lens
    - memory
    - monad-control
    - mtl
    - opaleye
    - ordered-containers
    - postgresql-simple
    - process
    - product-profunctors
    - profunctors
    - relapse
    - resource-pool
    - saltine
    - servant
    - servant-client
    - servant-server
    - servant-swagger
    - strato-model
    - swagger2
    - temporary
    - time
    - transformers
    - unliftio
    - unordered-containers
    - vector

tests:
  blockapps-bloc22-server-test:
    source-dirs: test/
    main: Spec.hs
    ghc-options: -Wall -Werror
    dependencies:
      - blockapps-bloc22-server
      - hspec
      - parsec

name: slipstream
version: 0.1.0.0
synopsis: Solidity datatypes
description: Solidity datatypes
homepage: https://github.com/blockapps/blockapps-haskell/slipstream
license: BSD3
license-file: LICENSE
copyright: 2016 BlockApps
category: Web

library:
  source-dirs: src/

ghc-options: -Wall -Werror -ddump-to-file -ddump-splices

dependencies:
  - base
  - aeson
  - base16-bytestring
  - lifted-base
  - binary
  - blockapps-bloc22-api
  - blockapps-bloc22-server
  - blockapps-ethereum
  - blockapps-solidity
  - blockapps-strato-client
  - blockapps-strato-api
  - bytestring
  - classy-prelude
  - conduit
  - conduit-combinators
  - containers
  - data-default
  - hflags
  - hslogger
  - http-client
  - largeword
  - lens
  - logging-effect
  - milena
  - MissingH
  - monad-control
  - mtl
  - network
  - ordered-containers
  - persistent
  - persistent-template
  - postgresql-simple
  - postgresql-typed
  - prometheus-client
  - resource-pool
  - resourcet
  - retry
  - scientific
  - semigroups
  - servant-client
  - split
  - template-haskell
  - text
  - time
  - transformers-base
  - transformers
  - unliftio
  - unliftio-core
  - unordered-containers
  - vector
  - warp
  - wai-middleware-prometheus

executables:
  slipstream:
    source-dirs: exec_src/
    main: Main.hs
    dependencies:
      - base
      - hflags
      - milena
      - monad-control
      - mtl
      - slipstream
      - time

tests:
  slipstream-test:
    main: Spec.hs
    source-dirs: tests/
    dependencies:
      - base >=4 && < 5
      - aeson
      - base16-bytestring
      - bytestring
      - containers
      - hflags
      - hspec
      - hspec-expectations-lifted
      - monad-logger
      - largeword
      - parsec
      - persistent-sqlite
      - QuickCheck
      - raw-strings-qq
      - slipstream
      - text

#strato-version:<VERSION>
#strato-getting-started-min-version:4.0
version: "3"
volumes:
  marketplacedata:
   driver: local
  pgdata:
    driver: local
  prometheusdata:
    driver: local
  kafkadata:
    driver: local
  redisdata:
    driver: local
  stratodata:
    driver: local
  zookeeperdata:
    driver: local
services:
  smd:
    depends_on:
    - apex
    - postgrest
    - prometheus
    - strato
    environment:
    - NODE_HOST=${NODE_HOST}
    - NODE_NAME=${NODE_NAME}
    - ssl=${ssl:-false}
    build: .
    image: ${SMD_IMAGE:-<REPO_URL>smd:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  apex:
    depends_on:
    - postgres
    - prometheus
    - strato
    environment:
    - NODE_HOST=${NODE_HOST}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - PROMETHEUS_HOST=${PROMETHEUS_HOST}
    - STRATO_HOSTNAME=${STRATO_HOSTNAME}
    - STRATO_PORT_API=${STRATO_PORT_API}
    - STRATO_PORT_VAULT_PROXY=${STRATO_PORT_VAULT_PROXY}
    build: .
    image: ${APEX_IMAGE:-<REPO_URL>apex:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  marketplace-backend:
    depends_on:
    - nginx
    environment:
    - IS_BOOTNODE=${IS_BOOTNODE:-true}
    - DAPP_CHAIN_ID=${DAPP_CHAIN_ID} # TODO: when running IS_BOOTNODE=false (default), the app needs to know which dapp chain to use. Also requires app-side changes to use DAPP_CHAIN_ID instead of deploy.yaml file
    - API_DEBUG=${API_DEBUG:-false}
    - CONFIG_DIR_PATH=/config
    - DEPLOY_FILE_NAME=${DEPLOY_FILE_NAME:-marketplace.deploy.yaml} # TODO: will be obsolete once DAPP_CHAIN_ID is implemented
    - ORG_DEPLOY_FILE_NAME=${DEPLOY_FILE_NAME:-org.deploy.yaml}
    - SERVER_HOST=${NODE_HOST}/marketplace/ # TODO: /marketplace/ path suffix should be added in the app code instead
    - SERVER_IP=${SERVER_IP} # TODO: used for enode addresses (still required?)
    - NODE_LABEL=${NODE_NAME} # TODO: obsolete? (label is not used in config.yaml)
    - STRATO_NODE_PROTOCOL=${CUSTOM_STRATO_NODE_PROTOCOL:-http} # TODO: hardcode 'http' in code, have 'CUSTOM_STRATO_NODE_PROTOCOL=${CUSTOM_STRATO_NODE_PROTOCOL}' here
    - STRATO_NODE_HOST=${CUSTOM_STRATO_NODE_HOST:-nginx} # TODO: hardcode 'nginx' in code, have 'CUSTOM_STRATO_NODE_HOST=${CUSTOM_STRATO_NODE_HOST}' here
    - OAUTH_APP_TOKEN_COOKIE_NAME=${OAUTH_APP_TOKEN_COOKIE_NAME:-stratomp_session}
    - OAUTH_OPENID_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_CLIENT_ID=${OAUTH_VAULT_PROXY_ALT_CLIENT_ID:-$OAUTH_CLIENT_ID} # should only be used for client credentials flow in the app going forward. Use same client id as vault-proxy in strato container (in case if client-credentials flow is not supported by same client as auth code grant in nginx, e.g. for AWS Cognito)
    - OAUTH_CLIENT_SECRET=${OAUTH_VAULT_PROXY_ALT_CLIENT_SECRET:-$OAUTH_CLIENT_SECRET}
    - OAUTH_SCOPE=${OAUTH_SCOPE:-email openid} # TODO: to be removed after app oauth changes
    - OAUTH_SERVICE_OAUTH_FLOW=client-credential
    - OAUTH_TOKEN_FIELD=access_token
    - OAUTH_TOKEN_USERNAME_PROPERTY=${OAUTH_TOKEN_USERNAME_PROPERTY:-email}
    - OAUTH_TOKEN_USERNAME_PROPERTY_SERVICE_FLOW=${OAUTH_TOKEN_USERNAME_PROPERTY_SERVICE_FLOW:-sub}
    - ORG_NAME=${ORG_NAME:-} # TODO: figure out what to use
    - ADMIN_NAME=${ADMIN_NAME:-} # TODO: figure out what to use
    - ADMIN_PASSWORD=${ADMIN_PASSWORD:-} # TODO: figure out what to use
    - STRIPE_PUBLISHABLE_KEY='pk_test_51Ma27ZKRjQhi20SKEfR6ganfwqianD3pSEJaQP2dhdXmQEVdlAmtTuybS52tFogwHuZGGs4psbhQwLGT7tGSZoCe00wJpwJ6bA'
    - STRIPE_SECRET_KEY='sk_test_aD9bKDRfx2AU5PYFRTnDEkT6'
    - CLIENT_URL=${NODE_HOST}
    - GLOBAL_ADMIN_NAME=admin@tcommerce.mercata
    - GLOBAL_ADMIN_PASSWORD=%9V37!P$dfTE
    - BAYER_ADMIN_NAME=vijay_rajasekaran@blockapps.net
    - BAYER_ADMIN_PASSWORD=Software101
    - ORG_NAME='BlockApps'
    build: .
    image: ${MARKETPLACEBACKEND_IMAGE:-<REPO_URL>marketplace-backend:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
       - marketplacedata:/config:rw
  marketplace-ui:
    depends_on:
      - marketplace-backend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    build: .
    image: ${MARKETPLACEUI_IMAGE:-<REPO_URL>marketplace-ui:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  redis:
    command: [redis-server, --appendonly, "yes"]
    image: redis:3.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - redisdata:/data
  strato:
    depends_on:
    - kafka
    - postgres
    - redis
    environment:
    - addBootnodes=${addBootnodes}
    - appFetchLimit=${appFetchLimit}
    - averageTxsPerBlock=${averageTxsPerBlock}
    - blockstanbul=${blockstanbul}
    - blockstanbulBlockPeriodMs=${blockstanbulBlockPeriodMs}
    - blockstanbulRoundPeriodS=${blockstanbulRoundPeriodS}
    - blockTime=${blockTime}
    - bootnode=${bootnode}
    - brokenRefundReenable=${brokenRefundReenable}
    - cacheTransactionResults=${cacheTransactionResults}
    - certInfo=${certInfo}
    - connectionTimeout=${connectionTimeout}
    - debugFail=${debugFail}
    - debugPort=${debugPort}
    - debugWSPort=${debugWSPort}
    - validatorBehavior=${validatorBehavior:-true}
    - evmDebugMode=${evmDebugMode}
    - evmTraceMode=${evmTraceMode}
    - faucetEnabled=${faucetEnabled}
    - gasOn=${gasOn:-false}
    - generateKey=${generateKey:-true}
    - genesis=${genesis}
    - kafkaHost=kafka
    - kafkaPort=9092
    - lazyBlocks=${lazyBlocks}
    - maxConn=${maxConn}
    - maxReturnedHeaders=${maxReturnedHeaders}
    - maxTxsPerBlock=${maxTxsPerBlock}
    - minBlockDifficulty=${minBlockDifficulty}
    - mineBlocks=${mineBlocks:-true}
    - miningAlgorithm=${miningAlgorithm}
    - miningThreads=${miningThreads}
    - network=${network:-blockappsnet}
    - networkID=${networkID}
    - numMinPeers=${numMinPeers}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_VAULT_PROXY_ALT_CLIENT_ID=${OAUTH_VAULT_PROXY_ALT_CLIENT_ID}
    - OAUTH_VAULT_PROXY_ALT_CLIENT_SECRET=${OAUTH_VAULT_PROXY_ALT_CLIENT_SECRET}
    - OAUTH_RESERVE_SECONDS=${OAUTH_RESERVE_SECONDS}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_slipstream_db=cirrus
    - postgres_user=postgres
    - PROCESS_MONITORING=${PROCESS_MONITORING}
    - redisBDBNumber=${redisBDBNumber}
    - redisHost=redis
    - redisPort=6379
    - requireCerts=${requireCerts:-true}
    - seqDebugMode=${seqDebugMode}
    - seqEventsBatchSize=${seqEventsBatchSize}
    - seqEventsCostHeuristic=${seqEventsCostHeuristic}
    - seqMaxEventsPerIter=${seqMaxEventsPerIter}
    - seqMaxUsPerIter=${seqMaxUsPerIter}
    - seqRTSOPTs=${seqRTSOPTs}
    - SLIPSTREAM_DEBUG=${SLIPSTREAM_DEBUG}
    - SLIPSTREAM_OPTIONAL=${SLIPSTREAM_OPTIONAL}
    - splitinit=true
    - stratoHost=strato:3000
    - svmTrace=${svmTrace}
    - sqlDiff=${sqlDiff}
    - svmDev=${svmDev}
    - useSyncMode=${useSyncMode}
    - VAULT_URL=${VAULT_URL}
    - VAULT_PROXY_DEBUG=${VAULT_PROXY_DEBUG}
    - vmDebug=${vmDebug}
    - vmRunnerRTSOPTs=${vmRunnerRTSOPTs}
    - wireMessageCacheSize=${wireMessageCacheSize}
    - wsDebug=${wsDebug}
    - zkHost=zookeeper
    - EVM_COMPATIBLE=${EVM_COMPATIBLE}
    - indexEVM=${indexEVM:-false}
    build: .
    image: ${STRATO_IMAGE:-<REPO_URL>strato:<VERSION>}
    ports:
    - 30303:30303
    - 30303:30303/udp
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - stratodata:/var/lib/strato
      - ./genesis-block.json:/var/lib/strato/${genesis:-gettingStarted}Genesis.json
  postgrest:
    depends_on:
    - postgres
    environment:
    - blocHost=${blocHost:-strato:3000}
    - PG_ENV_POSTGRES_DB=cirrus
    - PG_ENV_POSTGRES_HOST=postgres
    - PG_ENV_POSTGRES_PASSWORD=${postgres_password:-api}
    - PG_ENV_POSTGRES_USER=postgres
    - PG_PORT_5432_TCP_PORT=5432
    - POSTGREST_LOG_LEVEL=${POSTGREST_LOG_LEVEL:-error}
    build: .
    image: ${POSTGREST_IMAGE:-<REPO_URL>postgrest:<VERSION>}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  postgres:
    environment:
      - POSTGRES_PASSWORD=${postgres_password:-api}
    image: postgres:9.6
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - apex
    - docs
    - postgrest
    - prometheus
    - smd
    - strato
    environment:
    - APEX_HOST=${APEX_HOST}
    - blockstanbul=${blockstanbul}
    - blockTime=${blockTime}
    - debugPort=${debugPort}
    - debugWSPort=${debugWSPort}
    - DOCS_HOST=${DOCS_HOST}
    - MARKETPLACE_BACKEND_HOST=${MARKETPLACE_BACKEND_HOST}
    - MARKETPLACE_UI_HOST=${MARKETPLACE_UI_HOST}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - POSTGREST_HOST=${POSTGREST_HOST}
    - PROMETHEUS_HOST=${PROMETHEUS_HOST}
    - SERVE_LOGS=${SERVE_LOGS}
    - SMD_DEV_MODE=${SMD_DEV_MODE}
    - SMD_DEV_MODE_HOST_IP=${SMD_DEV_MODE_HOST_IP}
    - SMD_HOST=${SMD_HOST}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - STATS_ENABLED=${STATS_ENABLED}
    - STRATO_HOSTNAME=${STRATO_HOSTNAME}
    - STRATO_PORT_API=${STRATO_PORT_API}
    - STRATO_PORT_API2=${STRATO_PORT_API2}
    - STRATO_PORT_BLOCKSTANBUL_VOTE=${STRATO_PORT_BLOCKSTANBUL_VOTE}
    - STRATO_PORT_LOGS=${STRATO_PORT_LOGS}
    - STRATO_PORT_VAULT_PROXY=${STRATO_PORT_VAULT_PROXY}
    - vmDebug=${vmDebug}
    build: .
    image: ${NGINX_IMAGE:-<REPO_URL>nginx:<VERSION>}
    ports:
    - ${HTTP_PORT:-80}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-443}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  docs:
    environment:
    - API_URL=/strato-api/eth/v1.2/swagger.json
    image: swaggerapi/swagger-ui:v3.22.1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  zookeeper:
    image: zookeeper:3.4.14
    restart: unless-stopped
    volumes:
      - zookeeperdata:/data
    environment:
      ZOO_DATA_LOG_DIR: /data
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  kafka:
    depends_on:
    - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_CLEANER_ENABLE: "false"
      KAFKA_LOG_DIRS: '/kafka/kafka-logs'
      KAFKA_LOG_RETENTION_HOURS: 2147483647
      KAFKA_OFFSET_METADATA_MAX_BYTES: 1048576
      KAFKA_OFFSETS_RETENTION_MINUTES: 2147483647
      KAFKA_MAX_REQUEST_SIZE: ${KAFKA_MAX_REQUEST_SIZE:-100663296}
      KAFKA_MESSAGE_MAX_BYTES: ${KAFKA_MESSAGE_MAX_BYTES:-100663296}
    image: wurstmeister/kafka:1.1.0
    restart: unless-stopped
    volumes:
    - kafkadata:/kafka
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  prometheus:
    build: .
    environment:
      - NODE_HOST=${NODE_HOST}
    image: ${PROMETHEUS_IMAGE:-<REPO_URL>prometheus:<VERSION>}
    volumes:
    - prometheusdata:/prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

apiDebug: false
password: '1234'
timeout: 600000
libPath: ./server/lib
contractsPath: ./contracts/
dataFilename: ./server/dapp/dapp.presets.yaml
deployFilename: ./server/config/localhost-oauth.deploy.yaml

# WARNING - extra strict syntax
# DO NOT change the nodes order
# node 0 is the default url for all single node api calls
nodes:
- id: 0
  stratoUrl: 'http://localhost:8080/strato-api'
  blocUrl: 'http://localhost:8080/bloc/v2.2'
  searchUrl: 'http://localhost:8080/cirrus'
  appUrl: 'http://localhost'

oauth:
  appTokenCookieName: "candor_session"
  scope: 'email openid'
  appTokenCookieMaxAge: 7776000000 # 90 days: 90 * 24 * 60 * 60 * 1000
  stratoUrl: "http://localhost:8080"
  openIdDiscoveryUrl: "https://keycloak.blockapps.net/auth/realms/strato-devel/.well-known/openid-configuration"
  clientId: "localhost-8080"
  clientSecret: "95f6ab79-ea06-4237-8033-cf27984b101e"
  redirectUri: "http://localhost/api/v1/authentication/callback"
  logoutRedirectUri: "http://localhost" # url to redirect after OAuth logout (e.g. app's login screen)

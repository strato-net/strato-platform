name: vm-tools
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: types and tools needed to write a VM for Strato
category:      Data Structures

default-extensions:
  - DeriveGeneric
  - DeriveAnyClass

dependencies:
  - base >= 4 && < 5
  - aeson-pretty
  - ansi-wl-pprint
  - array
  - base16-bytestring
  - binary
  - blockapps-data
  - blockapps-haskoin
  - blockapps-milena
  - blockapps-util
  - bytestring
  - classy-prelude
  - clockwork
  - containers
  - cpu
  - cross-monitoring
  - cryptohash
  - deepseq
  - directory
  - either
  - ethereum-encryption
  - ethereum-rlp
  - exceptions
  - extra
  - formatting
  - ghc
  - hedis
  - hflags
  - integer-gmp
  - lens
  - leveldb-haskell
  - merkle-patricia-db
  - monad-control
  - monad-logger
  - mtl
  - ordered-containers
  - persistent-postgresql
  - persistent-sqlite
  - postgresql-simple
  - primitive
  - prometheus-client
  - resourcet
  - strato-adit
  - strato-conf
  - strato-genesis
  - strato-index
  - strato-model
  - strato-redis-blockdb
  - strato-sequencer
  - strato-statediff
  - text
  - temporary
  - time
  - transformers
  - unboxed-ref
  - unliftio-core
  - vector
  - wai-middleware-prometheus
  - warp
  - async
  - blockstanbul # This dependency doesn't appear to be used at all, except for one symbol that doesn't exist.
                 # To avoid breaking builds, please leave this here: https://blockapps.atlassian.net/browse/OPS-65

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.Bagger
    - Blockchain.Bagger.BaggerState
    - Blockchain.Bagger.Transactions
    - Blockchain.Data.BlockSummary
    - Blockchain.Data.ExecResults
    - Blockchain.DB.BlockSummaryDB
    - Blockchain.DB.ModifyStateDB
    - Blockchain.VMContext
    - Blockchain.VMOptions
    - Blockchain.VM.VMException
    - Blockchain.VMMetrics
    - Executable.EVMFlags
  ghc-options: -Wall -O2


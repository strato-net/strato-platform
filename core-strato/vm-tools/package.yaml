name: vm-tools
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: types and tools needed to write a VM for Strato
category:      Data Structures

dependencies:
  - aeson
  - base
  - blockapps-data
  - blockapps-datadefs
  - blockapps-util
  - blockstanbul
  - containers
  - hflags
  - strato-conf
  - strato-model

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.Bagger
    - Blockchain.Bagger.BaggerState
    - Blockchain.Bagger.Transactions
    - Blockchain.Data.BlockSummary
    - Blockchain.Data.ExecResults
    - Blockchain.DB.BlockSummaryDB
    - Blockchain.DB.ModifyStateDB
    - Blockchain.TxRunResultCache
    - Blockchain.VMContext
    - Blockchain.VMOptions
    - Blockchain.VM.SolidException
    - Blockchain.VM.VMException
    - Blockchain.VMMetrics
    - Executable.EVMFlags
  ghc-options: -Wall -O2
  dependencies:
    - ansi-wl-pprint
    - binary
    - blockapps-mpdbs
    - bytestring
    - cross-monitoring
    - data-default
    - deepseq
    - directory
    - dlist
    - ethereum-rlp
    - exceptions
    - extra
    - format
    - hedis
    - lens
    - leveldb-haskell
    - lrucache
    - merkle-patricia-db
    - milena
    - monad-alter
    - mtl
    - nibblestring
    - persistent-postgresql
    - persistent-sqlite
    - prometheus-client
    - resourcet
    - seqevents
    - split
    - strato-adit
    - strato-index
    - strato-redis-blockdb
    - text
    - temporary
    - time
    - transformers
    - unliftio
    - unliftio-core



tests:
  contextm-test:
    source-dirs: test/
    main: Spec.hs
    dependencies:
      - base16-bytestring
      - blockapps-haskoin
      - bytestring
      - hspec
      - hspec-expectations-lifted
      - vm-tools

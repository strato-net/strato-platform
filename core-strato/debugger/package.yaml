name: debugger
version: 0.0.1
build-type: Simple
author: Dustin Norwood
maintainer:    dustin@blockapps.net
synopsis: A debugging API that can be hooked in to any Haskell project
category:      Debuggers
license: Apache-2.0
description:
    A debugging API that can be hooked in to any Haskell project

dependencies:
  - base

library:
  source-dirs: src/
  exposed-modules:
    - Debugger
    - Debugger.Options
  ghc-options: -Wall -O2
  dependencies:
  - QuickCheck
  - aeson
  - aeson-casing
  - async
  - containers
  - deepseq
  - extra
  - hflags
  - lens
  - monad-alter
  - parsec
  - QuickCheck
  - servant
  - servant-docs
  - servant-server
  - swagger2
  - text
  - time
  - transformers
  - unliftio
  - unordered-containers
  - warp
  - websockets

tests:
  debugger-spec:
    source-dirs: tests/
    main: Main.hs
    dependencies:
      - aeson
      - debugger
      - hflags
      - hspec
      - QuickCheck
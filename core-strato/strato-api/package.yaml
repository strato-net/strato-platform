name:              strato-api
version:           0.0.0
build-type:        Simple

flags:
  dev:
    description:   Turn on development settings, like auto-reload templates.
    default:       True
    manual:        True
  library-only:
    description:   Build for use with "yesod devel"
    default:       False
    manual:        True

default-extensions:
  - TemplateHaskell
  - QuasiQuotes
  - OverloadedStrings
  - NoImplicitPrelude
  - CPP
  - MultiParamTypeClasses
  - TypeFamilies
  - GADTs
  - GeneralizedNewtypeDeriving
  - FlexibleContexts
  - EmptyDataDecls
  - NoMonomorphismRestriction
  - DeriveDataTypeable
  - ViewPatterns
  - TupleSections
  - RecordWildCards

dependencies:
  - aeson                         >= 0.6
  - base
  - base16-bytestring
  - base64-bytestring
  - bcrypt
  - binary
  - blaze-html
  - blaze-markup
  - blockapps-data
  - blockapps-haskoin
  - blockapps-util
  - bytestring                    >= 0.9
  - classy-prelude-yesod          >= 0.10.2
  - clock
  - conduit                       >= 1.0
  - containers
  - directory
  - entropy
  - esqueleto
  - ethereum-discovery
  - extra
  - fast-logger                   >= 2.2
  - file-embed
  - filepath
  - foreign-store
  - hjsmin                        >= 0.1
  - mime-mail
  - monad-logger                  >= 0.3
  - mtl
  - persistent                    >= 2.0
  - persistent-postgresql         >= 2.1.1
  - postgresql-simple
  - process
  - shakespeare                   >= 2.0
  - solid-vm-model
  - strato-conf
  - strato-genesis
  - strato-init
  - strato-model
  - strato-sequencer
  - template-haskell
  - text                          >= 0.11
  - time
  - unliftio-core
  - utf8-string
  - wai

  - wai-extra                     >= 3.0
  - warp                          >= 3.0
  - warp-tls
  - yaml                          >= 0.8
  - yesod                         >= 1.4.1
  - yesod-core                    >= 1.4.6

library:
    source-dirs:
      - src
      - exec_src
    when:
      - condition: flag(dev) || flag(library-only)
        then:
          cpp-options:   -DDEVELOPMENT
          ghc-options:   -Wall -fwarn-tabs -O0
        else:
          ghc-options:   -Wall -fwarn-tabs -O2
    extra-libraries: pthread

executables:
  strato-api:
    when:
      - condition: flag(library-only)
        buildable: False
    main:           main.hs
    source-dirs:    exec_src
    dependencies:
      - strato-api
    extra-libraries: pthread
    ghc-options: -threaded -O2 -rtsopts -with-rtsopts=-N


tests:
  strato-api-tests:
    main:           Main.hs
    source-dirs:    test
    ghc-options:    -Wall
    extra-libraries: pthread
    dependencies:
      - classy-prelude
      - strato-api
      - yesod-test
      - hspec >= 2.0.0
      - hspec-wai
      - hspec-wai-json
      - HUnit
      - hspec-expectations
      - case-insensitive
      - QuickCheck

  unittests:
    main: Spec.hs
    source-dirs: unittest
    dependencies:
      - strato-api
      - hspec-core
      - hspec-expectations-lifted
      - lifted-async
      - classy-prelude

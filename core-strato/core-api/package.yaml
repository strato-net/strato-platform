name:                core-api

dependencies:
- base >= 4.7 && < 5
- persistent
- persistent-postgresql
- servant-server
- strato-conf


library:
  source-dirs: src
  dependencies:
  - aeson
  - base16-bytestring
  - base64-bytestring
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-haskoin
  - blockapps-util
  - bytestring
  - clock
  - containers
  - deepseq
  - directory
  - esqueleto
  - ethereum-discovery
  - extra
  - filepath
  - format
  - hflags
  - http-api-data
  - lens
  - monad-alter
  - monad-logger
  - mtl
  - process
  - QuickCheck
  - seqevents
  - servant-client
  - servant-client-core
  - servant-multipart
  - servant-swagger-tags
  - strato-model
  - swagger2
  - template-haskell
  - text
  - transformers
  - unliftio

executables:
  core-api:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - aeson
    - bytestring
    - blockapps-init
    - blockapps-util
    - core-api
    - format
    - hflags
    - http-types
    - insert-ordered-containers
    - lens
    - monad-logger
    - servant-multipart
    - servant-swagger
    - servant-swagger-ui
    - swagger2
    - transformers
    - unliftio
    - wai
    - wai-cors
    - wai-extra
    - wai-middleware-prometheus
    - warp

name:                core-api

dependencies:
- base >= 4.7 && < 5
- persistent
- persistent-postgresql
- servant-server
- strato-conf


library:
  source-dirs: src
  dependencies:
  - aeson
  - base16-bytestring
  - base64-bytestring
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-haskoin
  - blockapps-util
  - bytestring
  - clock
  - containers
  - deepseq
  - directory
  - esqueleto
  - ethereum-discovery
  - extra
  - filepath
  - format
  - http-api-data
  - monad-alter
  - monad-logger
  - mtl
  - process
  - seqevents
  - servant-multipart
  - strato-model
  - template-haskell
  - text
  - transformers

executables:
  core-api:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - core-api
    - monad-logger
    - wai-cors
    - wai-extra
    - warp

name:                core-api

dependencies:
- base >= 4.7 && < 5
- aeson
- base16-bytestring
- base64-bytestring
- binary
- blockapps-data
- blockapps-datadefs
- blockapps-haskoin
- blockapps-util
- bytestring
- clock
- containers
- deepseq
- directory
- esqueleto
- ethereum-discovery
- extra
- filepath
- format
- http-api-data
- monad-alter
- monad-logger
- mtl
- persistent
- persistent-postgresql
- process
- servant-server
- seqevents
- strato-conf
- strato-model
- template-haskell
- text
- transformers
- warp
- yaml


library:
  source-dirs: src

executables:
  core-api:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - core-api

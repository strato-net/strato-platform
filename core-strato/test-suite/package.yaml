name:                test-suite
version:             0.1.0.0
author:              jamshid
maintainer:          jamshid
build-type:          Simple

dependencies:
  - HUnit
  - QuickCheck
  - aeson
  - ansi-wl-pprint
  - base
  - base16-bytestring
  - binary
  - blockapps-data
  - blockapps-haskoin
  - blockapps-milena
  - blockapps-util
  - bytestring
  - conduit
  - containers
  - crypto-pubkey-types
  - cryptohash
  - deepseq
  - derive
  - directory
  - either
  - ethereum-discovery
  - ethereum-encryption
  - ethereum-rlp
  - ethereum-vm
  - fast-ecrecover
  - hedis
  - hflags
  - hspec
  - hspec-contrib
  - lens-family
  - lens-family-th
  - leveldb-haskell
  - merkle-patricia-db
  - monad-logger
  - mtl
  - network
  - nibblestring
  - resourcet
  - strato-conf
  - strato-model
  - strato-p2p
  - strato-redis-blockdb
  - strato-sequencer
  - text
  - time
  - transformers
  - unordered-containers

ghc-options: -Wall -Werror -threaded

executables:
  test-suite-exe:
    main: Main.hs
    source-dirs:
      - src/
      - test/

tests:
  vm-tests:
    source-dirs: test
    main: TestMain.hs

  test-suite:
    source-dirs: test
    main: Spec.hs

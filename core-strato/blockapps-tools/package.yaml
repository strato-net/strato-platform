name: blockapps-tools
version: 0.0.1
build-type: Simple
author: Jamshid
license-file:  LICENSE
maintainer:    jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum client
category:      Data Structures
license: Apache-2.0
description:
              Tool to query the ethereum databases

dependencies:
  - base


library:
  source-dirs: src/
  dependencies:
    - aeson
    - ansi-wl-pprint
    - base16-bytestring
    - base64-bytestring
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-haskoin
    - blockapps-mpdbs
    - blockapps-privacy
    - blockapps-util
    - blockstanbul
    - bytestring
    - common-log
    - conduit
    - data-default
    - ethereum-discovery
    - ethereum-encryption
    - ethereum-rlp
    - filepath
    - format
    - hedis
    - hflags
    - lens
    - leveldb-haskell
    - memory
    - merkle-patricia-db
    - milena
    - monad-alter
    - monad-loops
    - nibblestring
    - persistent
    - persistent-postgresql
    - resourcet
    - seqevents
    - strato-conf
    - strato-index
    - strato-model
    - strato-p2p
    - strato-redis-blockdb
    - strato-sequencer
    - strato-statediff
    - text
    - time
    - transformers
    - unliftio

executables:
  queryStrato:
    source-dirs: exec_src/
    main: Main.hs
    other-modules: []
    dependencies:
      - base16-bytestring
      - blockapps-tools
      - bytestring
      - cmdargs
      - merkle-patricia-db
      - seqevents
      - strato-model
      - strato-p2p

  b16decode:
    source-dirs: exec_src/
    main: B16Decode.hs
    dependencies:
      - base
      - base16-bytestring
      - bytestring
    other-modules: []

  modifyDate:
    source-dirs: exec_src/
    main: ModifyDate.hs
    dependencies:
      - base
      - hflags
      - time
    other-modules: []

tests:
  blockapps-tools-test:
    source-dirs: test/
    main: KafkaSpec.hs
    dependencies:
      - QuickCheck
      - blockapps-tools
      - bytestring
      - bytestring-arbitrary
      - hspec
      - temporary

name: blockapps-mpdbs
version: 0.0.1
build-type: Simple
author: Jamshid
maintainer: jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum client
category: Data Structures
license: Apache-2.0
description: The client described in the Ethereum Yellowpaper
github: blockapps/strato-platform/core-strato/blockapps-mpdbs

dependencies:
  - base



ghc-options: -Wall -O2

library:
  source-dirs: src/
  default-extensions: TemplateHaskell
  dependencies:
  - ansi-wl-pprint
  - base16-bytestring
  - binary
  - blockapps-data
  - blockapps-util
  - bytestring
  - containers
  - data-default
  - deepseq
  - ethereum-rlp
  - extra
  - fastMP
  - format
  - lens
  - leveldb-haskell
  - merkle-patricia-db
  - monad-alter
  - monad-loops
  - mtl
  - nibblestring
  - solid-vm-model
  - strato-model
  - text
  - transformers
  - x509-certs

tests:
  blockapps-mpdbs-test:
    source-dirs: test/
    main: Main.hs
    dependencies:
      - blockapps-mpdbs
      - blockapps-util
      - blockapps-data
      - bytestring
      - containers
      - deepseq
      - directory
      - hspec
      - hspec-expectations-lifted
      - lens
      - leveldb-haskell
      - merkle-patricia-db
      - monad-alter
      - nibblestring
      - resourcet
      - solid-vm-model
      - strato-model
      - transformers
      - unix
      - unliftio
      - vm-tools
    ghc-options: -Wall -Werror -threaded -rtsopts -with-rtsopts=-N

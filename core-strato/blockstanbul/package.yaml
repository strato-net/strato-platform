name: blockstanbul
ghc-options: -Wall -Werror

dependencies:
  - aeson
  - base
  - binary
  - blockapps-data
  - blockapps-haskoin
  - blockapps-util
  - bytestring
  - containers
  - conduit
  - conduit-combinators
  - crypto-api
  - derive
  - ethereum-encryption
  - ethereum-rlp
  - ghc
  - fast-ecrecover
  - lens
  - mtl
  - QuickCheck
  - servant-client
  - servant-server
  - stm
  - stm-chans
  - strato-model
  - text
  - transformers
  - monad-logger
  - wai-extra
  - wai-middleware-prometheus
  - wai
  - warp
  - http-client

library:
  source-dirs: src/


tests:
  blockstanbul-test:
    main: Main.hs
    source-dirs: test/
    dependencies:
      - base16-bytestring
      - blockstanbul
      - hspec
      - hspec-expectations-lifted
      - merkle-patricia-db
      - time

benchmarks:
  one-node:
    source-dirs: bench/
    main: OneNode.hs
    dependencies:
      - blockstanbul
      - criterion
      - aeson

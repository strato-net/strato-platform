name:                strato-adit
version:             0.1.0.0
license:             Apache-2.0
license-file:        LICENSE
author:              Kristoffer Josefsson
maintainer:          kristoffer@blockapps.net
build-type:          Simple

ghc-options: -Wall -O2

dependencies:
  - base
  - blockapps-util
  - hflags

other-extensions: OverloadedStrings

library:
  source-dirs: src
  other-modules:
    - Executable.AditM
  dependencies:
    - ansi-wl-pprint
    - blockapps-data
    - blockapps-datadefs
    - blockapps-milena
    - bytestring
    - containers
    - cryptohash
    - ethereum-discovery
    - ethereum-rlp
    - format
    - lens
    - monad-alter
    - mtl
    - normaldistribution
    - random
    - resourcet
    - seqevents
    - stm
    - strato-conf
    - text
    - time
    - unliftio


executables:
  strato-adit:
    main:             Main.hs
    source-dirs:      exec_src
    dependencies:
      - blockapps-init
      - strato-adit

name:                statsdi
version:             0.1.0.0
synopsis:            A lovely [Dog]StatsD implementation
github:              blockapps/strato-platform/core-strato/statsdi
license:             MIT
license-file:        LICENSE
author:              Ilya Ostrovskiy
maintainer:          first-name@thenumber200-thewordproof.cc
copyright:           2017 Ilya Ostrovskiy
category:            Metrics
build-type:          Simple
extra-source-files:  README.md

dependencies:
  - base
  - network
  - random
  - dequeue
  - stm
  - time
  - bytestring
  - ether
  - template-haskell
  - unordered-containers >= 0.2.7.0 && < 0.3
  - hashable >= 1.2.4.0 && < 1.3

library:
  source-dirs: src/
  exposed-modules:
    - Control.Monad.Stats
    - Control.Monad.Stats.Ethereal
    - Control.Monad.Stats.TH
    - Control.Monad.Stats.Types
    - Control.Monad.Stats.Util

tests:
  statsdi-test:
    source-dirs:      test
    main:             Spec.hs
    dependencies:
      - statsdi
      - tasty
      - tasty-hspec
      - hspec
    ghc-options: -threaded -rtsopts -with-rtsopts=-N

name: solid-vm
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum EVM
category:      Data Structures
license: Apache-2.0
description:
    The client described in the Ethereum Yellowpaper

default-extensions:
  - DeriveGeneric
  - DeriveAnyClass
  - LambdaCase


dependencies:
  - base >= 4 && < 5
  - aeson
  - aeson-casing
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-mpdbs
  - ethereum-rlp
  - base16-bytestring
  - blockapps-util
  - bytestring
  - containers
  - cryptonite
  - data-default
  - deepseq
  - extra
  - format
  - generic-random
  - hashable
  - lens
  - leveldb-haskell
  - memory
  - merkle-patricia-db
  - monad-alter
  - monad-control
  - nibblestring
  - parsec
  - prometheus-client
  - QuickCheck
  - quickcheck-instances
  - resourcet
  - semver-range
  - servant-docs
  - solid-vm-model
  - strato-model
  - swagger2
  - text
  - time
  - transformers
  - transformers-base
  - unordered-containers
  - vector
  - vm-tools


#  - ethereum-vm
#  - ansi-wl-pprint
#  - base16-bytestring
#  - binary
#  - blockapps-haskoin
#  - bytestring

#  - vector
#  - vm-tools
#  - http-api-data
#  - persistent
#  - random
#  - servant



library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.SolidVM
    - Blockchain.SolidVM.Exception
    - SolidVM.Solidity.Parse.File
    - SolidVM.Solidity.Parse.Lexer
    - SolidVM.Solidity.Parse.Statement
    - SolidVM.Solidity.Parse.UnParser
    - SolidVM.Solidity.Parse.Declarations
    - SolidVM.Solidity.Xabi.Statement
    - CodeCollection
  ghc-options: -Wall -O2

executables:
  parse-solidvm:
    source-dirs: exec_src
    other-modules: []
    main: Parse.hs
    dependencies:
      - solid-vm
    ghc-options: -Wall -O2 -threaded -rtsopts

  exprs-needed:
    source-dirs: exec_src
    other-modules: []
    main: ExprsNeeded.hs
    dependencies:
      - solid-vm

tests:
  solid-vm-spec:
    source-dirs: tests/
    main: Main.hs
    dependencies:
      - async
      - base16-bytestring
      - hflags
      - hspec
      - hspec-expectations-lifted
      - lifted-base
      - HUnit
      - raw-strings-qq
      - solid-vm

benchmarks:
    codebench:
      source-dirs: bench/
      main: CodeBench.hs
      dependencies:
        - criterion
        - file-embed
        - solid-vm

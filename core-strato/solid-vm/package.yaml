name: solid-vm
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum EVM
category:      Data Structures
license: Apache-2.0
description:
    The client described in the Ethereum Yellowpaper

default-extensions:
  - DeriveGeneric
  - DeriveAnyClass
  - LambdaCase


dependencies:
  - base >= 4 && < 5
  - aeson
  - aeson-casing
  - binary
  - blockapps-data
  - blockapps-mpdbs
  - ethereum-rlp
  - blockapps-util
  - bytestring
  - containers
  - cryptonite
  - deepseq
  - extra
  - generic-random
  - largeword
  - lens
  - memory
  - merkle-patricia-db
  - parsec
  - QuickCheck
  - quickcheck-instances
  - resourcet
  - semver-range
  - servant-docs
  - strato-model
  - swagger2
  - text
  - time
  - transformers
  - unordered-containers
  - vector
  - vm-tools


#  - ethereum-vm
#  - ansi-wl-pprint

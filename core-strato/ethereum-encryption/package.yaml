
name:                ethereum-encryption
version:             0.1.0.0
author:              jamshid
maintainer:          jim
build-type:          Simple
license:             Apache-2.0

dependencies:
  - base
  - ethereum-rlp
  - strato-model

library:
  other-extensions:    OverloadedStrings
  source-dirs: src
  ghc-options: -Wall -O2
  dependencies:
  - Crypto
  - base16-bytestring
  - binary
  - blockapps-haskoin
  - blockapps-util
  - bytestring
  - cipher-aes
  - conduit
  - conduit-extra
  - crypto-pubkey
  - crypto-pubkey-types
  - cryptohash
  - cryptonite
  - entropy
  - format
  - lifted-base
  - memory
  - mtl
  - strato-model


tests:
  encryption-tests:
    source-dirs: test/
    main: Spec.hs
    dependencies:
      - base16-bytestring
      - bytestring
      - crypto-pubkey-types
      - ethereum-encryption
      - hspec
      - strato-model
      - QuickCheck

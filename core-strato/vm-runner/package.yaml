name: vm-runner
version: 0.0.4
build-type: Simple
author: Jamshid
maintainer:    jamshidnh@gmail.com
synopsis: The executable that runs VMs for transactions
category:      Data Structures

default-extensions:
  - DeriveGeneric
  - DeriveAnyClass

dependencies:
  - base >= 4 && < 5
  - ansi-wl-pprint
  - base16-bytestring
  - binary
  - blockapps-data
  - blockapps-datadefs
  - blockapps-milena
  - blockapps-mpdbs
  - blockapps-util
  - bytestring
  - classy-prelude
  - conduit
  - containers
  - cross-monitoring
  - ethereum-rlp
  - ethereum-vm
  - extra
  - format
  - hflags
  - lens
  - merkle-patricia-db
  - monad-alter
  - mtl
  - ordered-containers
  - prometheus-client
  - resourcet
  - solid-vm
  - strato-adit
  - strato-conf
  - strato-genesis
  - strato-index
  - strato-model
  - strato-redis-blockdb
  - seqevents
  - strato-statediff
  - text
  - time
  - transformers
  - vm-tools
  - wai-middleware-prometheus
  - warp
  - async
  - unliftio
  - util
  - blockstanbul # This dependency doesn't appear to be used at all, except for one symbol that doesn't exist.
                 # To avoid breaking builds, please leave this here: https://blockapps.atlassian.net/browse/OPS-65


library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.BlockChain
    - Executable.EthereumVM
  ghc-options: -Wall -O2


executables:
  vm-runner:
    source-dirs: exec_src
    main: Main.hs
    dependencies:
      - vm-runner
    ghc-options: -Wall -O2 -threaded -rtsopts -fprof-auto

tests:
  ethereum-vm-test:
    source-dirs: test/
    main: Spec.hs
    dependencies:
      - aeson
      - data-default
      - ethereum-vm
      - vm-runner
      - hspec
      - hspec-expectations-lifted
    ghc-options: -Wall -Werror -threaded -rtsopts -with-rtsopts=-N

benchmarks:
  microbench:
    source-dirs: bench/
    main: Microbench.hs
    other-modules: []
    dependencies:
      - blockapps-haskoin
      - criterion
      - deepseq
      - ethereum-vm
      - hashable
      - vector
      - unordered-containers

  extractbench:
    source-dirs: bench/
    main: ExtractBench.hs
    other-modules: []
    dependencies:
      - criterion
      - ethereum-vm

name:                ethereum-discovery
version:             0.1.0.0
author:              jamshid
maintainer:          jim
build-type:          Simple
license:             Apache-2.0

ghc-options: -Wall -O2

dependencies:
  - base
  - network

library:
  source-dirs: src/
  exposed-modules:
    - Blockchain.Strato.Discovery.Data.Peer
    - Blockchain.Strato.Discovery.UDP
    - Blockchain.Strato.Discovery.P2PUtil
    - Executable.EthereumDiscovery
    - Executable.EthDiscoverySetup
  dependencies:
    - base16-bytestring
    - binary
    - blockapps-data
    - blockapps-datadefs
    - blockapps-haskoin
    - blockapps-util
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - bytestring
    - classy-prelude
    - cpu
    - crypto-pubkey-types
    - either
    - entropy
    - errors
    - ethereum-encryption
    - ethereum-rlp
    - exceptions
    - format
    - http-client
    - monad-alter
    - mtl
    - network-uri
    - persistent-postgresql
    - persistent-template
    - prometheus-client
    - random
    - resourcet
    - servant-client
    - split
    - strato-conf
    - strato-model
    - text
    - time
    - unliftio
    - unliftio-core

executables:
  ethereum-discover:
    source-dirs:       exec_src/
    main:             Main.hs
    dependencies:
      - blockapps-init
      - blockapps-util
      - ethereum-discovery
      - hflags

tests:
  ethereum-discover-test:
    source-dirs: test/
    main: Spec.hs
    ghc-options: -Wall -Werror
    dependencies:
      - ethereum-discovery
      - format
      - hspec

name: strato-p2p
version: 0.0.4
build-type: Simple
author: Jamshid
license-file:  LICENSE
maintainer:    jamshidnh@gmail.com
synopsis: A Haskell version of an Ethereum client
category:      Data Structures
license: Apache-2.0
description:
    The client described in the Ethereum Yellowpaper
github: blockapps/strato-platform/core-strato/strato-p2p

dependencies:
  - base
  - blockapps-util
  - common-log
  - ethereum-discovery
  - hflags



ghc-options: -Wall -threaded

executables:
  strato-p2p:
    source-dirs: exec_src/
    main: StratoP2PMain.hs
    dependencies:
      - blockapps-init
      - lifted-async
      - ordered-containers
      - strato-p2p
      - wai-middleware-prometheus
      - warp
      
library:
  source-dirs: src
  ghc-options: -Wall -O2
  dependencies:
    - SafeSemaphore
    - aeson
    - alarmclock
    - ansi-wl-pprint
    - base16-bytestring
    - blockapps-data
    - blockapps-datadefs
    - blockapps-haskoin
    - blockapps-vault-wrapper-api
    - blockapps-vault-wrapper-client
    - blockstanbul
    - bytestring
    - conduit
    - conduit-extra
    - containers
    - cross-monitoring
    - data-default
    - dlist
    - dns
    - either
    - ethereum-encryption
    - ethereum-rlp
    - format
    - ghc
    - hedis
    - crypto-pubkey
    - crypto-pubkey-types
    - http-client
    - iproute
    - json-rpc-server
    - json-rpc-client
    - lens
    - lifted-base
    - milena
    - monad-alter
    - monadIO
    - mtl
    - network
    - ordered-containers
    - persistent
    - prometheus-client
    - random
    - resourcet
    - seqevents
    - servant-client
    - servant-server
    - split
    - stm
    - stm-conduit
    - strato-conf
    - strato-model
    - strato-redis-blockdb
    - streaming-commons
    - text
    - these
    - time
    - transformers
    - unliftio-core
    - unliftio
    - warp


tests:
  strato-p2p-client-test:
    source-dirs: test
    ghc-options: -Wall -Werror -dynamic
    main: Main.hs
    dependencies:
      - QuickCheck
      - base16-bytestring
      - blockapps-data
      - blockapps-datadefs
      - blockapps-haskoin
      - blockapps-privacy
      - blockstanbul
      - bytestring
      - conduit
      - containers
      - cryptonite
      - data-default
      - ethereum-encryption
      - hspec
      - hspec-expectations-lifted
      - lens
      - monad-alter
      - mtl
      - ordered-containers
      - resourcet
      - seqevents
      - stm-chans
      - stm-conduit
      - strato-model
      - strato-p2p
      - strato-sequencer
      - text
      - transformers
      - unliftio
  

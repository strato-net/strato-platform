name: ethereum-rlp
version: 0.1.0
build-type: Simple
author: Jamshid
license-file:  LICENSE
maintainer:    jamshidnh@gmail.com
synopsis: Ethereum Recursive Length Prefix Encoding
category:      Data Structures
license: Apache-2.0
description:
    RLP, as described in the Ethereum Yellowpaper

github: blockapps/strato-platform/core-strato/ethereum-rlp

default-extensions:
  - Arrows
  - BangPatterns
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DeriveDataTypeable
  - DeriveFoldable
  - DeriveFunctor
  - DeriveGeneric
  - DeriveTraversable
  - EmptyDataDecls
  - FlexibleContexts
  - FlexibleInstances
  - FunctionalDependencies
  - GADTs
  - GeneralizedNewtypeDeriving
  - LambdaCase
  - LiberalTypeSynonyms
  - MagicHash
  - MultiParamTypeClasses
  - MultiWayIf
  - NoMonomorphismRestriction
  - OverloadedStrings
  - PatternGuards
  - ParallelListComp
  - QuasiQuotes
  - RankNTypes
  - RecordWildCards
  - ScopedTypeVariables
  - StandaloneDeriving
  - TemplateHaskell
  - TupleSections
  - TypeFamilies
  - TypeOperators
  - UnboxedTuples

library:
  source-dirs: library/
  exposed-modules: Blockchain.Data.RLP
  dependencies:
    - bytestring == 0.10.*
    - base16-bytestring == 0.1.*
    - ansi-wl-pprint == 0.6.*
    - base >= 4 && < 5
    - containers == 0.5.11.0

tests:
  test:
    source-dirs: test/
    main: Main.hs
    dependencies:
      - ethereum-rlp
      - test-framework == 0.8.*
      - test-framework-hunit == 0.3.*
      - HUnit == 1.*
      - base == 4.*

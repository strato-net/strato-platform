name: x509-certs
version: 0.0.1
build-type: Simple
author: dpmesko
maintainer:   daniel@blockapps.net
synopsis: A Haskell x509 certificate generator
category:      Data Structures
license: Apache-2.0
description:
    A Haskell x509 certificate generator

dependencies:
  - base >= 4 && < 5


ghc-options: -Wall -Werror


library:
  source-dirs: src
  ghc-options: -Wall -O2 
  dependencies:
  - aeson
  - asn1-encoding
  - asn1-types
  - base16-bytestring
  - bytestring
  - cereal
  - containers
  - cryptonite
  - ethereum-rlp
  - hourglass
  - memory
  - pem
  - random
  - text
  - time
  - transformers
  - secp256k1-haskell
  - x509
  - x509-validation
#  - x509-store
#  - x509-util


executables:
  x509-tool:
    source-dirs: exec_src/
    main: X509Tool.hs
    dependencies:
      - aeson
      - bytestring
      - cryptonite
      - secp256k1-haskell
      - x509-certs

tests:
  x509-test:
    main: Spec.hs
    source-dirs: test/
    dependencies:
      - x509-certs
      - bytestring
      - cryptonite
      - ethereum-rlp
      - secp256k1-haskell
      - hspec
      - QuickCheck

[profile.default]
src = ".foundry-preprocessed"
test = "mercata/contracts/tests-foundry"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "none"

remappings = [
  "forge-std/=lib/forge-std/src/",
  "compat/=./.foundry-preprocessed/compat/",
  "cdp/=./.foundry-preprocessed/cdp/"
]

[fmt]
line_length = 100
multiline_func_header = "all"

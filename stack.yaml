flags: {}
packages:
- blockapps-milena
- strato-conf/
- miner-ethash/
- merkle-patricia-db/
- strato-p2p-client/
- solidity-abi/
- blockapps-data/
- ecrecover/
- fast-ecrecover/
- strato-init/
- ethereum-discovery/
- ethereum-encryption/
- ethereum-vm/
- blockapps-util/
- strato-api/
- strato-p2p-server/
- blockapps-tools/
- strato-quarry/
- strato-adit/
- strato-index/
- ethereum-test/
- strato-sequencer/
- ethereum-jsonrpc/
- strato-model/
- strato-redis-blockdb/
- strato-statediff/
- location:
    git: https://github.com/blockapps/blockapps-haskoin
    commit: 061a2afebae6dc2024e3fd883b250453f4111c7d
  extra-dep: true
- location:
    git: https://github.com/blockapps/ethereum-rlp
    commit: 6627727a26ee74381d057eccbe458b419ea24c92 # tag '1'
  extra-dep: true
extra-deps:
- Crypto-4.2.5.1
- SHA2-0.2.5
- leveldb-haskell-0.6.3
- AES-0.2.9
- json-rpc-0.2.1.6
- nibblestring-0.0.3
- pbkdf-1.1.1.1
- yesod-raml-0.1.4
- normaldistribution-1.1.0.3
- global-lock-0.1
- base-prelude-1.0.1.1
- contravariant-extras-0.3.3.1
- fail-4.9.0.0
- tuple-th-0.2.5
- bytestring-arbitrary-0.1.1
- json-rpc-server-0.2.5.0
- monadIO-0.10.1.4
- monad-logger-0.3.20.1
- esqueleto-2.5.1
- tasty-hunit-adapter-1.1

resolver: lts-7.18
compiler: ghc-8.0.2
compiler-check: newer-minor
extra-include-dirs:
- /usr/local/include


extra-lib-dirs:
- /usr/local/lib

ghc-options:
  ethereum-discovery:      -Wall -Werror -fno-warn-warnings-deprecations
  ethereum-encryption:     -Wall -Werror -fno-warn-warnings-deprecations
  merkle-patricia-db:      -Wall -Werror -fno-warn-warnings-deprecations
  strato-init:             -Wall -Werror -fno-warn-warnings-deprecations
  strato-p2p-client:       -Wall -Werror -fno-warn-warnings-deprecations
  strato-p2p-server:       -Wall -Werror -fno-warn-warnings-deprecations
  strato-redis-blockdb:    -Wall -Werror -fno-warn-warnings-deprecations
  blockapps-tools:         -Wall -Werror -fno-warn-warnings-deprecations
  ethereum-test:           -Wall -Werror -fno-warn-warnings-deprecations
  strato-index:            -Wall -Werror
  strato-api:              -fno-warn-orphans
  blockapps-tools:         -Wall -Werror
  strato-index:            -Wall -Werror -fno-warn-warnings-deprecations
  strato-sequencer:        -Wall -Werror -fno-warn-warnings-deprecations
  strato-quarry:           -Wall -Werror -fno-warn-warnings-deprecations
  strato-adit:             -Wall -Werror -fno-warn-warnings-deprecations
  strato-conf:             -Wall -Werror -fno-warn-warnings-deprecations -fno-warn-inline-rule-shadowing
#  ethereum-jsonrpc:        -Wall -Werror -fno-warn-warnings-deprecations

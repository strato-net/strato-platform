extra-deps:
- Crypto-4.2.5.1
- bytestring-arbitrary-0.1.1
- conduit-1.2.13.1
- containers-0.5.11.0 # temp re-added, will remove
- dequeue-0.1.12
- diagrams-html5-1.4.1
- ether-0.5.1.0 # temp re-added, will remove
- global-lock-0.1
- hflags-0.4.3
- json-rpc-client-0.2.5.0
- json-rpc-server-0.2.6.0
- milena-0.5.2.1
- monad-logger-0.3.28.1 # temp re-added, will remove
- monadIO-0.11.0.0
- murmur3-1.0.3
- nibblestring-0.0.3
- opaleye-0.6.7001.0
- ordered-containers-0.1.0
- parsec3-numbers-0.1.0
- pbkdf-1.1.1.1
- pcg-random-0.1.3.5
- prometheus-client-1.0.0
- random-bytestring-0.1.3.1
- resourcet-1.1.11
- saltine-0.0.0.4
- servant-options-0.1.0.0

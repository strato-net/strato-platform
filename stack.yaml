#  commit: 39dad725837f8d67721f3ac0f87a047ce36b2889

flags:
  secp256k1-haskell:
    ecdh: true
    recovery: true

resolver: lts-16.31 #also duplicated in docker section below
compiler-check: newer-minor
extra-include-dirs:
- /usr/local/include
- /usr/include

extra-lib-dirs:
- /usr/local/lib
- /usr/lib

allow-newer: true

ghc-options:
  "$locals": -Wall -Werror -fwarn-redundant-constraints

docker:
  enable: true
  image: "strato-buildbase:lts-16.31"
  set-user: true
  run-args: ["--ulimit=nofile=60000"]

nix:
  enable: false

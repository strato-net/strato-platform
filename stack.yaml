- transformers-0.5.5.0
- wai-middleware-prometheus-1.0.0
- yesod-raml-0.2.0
- generic-random-1.2.0.0

resolver: lts-10.10 #also duplicated in docker section below
compiler: ghc-8.0.2 # temp re-added, will remove - @see https://blockapps.atlassian.net/browse/STRATO-1086
compiler-check: newer-minor
extra-include-dirs:
- /usr/local/include

extra-lib-dirs:
- /usr/local/lib

ghc-options:
  "$locals": -Wall -Werror
  strato-api: -Wall -Werror -fno-warn-orphans
  strato-p2p: -Wall -Werror  -XMonoLocalBinds
  strato-conf: -Wall -Werror -fno-warn-inline-rule-shadowing
  blockapps-haskoin: -Wall -Werror -fno-warn-overflowed-literals

docker:
  enable: true
  image: "strato-buildbase:lts-10.10"
  set-user: true
  run-args: ["--ulimit=nofile=60000"]

version: '2'

services:

  cirrus_vm:
    build: .
    command: node_modules/.bin/nodemon cirrus-test.js --role vm
    environment:
      NODE_ENV: development
    volumes:
      - .:/home/app/cirrus 
    networks:
      - silo_default
    external_links:
      - silo_zookepper_1:zookepper
      - silo_kafka_1:kafka


  cirrus_bloc:
    build: .
    command: node_modules/.bin/nodemon cirrus-test.js --role bloc
    environment:
      NODE_ENV: development
    volumes:
      - .:/home/app/cirrus
    networks:
      - silo_default
    external_links:
      - silo_zookepper_1:zookepper
      - silo_kafka_1:kafka

  cirrus_birrus:
    build: .
    command: node_modules/.bin/nodemon cirrus-test.js --role birrus
    environment:
      NODE_ENV: development
    volumes:
      - .:/home/app/cirrus
    networks:
      - silo_default
    external_links:
      - silo_zookepper_1:zookepper
      - silo_kafka_1:kafka

  cirrus_cirrus:
    build: .
    command: node_modules/.bin/nodemon cirrus-test.js --role cirrus
    environment:
      NODE_ENV: development
    volumes:
      - .:/home/app/cirrus
    networks:
      - silo_default
    external_links:
      - silo_zookepper_1:zookepper
      - silo_kafka_1:kafka
 
  cirrus:
    build: .
    command: node_modules/.bin/nodemon main.js
    environment:
      NODE_ENV: development
    ports:
      - '3333:3333'
    volumes:
      - .:/home/app/cirrus
      - /home/app/cirrus/node_modules
      - /home/app/cirrus/lib
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - silo_default
    external_links:
      - silo_strato_1:strato
      - silo_zookeeper_1:zookeeper
      - silo_kafka_1:kafka
      - silo_postgrest_1:postgrest
      - silo_postgres-cirrus_1:postgres

networks:
  silo_default:
    external: true

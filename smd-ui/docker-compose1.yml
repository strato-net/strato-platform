version: "3"
networks:
  static:
    ipam:
      config:
        - subnet: 172.20.0.0/16
services:
  ui:
    build: ./
    environment:
    - REACT_APP_OAUTH_ENABLED=true
    - REACT_APP_NODE_HOST=localhost:8080 
    - REACT_APP_EXT_STORAGE_ENABLED=true
    volumes:
     - ./node_modules:/app/node_modules
     - ./:/app
    restart: always
    networks:
      static:
        ipv4_address: 172.20.20.1
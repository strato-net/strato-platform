version: "3"
volumes:
  vaultpgdata:
    driver: local
services:
  vault-wrapper:
    depends_on:
    - postgres
    environment:
    - keyStoreCacheTimeout=${keyStoreCacheTimeout:-60}
    - postgres_host=postgres
    - postgres_password=${postgres_password:-api}
    - postgres_port=5432
    - postgres_user=postgres
    - postgres_vault_wrapper_db=oauth
    - VAULTWRAPPER_DEBUG=${VAULTWRAPPER_DEBUG}
    image: ${VAULTWRAPPER_IMAGE:-vault-wrapper:dogs}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
    - 8088:8000                                         # TODO: Remove after the nginx is added to this file!   #fix-before-shared-vault-done
  postgres:
    environment:
      - POSTGRES_PASSWORD=${postgres_password:-api}
    image: postgres:9.6
    volumes:
      - vaultpgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

paths:
  /carbon/:
    get:
      security:
        - bearerAuth: []
      tags:
        - Carbon
      summary: Retrieve carbon
      produces:
        - application/json
      responses:
        200:
          description: Array of carbons
    post:
      security:
        - bearerAuth: []
      tags:
        - Carbon
      summary: Create a carbon
      produces:
        - application/json
      requestBody:
        description: It enables user to create carbon
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/definitions/createCarbon'
      responses:
        200:
          description: Object of create carbon

definitions:
  createCarbon:
    type: object
    properties:
      machineArgs:
        type: object
        properties:
          serialNumber:
            type: string
          status:
            type: number
          comment:
            type: string
          itemNumber:
            type: number
          name:
            type: string
          description:
            type: string
          projectType:
            type: string
          images:
            type: array
            items:
              type: string
          price:
            type: number
          saleState:
            type: number
          paymentType:
            type: number

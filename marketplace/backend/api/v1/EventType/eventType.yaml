paths:
  /eventType/:
    get:
      security:              
        - bearerAuth: []                    
      tags:               
        - EventType        
      summary: Retrieve eventType
      produces:
      - application/json
      responses:         
        200:
          description: Array of eventTypes
    post:  
      security:              
        - bearerAuth: []                  
      tags:               
        - EventType        
      summary: Create a eventType
      produces:
      - application/json
      requestBody:         
        description: It enable user to create eventType
        required: true
        content:
          'application/json': 
            schema:       
              $ref: '#/definitions/createEventType' 
      responses:         
        200:
          description: Object of create eventType
  /eventType/{address}/{chainId}:
    get:                 
      security:              
        - bearerAuth: []   
      tags:               
        - EventType        
      summary: Retrieve a eventType
      produces:
      - application/json
      parameters:         
      - in: path          
        name: address     
        description: address to retrieve the eventType
        required: true
      - in: path          
        name: chainId     
        description: chainId corresponding to the address
        required: true
        schema:       
          $ref: '#/definitions/fetchEventType' 
      responses:         
        200:
          description: Retrieve a eventType
  /eventType/update:
    put:    
      security:              
        - bearerAuth: []                
      tags:               
        - EventType        
      summary: Update a eventType
      produces:
      - application/json
      requestBody:         
        description: It enable user to update a eventType
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/updateEventType' 
      responses:         
        200:
          description: Retrieve a updated eventType
  /eventType/{address}/{chainId}/audit:
    get:     
      security:              
        - bearerAuth: []               
      tags:               
        - EventType        
      summary: Audit eventType
      produces:
      - application/json
      parameters:         
      - in: path          
        name: address     
        description: address to retrieve the eventType
        required: true
      - in: path          
        name: chainId     
        description: chainId corresponding to the address
        required: true
        schema:       
          $ref: '#/definitions/auditEventType' 
      responses:         
        200:
          description: List of audit
  /eventType/transferOwnership:
    post:              
      security:              
        - bearerAuth: []      
      tags:               
        - EventType        
      summary: Transfer ownership
      produces:
      - application/json
      requestBody:         
        description: It enable user to transfer ownership
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/transferOwnership' 
      responses:         
        200:
          description: indicates success of transfer ownership
definitions:        
  fetchEventType:
    address:
      type: string
    chainId:
      type: string
  createEventType:
    type: object
    properties:
      machineArgs:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
          createdAt:
            type: string
  updateEventType:
    type: object
    properties:
      address:
        type: string
      chainId:
        type: string
      updates:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
          createdAt:
            type: string
  auditEventType:
    address:
      type: string
    chainId:
      type: string
  transferOwnership:
    type: object
    properties:
      address:
        type: string
      chainId:
        type: string
      newOwner:
        type: string
paths:
  /properties/:
    get:
      security:              
        - bearerAuth: []                    
      tags:               
        - Properties        
      summary: Retrieve properties
      produces:
      - application/json
      responses:         
        200:
          description: Array of properties
    post:  
      security:              
        - bearerAuth: []                  
      tags:               
        - Properties        
      summary: Create a property
      produces:
      - application/json
      requestBody:         
        description: It enable user to create properties
        required: true
        content:
          'application/json': 
            schema:       
              $ref: '#/definitions/createProperty' 
      responses:         
        200:
          description: Object of create property
  /product/{address}/{chainId}:
    get:                 
      security:              
        - bearerAuth: []   
      tags:               
        - Properties      
      summary: Retrieve a property
      produces:
      - application/json
      parameters:         
      - in: path          
        name: address     
        description: address to retrieve the property
        required: true
      - in: path          
        name: chainId     
        description: chainId corresponding to the address
        required: true
        schema:       
          $ref: '#/definitions/fetchProperty' 
      responses:         
        200:
          description: Retrieve a property
  /product/update:
    put:    
      security:              
        - bearerAuth: []                
      tags:               
        - Product        
      summary: Update a property
      produces:
      - application/json
      requestBody:         
        description: It enable user to update a property
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/updateProperty' 
      responses:         
        200:
          description: Retrieve a updated property
  /product/transferOwnership:
    post:              
      security:              
        - bearerAuth: []      
      tags:               
        - Properties        
      summary: Transfer ownership
      produces:
      - application/json
      requestBody:         
        description: It enable user to transfer ownership
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/transferOwnership' 
      responses:         
        200:
          description: indicates success of transfer ownership

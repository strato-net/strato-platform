paths:
  /USDST/:
    get:
      security:
        - bearerAuth: []
      tags:
        - USDST
      summary: Retrieve USDST
      produces:
        - application/json
      responses:
        200:
          description: Array of USDST
    post:
      security:
        - bearerAuth: []
      tags:
        - USDST
      summary: Create a USDST
      produces:
        - application/json
      requestBody:
        description: It enables user to create USDST
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/definitions/createUSDST'
      responses:
        200:
          description: Object of create USDST

definitions:
  createUSDST:
    type: object
    properties:
      machineArgs:
        type: object
        properties:
          serialNumber:
            type: string
          name:
            type: string
          description:
            type: string
          quantity:
            type: number
          images:
            type: array
            items:
              type: string
          price:
            type: number
          paymentTypes:
            type: array
            items:
              type: number

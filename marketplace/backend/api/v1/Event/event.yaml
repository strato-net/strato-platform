paths:
  /event/:
    get:
      security:              
        - bearerAuth: []                    
      tags:               
        - Event        
      summary: Retrieve event
      produces:
      - application/json
      responses:         
        200:
          description: Array of events
    post:  
      security:              
        - bearerAuth: []                  
      tags:               
        - Event        
      summary: Create a event
      produces:
      - application/json
      requestBody:         
        description: It enable user to create event
        required: true
        content:
          'application/json': 
            schema:       
              $ref: '#/definitions/createEvent' 
      responses:         
        200:
          description: Object of create event
  /event/{address}/{chainId}:
    get:                 
      security:              
        - bearerAuth: []   
      tags:               
        - Event        
      summary: Retrieve a event
      produces:
      - application/json
      parameters:         
      - in: path          
        name: address     
        description: address to retrieve the event
        required: true
      - in: path          
        name: chainId     
        description: chainId corresponding to the address
        required: true
        schema:       
          $ref: '#/definitions/fetchEvent' 
      responses:         
        200:
          description: Retrieve a event
  /event/update:
    put:    
      security:              
        - bearerAuth: []                
      tags:               
        - Event        
      summary: Update a event
      produces:
      - application/json
      requestBody:         
        description: It enable user to update a event
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/updateEvent' 
      responses:         
        200:
          description: Retrieve a updated event
  /event/{address}/{chainId}/audit:
    get:     
      security:              
        - bearerAuth: []               
      tags:               
        - Event        
      summary: Audit event
      produces:
      - application/json
      parameters:         
      - in: path          
        name: address     
        description: address to retrieve the event
        required: true
      - in: path          
        name: chainId     
        description: chainId corresponding to the address
        required: true
        schema:       
          $ref: '#/definitions/auditEvent' 
      responses:         
        200:
          description: List of audit
  /event/transferOwnership:
    post:              
      security:              
        - bearerAuth: []      
      tags:               
        - Event        
      summary: Transfer ownership
      produces:
      - application/json
      requestBody:         
        description: It enable user to transfer ownership
        required: true
        content:
          'application/json':
            schema:       
              $ref: '#/definitions/transferOwnership' 
      responses:         
        200:
          description: indicates success of transfer ownership
definitions:        
  fetchEvent:
    address:
      type: string
    chainId:
      type: string
  createEvent:
    type: object
    properties:
      machineArgs:
        type: object
        properties:
          eventTypeId:
            type: string
          itemSerialNumber:
            type: string
          itemNFTAddress:
            type: string
          date:
            type: string
          inventoryId:
            type: string
          productId:
            type: string
          summary:
            type: string
          certifiedBy:
            type: string
          certifiedDate:
            type: string
          createdAt:
            type: string
  updateEvent:
    type: object
    properties:
      address:
        type: string
      chainId:
        type: string
      updates:
        type: object
        properties:
          eventTypeId:
            type: string
          itemSerialNumber:
            type: string
          itemNFTAddress:
            type: string
          date:
            type: string
          inventoryId:
            type: string
          productId:
            type: string
          summary:
            type: string
          certifiedBy:
            type: string
          certifiedDate:
            type: string
          createdAt:
            type: string
  auditEvent:
    address:
      type: string
    chainId:
      type: string
  transferOwnership:
    type: object
    properties:
      address:
        type: string
      chainId:
        type: string
      newOwner:
        type: string
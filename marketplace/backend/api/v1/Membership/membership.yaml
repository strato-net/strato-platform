  createMembership:
    type: object
    properties:
      dappAddress:
        type: string
      membershipArgs:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
          manufacturer:
            type: string
          unitOfMeasurement:
            type: number
          userUniqueMembershipCode:
            type: string
          uniqueMembershipCode:
            type: number
          leastSellableUnit:
            type: number
          imageKey:
            type: string
          isActive:
            type: boolean
          category:
            type: string
          subCategory:
            type: string
          createdDate:
            type: number
          timePeriodInMonths:
            type: number
          additionalInfo:
            type: string
      mebershipServiceArgs:
        type: array
        items:
          type: object
          properties:
            serviceId:
              type: string
            membershipPrice:
              type: number
            discountPrice:
              type: number
            maxQuantity:
              type: number
            createdDate:
              type: number
            isActive:
              type: boolean
      productFileArgs:
        type: array
        items:
          type: object
          properties:
            fileLocation:
              type: string
            fileHash:
              type: string
            fileName:
              type: string
            uploadDate:
              type: number
            createdDate:
              type: number
            section:
              type: string
            type:
              type: string

  /escrow/reward:
    get:
      summary: Get CATA rewards
      description: Retrieves CATA token rewards for the authenticated user. This endpoint requires authentication.
      tags:
        - Escrow
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      responses:
        '200':
          description: CATA rewards information
          content:
            application/json:
              schema:
                type: object
                properties:
                  userAddress:
                    type: string
                    description: Blockchain address of the user
                  totalRewards:
                    type: number
                    description: Total CATA rewards earned by the user
                  availableRewards:
                    type: number
                    description: Available CATA rewards that can be claimed
                  claimedRewards:
                    type: number
                    description: CATA rewards already claimed by the user
                  rewardHistory:
                    type: array
                    description: History of CATA rewards
                    items:
                      type: object
                      properties:
                        amount:
                          type: number
                          description: Amount of the reward
                        timestamp:
                          type: string
                          format: date-time
                          description: Timestamp when the reward was earned
                        source:
                          type: string
                          description: Source of the reward (e.g., staking, referral)
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to access rewards 

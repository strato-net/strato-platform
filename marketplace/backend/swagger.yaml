openapi: 3.0.0
info:
  title: STRATO Mercata Marketplace API
  description: API documentation for the STRATO Mercata Marketplace API
  version: 1.0.0
  contact:
    name: STRATO Mercata
    url: https://stratomercata.com

servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    oauth2:
      type: oauth2
      description: OAuth2 authentication using OpenID Connect
      flows:
        clientCredentials:
          tokenUrl: https://keycloak.blockapps.net/auth/realms/mercata-testnet2/protocol/openid-connect/token
          scopes:
            openid: OpenID Connect scope
            profile: Access to user profile

  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
        status:
          type: integer
          description: HTTP status code
          
    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Indicates if the operation was successful
        message:
          type: string
          description: A message describing the result
          
    Art:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the art item
        serialNumber:
          type: string
          description: Serial number of the art item
        name:
          type: string
          description: Name of the art item
        description:
          type: string
          description: Description of the art item
        decimals:
          type: integer
          description: Number of decimal places for the art item
        artist:
          type: string
          description: Artist who created the art item
        images:
          type: array
          description: Array of image URLs for the art item
          items:
            type: string
        files:
          type: array
          description: Array of file URLs for the art item
          items:
            type: string
        fileNames:
          type: array
          description: Array of file names for the art item
          items:
            type: string
        redemptionService:
          type: string
          description: Service used for redeeming the art item
        owner:
          type: string
          description: Current owner of the art item
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the art item
    CarbonDAO:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the carbon DAO
        name:
          type: string
          description: Name of the carbon DAO
        description:
          type: string
          description: Description of the carbon DAO
        quantity:
          type: integer
          description: Quantity of carbon credits represented by this DAO
        decimals:
          type: integer
          description: Number of decimal places for the carbon DAO
        images:
          type: array
          description: Array of image URLs for the carbon DAO
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the carbon DAO
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the carbon DAO
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the carbon DAO
        owner:
          type: string
          description: Current owner of the carbon DAO
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the carbon DAO
    CarbonOffset:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the carbon offset
        name:
          type: string
          description: Name of the carbon offset
        description:
          type: string
          description: Description of the carbon offset
        quantity:
          type: integer
          description: Quantity of carbon credits represented by this offset
        decimals:
          type: integer
          description: Number of decimal places for the carbon offset
        images:
          type: array
          description: Array of image URLs for the carbon offset
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the carbon offset
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the carbon offset
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the carbon offset
        owner:
          type: string
          description: Current owner of the carbon offset
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the carbon offset
    Category:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the category
        name:
          type: string
          description: Name of the category
        description:
          type: string
          description: Description of the category
        imageKey:
          type: string
          description: Key or URL of the category image
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the category
        owner:
          type: string
          description: Current owner of the category
    Clothing:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the clothing item
        name:
          type: string
          description: Name of the clothing item
        description:
          type: string
          description: Description of the clothing item
        clothingType:
          type: string
          description: Type of clothing (e.g., shirt, pants, dress)
        size:
          type: string
          description: Size of the clothing item
        skuNumber:
          type: string
          description: Stock Keeping Unit number for the clothing item
        condition:
          type: string
          description: Condition of the clothing item (e.g., new, used, vintage)
        brand:
          type: string
          description: Brand of the clothing item
        images:
          type: array
          description: Array of image URLs for the clothing item
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the clothing item
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the clothing item
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the clothing item
        quantity:
          type: number
          description: Quantity of the clothing item
        decimals:
          type: integer
          description: Number of decimal places for the clothing item
        owner:
          type: string
          description: Current owner of the clothing item
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the clothing item
    Collectible:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the collectible
        name:
          type: string
          description: Name of the collectible
        description:
          type: string
          description: Description of the collectible
        condition:
          type: string
          description: Condition of the collectible (e.g., mint, near mint, excellent)
        images:
          type: array
          description: Array of image URLs for the collectible
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the collectible
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the collectible
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the collectible
        quantity:
          type: integer
          description: Quantity of the collectible
        decimals:
          type: integer
          description: Number of decimal places for the collectible
        owner:
          type: string
          description: Current owner of the collectible
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the collectible
    Escrow:
      type: object
      properties:
        assetRootAddress:
          type: string
          description: Blockchain address of the asset root
        escrowAddress:
          type: string
          description: Blockchain address of the escrow contract
        status:
          type: string
          description: Current status of the escrow (e.g., active, released, cancelled)
        amount:
          type: number
          description: Amount held in escrow
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the escrow
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp of the escrow
        owner:
          type: string
          description: Current owner of the escrow
    Membership:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the membership
        serialNumber:
          type: string
          description: Optional serial number of the membership
        name:
          type: string
          description: Name of the membership
        description:
          type: string
          description: Description of the membership
        expirationPeriodInMonths:
          type: integer
          minimum: 1
          description: Duration of the membership in months
        quantity:
          type: integer
          minimum: 1
          description: Quantity of membership tokens
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places for the membership token
        images:
          type: array
          description: Array of image URLs for the membership
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the membership
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the membership
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the membership
        owner:
          type: string
          description: Current owner of the membership
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the membership
    Metal:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the metal
        name:
          type: string
          description: Name of the metal
        description:
          type: string
          description: Description of the metal
        source:
          type: string
          description: Source of the metal
        quantity:
          type: integer
          minimum: 1
          description: Quantity of metal
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places for the metal token
        unitOfMeasurement:
          type: integer
          minimum: 0
          maximum: 8
          description: Unit of measurement for the metal (e.g., grams, ounces, etc.)
        purity:
          type: string
          description: Purity level of the metal
        images:
          type: array
          description: Array of image URLs for the metal
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the metal
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the metal
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the metal
        owner:
          type: string
          description: Current owner of the metal
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the metal
    InventoryItem:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the inventory item
        productAddress:
          type: string
          description: Address of the product
        quantity:
          type: integer
          minimum: 0
          description: Quantity of items
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places
        pricePerUnit:
          type: number
          minimum: 0
          description: Price per unit
        batchId:
          type: string
          description: Batch identifier
        status:
          type: integer
          minimum: 1
          maximum: 2
          description: Status of the inventory item (1 = active, 2 = inactive)
        inventoryType:
          type: string
          description: Type of inventory
        serialNumber:
          type: array
          items:
            type: object
            properties:
              itemSerialNumber:
                type: string
                description: Serial number of the item
              rawMaterials:
                type: array
                items:
                  type: object
                  required:
                    - rawMaterialProductName
                    - rawMaterialProductId
                    - rawMaterialSerialNumbers
                  properties:
                    rawMaterialProductName:
                      type: string
                      description: Name of the raw material product
                    rawMaterialProductId:
                      type: string
                      description: ID of the raw material product
                    rawMaterialSerialNumbers:
                      type: array
                      minItems: 1
                      items:
                        type: string
                      description: Array of serial numbers for the raw materials
    Order:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the order
        orderId:
          type: string
          description: Unique identifier for the order
        buyerOrganization:
          type: string
          description: Organization of the buyer
        sellerOrganization:
          type: string
          description: Organization of the seller
        orderDate:
          type: string
          format: date-time
          description: Date when the order was placed
        orderTotal:
          type: number
          description: Total amount of the order
        orderShippingCharges:
          type: number
          description: Shipping charges for the order
        status:
          type: string
          description: Current status of the order
        paymentDate:
          type: string
          format: date-time
          description: Date when the payment was made
        paidBy:
          type: string
          description: Information about who paid for the order
        amountPaid:
          type: number
          description: Amount that has been paid
        fulfillmentDate:
          type: string
          format: date-time
          description: Date when the order was fulfilled
        comments:
          type: string
          description: Comments or notes about the order
        assets:
          type: array
          description: Assets included in this order
          items:
            type: object
            properties:
              assetAddress:
                type: string
                description: Address of the asset
              quantity:
                type: string
                description: Quantity of the asset
              unitPrice:
                type: string
                description: Price per unit of the asset
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the order

    PaymentService:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the payment service
        name:
          type: string
          description: Name of the payment service
        description:
          type: string
          description: Description of the payment service
        serviceName:
          type: string
          description: Type or category of the payment service
        creator:
          type: string
          description: Address of the creator of the payment service
        isActive:
          type: boolean
          description: Whether the payment service is currently active
        isOnboarded:
          type: boolean
          description: Whether the payment service has been onboarded
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the payment service

    Product:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the product
        name:
          type: string
          description: Name of the product
        description:
          type: string
          description: Description of the product
        manufacturer:
          type: string
          description: Manufacturer of the product
        unitOfMeasurement:
          type: integer
          minimum: 1
          maximum: 11
          description: Unit of measurement for the product
        userUniqueProductCode:
          type: string
          description: Unique product code provided by the user
        leastSellableUnit:
          type: number
          description: Smallest unit that can be sold
        imageKey:
          type: string
          description: Key for the product image
        imageUrl:
          type: string
          description: URL for the product image
        isActive:
          type: boolean
          description: Whether the product is active
        category:
          type: string
          description: Category of the product
        subCategory:
          type: string
          description: Subcategory of the product
        owner:
          type: string
          description: Address of the product owner
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the product was created

    ProductCreateRequest:
      type: object
      required:
        - productArgs
      properties:
        productArgs:
          type: object
          required:
            - name
            - description
            - manufacturer
            - unitOfMeasurement
            - userUniqueProductCode
            - leastSellableUnit
            - imageKey
            - isActive
            - category
            - subCategory
          properties:
            name:
              type: string
              description: Name of the product
            description:
              type: string
              description: Description of the product
            manufacturer:
              type: string
              description: Manufacturer of the product
            unitOfMeasurement:
              type: integer
              minimum: 1
              maximum: 11
              description: Unit of measurement for the product
            userUniqueProductCode:
              type: string
              description: Unique product code provided by the user
            leastSellableUnit:
              type: number
              description: Smallest unit that can be sold
            imageKey:
              type: string
              description: Key for the product image
            isActive:
              type: boolean
              description: Whether the product is active
            category:
              type: string
              description: Category of the product
            subCategory:
              type: string
              description: Subcategory of the product

    ProductUpdateRequest:
      type: object
      required:
        - productAddress
        - updates
      properties:
        productAddress:
          type: string
          description: Blockchain address of the product to update
        updates:
          type: object
          properties:
            description:
              type: string
              description: Updated description of the product
            imageKey:
              type: string
              description: Updated key for the product image
            isActive:
              type: boolean
              description: Updated status of the product
            userUniqueProductCode:
              type: string
              description: Updated unique product code
            oldImageKey:
              type: string
              description: Key of the old image to be deleted

    ProductDeleteRequest:
      type: object
      required:
        - productAddress
      properties:
        productAddress:
          type: string
          description: Blockchain address of the product to delete

    ProductListResponse:
      type: object
      properties:
        productsWithImageUrl:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        count:
          type: integer
          description: Total number of products

    Redemption:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the redemption request
        assetAddresses:
          type: array
          items:
            type: string
          description: Array of blockchain addresses of the assets to be redeemed
        assetName:
          type: string
          description: Name of the asset being redeemed
        status:
          type: integer
          minimum: 1
          maximum: 3
          description: Status of the redemption (1 = pending, 2 = approved, 3 = rejected)
        quantity:
          type: integer
          minimum: 1
          description: Quantity of assets being redeemed
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places for the asset
        shippingAddressId:
          type: integer
          description: ID of the shipping address for redemption
        ownerCommonName:
          type: string
          description: Common name of the owner/redeemer
        issuerCommonName:
          type: string
          description: Common name of the issuer
        ownerComments:
          type: string
          description: Comments provided by the owner/redeemer
        issuerComments:
          type: string
          description: Comments provided by the issuer
        redemptionService:
          type: string
          description: Service used for the redemption
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the redemption request was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the redemption request was last updated
        
    RedemptionService:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the redemption service
        name:
          type: string
          description: Name of the redemption service
        description:
          type: string
          description: Description of the redemption service
        isActive:
          type: boolean
          description: Whether the redemption service is active
        owner:
          type: string
          description: Owner of the redemption service
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the redemption service was created
        
    RedemptionRequestPayload:
      type: object
      required:
        - assetAddresses
        - assetName
        - status
        - quantity
        - decimals
        - shippingAddressId
        - ownerCommonName
        - issuerCommonName
      properties:
        assetAddresses:
          type: array
          items:
            type: string
          description: Array of blockchain addresses of the assets to be redeemed
        assetName:
          type: string
          description: Name of the asset being redeemed
        status:
          type: integer
          enum: [1]
          description: Status of the redemption (must be 1 for new requests, indicating pending)
        quantity:
          type: integer
          minimum: 1
          description: Quantity of assets being redeemed
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places for the asset
        shippingAddressId:
          type: integer
          description: ID of the shipping address for redemption
        ownerCommonName:
          type: string
          description: Common name of the owner/redeemer
        issuerCommonName:
          type: string
          description: Common name of the issuer
        ownerComments:
          type: string
          description: Comments provided by the owner/redeemer
        redemptionService:
          type: string
          description: Service used for the redemption
        userAddress:
          type: string
          description: Blockchain address of the user requesting redemption
        
    RedemptionClosePayload:
      type: object
      required:
        - id
        - status
        - issuerCommonName
      properties:
        id:
          type: integer
          description: Unique identifier for the redemption request to close
        assetAddresses:
          type: array
          items:
            type: string
          description: Array of blockchain addresses of the assets being redeemed
        status:
          type: integer
          enum: [2, 3]
          description: New status of the redemption (2 = approved, 3 = rejected)
        issuerComments:
          type: string
          description: Comments provided by the issuer for the approval/rejection
        redemptionService:
          type: string
          description: Service used for the redemption
        issuerCommonName:
          type: string
          description: Common name of the issuer
        redeemerCommonName:
          type: string
          description: Common name of the redeemer
        redeemerAddress:
          type: string
          description: Blockchain address of the redeemer
        assetName:
          type: string
          description: Name of the asset being redeemed
        quantity:
          type: integer
          description: Quantity of assets being redeemed
    
    Spirit:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the spirit
        name:
          type: string
          description: Name of the spirit
        description:
          type: string
          description: Description of the spirit
        spiritType:
          type: string
          description: Type of spirit (e.g., whiskey, vodka, rum)
        quantity:
          type: integer
          minimum: 1
          description: Quantity of spirit
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          description: Number of decimal places for the spirit token
        unitOfMeasurement:
          type: integer
          minimum: 0
          maximum: 8
          description: Unit of measurement for the spirit (e.g., bottles, liters)
        images:
          type: array
          description: Array of image URLs for the spirit
          items:
            type: string
            nullable: true
        files:
          type: array
          description: Array of file URLs for the spirit
          items:
            type: string
            nullable: true
        fileNames:
          type: array
          description: Array of file names for the spirit
          items:
            type: string
            nullable: true
        redemptionService:
          type: string
          description: Service used for redeeming the spirit
        owner:
          type: string
          description: Current owner of the spirit
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the spirit
          
    CreateSpiritRequest:
      type: object
      required:
        - itemArgs
      properties:
        itemArgs:
          type: object
          required:
            - name
            - description
            - quantity
            - decimals
            - spiritType
            - unitOfMeasurement
            - images
            - files
            - fileNames
            - redemptionService
          properties:
            name:
              type: string
              description: Name of the spirit
            description:
              type: string
              description: Description of the spirit
            quantity:
              type: integer
              minimum: 1
              description: Quantity of spirit to create
            decimals:
              type: integer
              minimum: 0
              maximum: 18
              description: Number of decimal places for the spirit token
            spiritType:
              type: string
              description: Type of spirit (e.g., whiskey, vodka, rum)
            unitOfMeasurement:
              type: integer
              minimum: 0
              maximum: 8
              description: Unit of measurement for the spirit (0-8 representing different units)
            images:
              type: array
              items:
                type: string
                nullable: true
              description: Array of image URLs for the spirit
            files:
              type: array
              items:
                type: string
                nullable: true
              description: Array of file URLs for the spirit
            fileNames:
              type: array
              items:
                type: string
                nullable: true
              description: Array of file names for the spirit
            redemptionService:
              type: string
              description: Service used for redeeming the spirit

    Reserve:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the reserve contract
        name:
          type: string
          description: Name of the reserve
        token:
          type: string
          description: Token symbol used by the reserve
        tokenAddress:
          type: string
          description: Blockchain address of the token contract
        status:
          type: integer
          description: Status of the reserve (e.g., active, inactive)
        loanToValueRatio:
          type: number
          format: float
          description: Maximum loan-to-value ratio allowed for borrowing
        interestRate:
          type: number
          format: float
          description: Annual interest rate for loans
        totalStaked:
          type: string
          description: Total amount of collateral staked in the reserve
        totalBorrowed:
          type: string
          description: Total amount borrowed from the reserve
        owner:
          type: string
          description: Owner of the reserve contract
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the reserve was created
          
    StakePayload:
      type: object
      required:
        - collateralQuantity
        - assets
        - reserve
      properties:
        collateralQuantity:
          type: string
          pattern: "^\\d+$"
          description: Quantity of collateral to stake (as a string representation of a number)
        escrowAddress:
          type: string
          description: Optional address of the escrow contract
        assets:
          type: array
          items:
            type: string
          description: Array of asset addresses to be staked as collateral
        reserve:
          type: string
          description: Address of the reserve contract
          
    StakeAfterBridgePayload:
      type: object
      required:
        - stakeQuantity
        - ownerCommonName
        - assetAddress
      properties:
        stakeQuantity:
          type: string
          pattern: "^\\d+$"
          description: Quantity to stake after bridging (as a string representation of a number)
        ownerCommonName:
          type: string
          description: Common name of the owner of the assets
        assetAddress:
          type: string
          description: Address of the asset to stake
          
    UnstakePayload:
      type: object
      required:
        - quantity
        - escrowAddresses
        - reserve
      properties:
        quantity:
          type: string
          pattern: "^\\d+$"
          description: Quantity to unstake (as a string representation of a number)
        escrowAddresses:
          type: array
          items:
            type: string
          description: Array of escrow addresses containing staked assets
        reserve:
          type: string
          description: Address of the reserve contract
          
    BorrowPayload:
      type: object
      required:
        - escrowAddresses
        - borrowAmount
        - reserve
      properties:
        escrowAddresses:
          type: array
          items:
            type: string
          description: Array of escrow addresses to use as collateral
        borrowAmount:
          type: string
          pattern: "^\\d+$"
          description: Amount to borrow (as a string representation of a number)
        reserve:
          type: string
          description: Address of the reserve contract
          
    RepayPayload:
      type: object
      required:
        - escrows
        - reserve
        - value
      properties:
        escrows:
          type: array
          items:
            type: string
          description: Array of escrow addresses for which to repay loans
        reserve:
          type: string
          description: Address of the reserve contract
        value:
          type: string
          pattern: "^\\d+$"
          description: Amount to repay (as a string representation of a number)
          
    OraclePriceResponse:
      type: object
      properties:
        price:
          type: string
          description: Current price provided by the oracle
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the latest price update

    CataRewardsResponse:
      type: object
      properties:
        totalRewards:
          type: string
          description: Total CATA rewards available
        claimableRewards:
          type: string
          description: CATA rewards that can be claimed
        rewardRate:
          type: string
          description: Current reward rate

    SubCategory:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the subcategory
        name:
          type: string
          description: Name of the subcategory
        description:
          type: string
          description: Description of the subcategory
        category:
          type: string
          description: Reference to the parent category
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp of the subcategory
        owner:
          type: string
          description: Current owner of the subcategory

    Token:
      type: object
      properties:
        address:
          type: string
          description: Blockchain address of the token
        name:
          type: string
          description: Name of the token
        description:
          type: string
          description: Description of the token
        quantity:
          type: string
          description: Total quantity of tokens
        decimals:
          type: integer
          description: Number of decimal places for the token
        images:
          type: array
          items:
            type: string
          description: Array of image URLs associated with the token
        files:
          type: array
          items:
            type: string
          description: Array of file URLs associated with the token
        fileNames:
          type: array
          items:
            type: string
          description: Array of file names associated with the token
        redemptionService:
          type: string
          description: Service used for token redemption
        owner:
          type: string
          description: Current owner of the token contract
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the token was created

    Transaction:
      type: object
      properties:
        createdDate:
          type: string
          format: date-time
          description: Creation timestamp of the transaction
        from:
          type: string
          description: Source of the transaction (seller, old owner, etc.)
        to:
          type: string
          description: Destination of the transaction (buyer, new owner, etc.)
        price:
          type: string
          description: Price per unit in the transaction
        totalAmount:
          type: string
          description: Total amount of the transaction
        status:
          type: string
          description: Status of the transaction
        reference:
          type: string
          description: Reference identifier (order ID, transfer number, redemption ID, etc.)
        quantity:
          type: string
          description: Quantity of items in the transaction
        assetName:
          type: string
          description: Name of the asset involved in the transaction
        assetDescription:
          type: string
          description: Description of the asset involved in the transaction
        assetImage:
          type: string
          description: URL of the asset image
        category:
          type: string
          description: Category of the asset
        assetPrice:
          type: number
          description: Price of the asset
        assetAddress:
          type: string
          description: Blockchain address of the asset
        assetOriginAddress:
          type: string
          description: Origin address of the asset
        decimals:
          type: integer
          description: Number of decimal places for the asset
        assetContractName:
          type: string
          description: Name of the asset contract
        transferDate:
          type: string
          format: date-time
          description: Date of transfer (for transfer transactions)
        redemptionDate:
          type: string
          format: date-time
          description: Date of redemption (for redemption transactions)
        orderId:
          type: string
          description: Order identifier (for order transactions)
        transferNumber:
          type: string
          description: Transfer number (for transfer transactions)
        redemption_id:
          type: string
          description: Redemption identifier (for redemption transactions)
        stakeId:
          type: string
          description: Stake identifier (for stake/unstake transactions)

    UserActivity:
      type: object
      properties:
        type:
          type: string
          description: Type of activity (sold, bought, transfer)
          enum: [sold, bought, transfer]
        block_timestamp:
          type: string
          format: date-time
          description: Timestamp when the activity occurred
        orderId:
          type: string
          description: Identifier of the order (for sold and bought activities)
        transaction_hash:
          type: string
          description: Transaction hash on the blockchain
        purchasersCommonName:
          type: string
          description: Common name of the purchaser (for sold activities)
        sellersCommonName:
          type: string
          description: Common name of the seller (for bought activities)
        oldOwnerCommonName:
          type: string
          description: Common name of the previous owner (for transfer activities)
        newOwnerCommonName:
          type: string
          description: Common name of the new owner (for transfer activities)
        status:
          type: integer
          description: Status of the activity (1 for awaiting fulfillment, 3 for closed)
        price:
          type: number
          description: Price of the item involved in the activity
        quantity:
          type: integer
          description: Quantity of items involved in the activity
        assetAddress:
          type: string
          description: Blockchain address of the asset involved in the activity
        assetName:
          type: string
          description: Name of the asset involved in the activity

    Certificate:
      type: object
      properties:
        userAddress:
          type: string
          description: Blockchain address of the user
        commonName:
          type: string
          description: Common name of the user (usually username)
        address:
          type: string
          description: Contract address of the certificate

    UserProfile:
      type: object
      properties:
        userAddress:
          type: string
          description: Blockchain address of the user
        commonName:
          type: string
          description: Common name of the user (usually username)
        address:
          type: string
          description: Contract address of the certificate
        email:
          type: string
          description: Email address of the user from token
        preferred_username:
          type: string
          description: Preferred username from token
        issuerStatus:
          type: string
          description: Status of the user's issuer privileges
          enum:
            - AUTHORIZED
            - UNAUTHORIZED
            - PENDING
        isAdmin:
          type: boolean
          description: Whether the user has admin privileges

# Define global security requirements
security:
  - bearerToken: []
  - oauth2:
      - openid
      - profile

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API server
      security: [] # No authentication required for health check
      responses:
        '200':
          description: Server health status
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - version
                  - timestamp
                properties:
                  name:
                    type: string
                    description: Name of the service
                  description:
                    type: string
                    description: Description of the service
                  version:
                    type: string
                    description: Version of the service
                  timestamp:
                    type: integer
                    description: Current server timestamp
                  deployment:
                    type: string
                    description: Deployment environment

  /authentication/callback:
    get:
      summary: OAuth authentication callback endpoint for debugging purposes only
      description: Handles the OAuth callback after user authentication. This endpoint processes the authorization code, retrieves access and refresh tokens, validates user certificates, and sets authentication cookies. It also creates or retrieves the user's blockchain address and redirects to the home page upon successful authentication.
      tags:
        - Authentication
      security: [] # No authentication required for auth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: The authorization code received from the OAuth provider
      responses:
        '200':
          description: Successful authentication and redirection
        '401':
          description: User does not have a valid certificate in STRATO
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authentication failed or invalid authorization code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authentication/logout:
    post:
      summary: User logout endpoint
      description: Logs out the currently authenticated user by clearing authentication cookies and providing a URL for the OAuth provider's logout endpoint. This endpoint requires a valid authentication token.
      tags:
        - Authentication
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      responses:
        '200':
          description: Successful logout
          content:
            application/json:
              schema:
                type: object
                properties:
                  logoutUrl:
                    type: string
                    description: URL to redirect to for completing the OAuth logout process

  /issuerstatus/requestReview:
    post:
      summary: Request issuer review
      description: Submits a request for an issuer to be reviewed and authorized. This endpoint sends an email notification to all admin users about the request.
      tags:
        - IssuerStatus
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emailAddr
                - commonName
              properties:
                emailAddr:
                  type: string
                  format: email
                  description: Email address of the user requesting issuer status
                commonName:
                  type: string
                  description: Common name of the user requesting issuer status
      responses:
        '200':
          description: Review request submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Bad Gateway - Unable to send email notification
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unable to send request; notify sales@blockapps.net for help"
                  status:
                    type: integer
                    example: 502

  /issuerstatus/authorizeIssuer:
    post:
      summary: Authorize issuer
      description: Grants issuer authorization to a user. This endpoint requires admin privileges.
      tags:
        - IssuerStatus
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
              properties:
                address:
                  type: string
                  description: Blockchain address of the user to be authorized as an issuer
      responses:
        '200':
          description: Issuer authorized successfully
        '400':
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have admin privileges

  /issuerstatus/deauthorizeIssuer:
    post:
      summary: Deauthorize issuer
      description: Revokes issuer authorization from a user. This endpoint requires admin privileges.
      tags:
        - IssuerStatus
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
              properties:
                address:
                  type: string
                  description: Blockchain address of the user to be deauthorized as an issuer
      responses:
        '200':
          description: Issuer deauthorized successfully
        '400':
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have admin privileges

  /issuerstatus/admin:
    post:
      summary: Set admin status
      description: Sets or removes admin privileges for a user. This endpoint requires admin privileges.
      tags:
        - IssuerStatus
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - isAdmin
              properties:
                address:
                  type: string
                  description: Blockchain address of the user to set admin status
                isAdmin:
                  type: boolean
                  description: Whether to grant (true) or revoke (false) admin privileges
      responses:
        '200':
          description: Admin status updated successfully
        '400':
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have admin privileges

  /users/me:
    get:
      summary: Get current user profile
      description: Retrieves the profile of the authenticated user with details from their token and blockchain certificate. Protected by authentication middleware (requires authentication) and uses the loadDapp middleware to access blockchain data.
      tags:
        - Users
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Bad Request - User not found in blockchain
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: Username that could not be found
        '401':
          description: Unauthorized - User is not authenticated
        '500':
          description: Internal Server Error - Failed to retrieve user profile

  /users/{address}:
    get:
      summary: Get user by address
      description: Retrieves a user's certificate by their blockchain address. Protected by authentication middleware and uses the loadDapp middleware to access blockchain data.
      tags:
        - Users
      parameters:
        - name: address
          in: path
          required: true
          description: Blockchain address of the user to retrieve
          schema:
            type: string
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          description: Not Found - User with specified address not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                    description: Address that could not be found
        '401':
          description: Unauthorized - User is not authenticated
        '500':
          description: Internal Server Error - Failed to retrieve user

  /users:
    get:
      summary: Get all users
      description: Retrieves certificates for all users. Parameters can be passed in query string to filter results. Protected by authentication middleware and uses the loadDapp middleware to access blockchain data.
      tags:
        - Users
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: Number of users to skip for pagination
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Certificate'
        '401':
          description: Unauthorized - User is not authenticated
        '500':
          description: Internal Server Error - Failed to retrieve users

  /category:
    get:
      summary: Get all categories
      description: Retrieves a list of all categories in the system. This endpoint requires authentication.
      tags:
        - Category
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to access categories

  /category/{address}:
    get:
      summary: Get category by address
      description: Retrieves a specific category by its blockchain address. This endpoint requires authentication.
      tags:
        - Category
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      parameters:
        - name: address
          in: path
          description: Blockchain address of the category
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to access this category
        '404':
          description: Not Found - Category with the specified address does not exist

  /category/{address}/{chainId}/audit:
    get:
      summary: Audit category
      description: Retrieves audit information for a specific category. This endpoint requires authentication.
      tags:
        - Category
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      parameters:
        - name: address
          in: path
          description: Blockchain address of the category
          required: true
          schema:
            type: string
        - name: chainId
          in: path
          description: Chain ID of the blockchain where the category is deployed
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category audit information
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                    description: Blockchain address of the category
                  chainId:
                    type: string
                    description: Chain ID of the blockchain
                  auditLog:
                    type: array
                    description: List of audit events
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: string
                          format: date-time
                          description: Timestamp of the audit event
                        event:
                          type: string
                          description: Type of audit event
                        details:
                          type: object
                          description: Details of the audit event
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to audit this category
        '404':
          description: Not Found - Category with the specified address does not exist

  /category/transferOwnership:
    post:
      summary: Transfer category ownership
      description: Transfers ownership of a category to a new owner. This endpoint requires authentication.
      tags:
        - Category
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - newOwner
              properties:
                address:
                  type: string
                  description: Blockchain address of the category
                newOwner:
                  type: string
                  description: Blockchain address of the new owner
      responses:
        '200':
          description: Ownership transferred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates if the ownership transfer was successful
                  message:
                    type: string
                    description: Message describing the result of the operation
        '400':
          description: Bad Request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to transfer ownership of this category
        '404':
          description: Not Found - Category with the specified address does not exist

  /subcategory:
    get:
      summary: Get all subcategories
      description: Retrieves a list of all subcategories filtered by optional category parameter. Protected by authentication middleware and uses the loadDapp middleware to access blockchain data.
      tags:
        - SubCategory
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      parameters:
        - name: category
          in: query
          required: false
          description: Filter subcategories by category name. Can be a single value or comma-separated list.
          schema:
            type: string
      responses:
        '200':
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubCategory'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to access subcategories
        '500':
          description: Internal Server Error - Failed to retrieve subcategories
    post:
      summary: Create subcategory
      description: Creates a new subcategory under a specified category. Requires authentication and loadDapp middleware.
      tags:
        - SubCategory
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryAddress
                - name
                - description
              properties:
                categoryAddress:
                  type: string
                  description: Blockchain address of the parent category
                name:
                  type: string
                  description: Name of the new subcategory
                description:
                  type: string
                  description: Description of the new subcategory
      responses:
        '200':
          description: Subcategory created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubCategory'
        '400':
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to create subcategories
        '500':
          description: Internal Server Error - Failed to create subcategory

  /subcategory/{address}:
    get:
      summary: Get subcategory by address
      description: Retrieves a specific subcategory by its blockchain address. Protected by authentication middleware and uses loadDapp middleware.
      tags:
        - SubCategory
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      parameters:
        - name: address
          in: path
          required: true
          description: Blockchain address of the subcategory
          schema:
            type: string
      responses:
        '200':
          description: Subcategory details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubCategory'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to view this subcategory
        '404':
          description: Not Found - Subcategory with specified address does not exist
        '500':
          description: Internal Server Error - Failed to retrieve subcategory

  /subcategory/update:
    put:
      summary: Update subcategory
      description: Updates an existing subcategory's properties. Requires authentication and loadDapp middleware.
      tags:
        - SubCategory
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryAddress
                - subCategoryAddress
                - updates
              properties:
                categoryAddress:
                  type: string
                  description: Blockchain address of the parent category
                subCategoryAddress:
                  type: string
                  description: Blockchain address of the subcategory to update
                updates:
                  type: object
                  required:
                    - name
                    - description
                  properties:
                    name:
                      type: string
                      description: New name for the subcategory
                    description:
                      type: string
                      description: New description for the subcategory
      responses:
        '200':
          description: Subcategory updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubCategory'
        '400':
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '403':
          description: Forbidden - User does not have permission to update this subcategory
        '404':
          description: Not Found - Subcategory with specified address does not exist
        '500':
          description: Internal Server Error - Failed to update subcategory

  /subcategory/{address}/{chainId}/audit:
    get:
      summary: Audit subcategory

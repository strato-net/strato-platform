  /order/payment:
    post:
      summary: Process order payment
      description: Processes a payment for an order and sends an email confirmation if the payment is successful. Protected by authentication middleware and uses the loadDapp middleware to access blockchain data.
      tags:
        - Order
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentService
                - buyerOrganization
                - orderList
                - orderTotal
                - tax
                - user
                - htmlContents
              properties:
                paymentService:
                  type: object
                  required:
                    - address
                    - serviceName
                  properties:
                    address:
                      type: string
                      description: Blockchain address of the payment service
                    serviceName:
                      type: string
                      description: Name of the payment service
                buyerOrganization:
                  type: string
                  description: Organization of the buyer
                orderList:
                  type: array
                  minItems: 1
                  description: List of items being ordered
                  items:
                    type: object
                    required:
                      - quantity
                      - decimals
                      - assetAddress
                      - firstSale
                      - unitPrice
                    properties:
                      quantity:
                        type: string
                        pattern: "^\\d+$"
                        description: Quantity of the asset being ordered
                      decimals:
                        type: integer
                        minimum: 0
                        maximum: 18
                        description: Number of decimal places for the asset
                      assetAddress:
                        type: string
                        description: Blockchain address of the asset
                      firstSale:
                        type: boolean
                        description: Whether this is the first sale of the asset
                      unitPrice:
                        type: string
                        pattern: "^\\d+(\\.\\d+)?$"
                        description: Price per unit of the asset
                orderTotal:
                  type: number
                  description: Total amount of the order
                tax:
                  type: number
                  description: Tax amount for the order
                user:
                  type: string
                  description: User email or identifier for email notifications
                htmlContents:
                  type: array
                  description: HTML content for the email confirmation
                  items:
                    type: string
      responses:
        '200':
          description: Payment processed successfully
          content:
            application/json:
              schema:
                type: array
                description: Result data with checkout hash and assets
                items:
                  type: object
        '400':
          description: Bad Request - Invalid payment parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - User is not authenticated
        '500':
          description: Internal Server Error - Error processing payment


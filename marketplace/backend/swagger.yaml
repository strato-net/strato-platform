            type: integer
        - name: offset
          in: query
          description: Number of items to skip
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  inventoriesWithImageUrl:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryItem'
                  count:
                    type: integer
                    description: Total number of inventory items
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    post:
      summary: Create a new inventory item
      description: Creates a new inventory item with the provided details
      security:
        - bearerToken: []
        - oauth2:
            - openid
            - profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productAddress
                - quantity
                - decimals
                - pricePerUnit
                - batchId
                - status
                - inventoryType
              properties:
                productAddress:
                  type: string
                  description: Address of the product
                quantity:
                  type: integer
                  minimum: 0
                  description: Quantity of items
                decimals:
                  type: integer
                  minimum: 0
                  maximum: 18
                  description: Number of decimal places
                pricePerUnit:
                  type: number
                  minimum: 0
                  description: Price per unit
                batchId:
                  type: string
                  description: Batch identifier
                status:
                  type: integer
                  minimum: 1
                  maximum: 2
                  description: Status of the inventory item (1 = active, 2 = inactive)
                inventoryType:
                  type: string
                  description: Type of inventory
                serialNumber:
                  type: array
                  items:
                    type: object
                    properties:
                      itemSerialNumber:
                        type: string
                        description: Serial number of the item
                      rawMaterials:
                        type: array
                        items:
                          type: object
                          required:
                            - rawMaterialProductName
                            - rawMaterialProductId
                            - rawMaterialSerialNumbers
                          properties:
                            rawMaterialProductName:
                              type: string
                              description: Name of the raw material product
                            rawMaterialProductId:
                              type: string
                              description: ID of the raw material product
                            rawMaterialSerialNumbers:
                              type: array
                              minItems: 1
                              items:
                                type: string
                              description: Array of serial numbers for the raw materials
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error


#vault-version:<VERSION>
#strato-getting-started-min-version:4.0
version: "3"
volumes:
  idpconfig:
      driver: local
services:
  identity-provider:
    environment:
    - IDENTITYPROVIDER_DEBUG=${IDENTITYPROVIDER_DEBUG}
    - identityProviderPort=${identityProviderPort}
    - vaultProxyUrl=${vaultProxyUrl}
    - nodeUrl=${nodeUrl}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_MASTER_CLIENT_ID=${OAUTH_MASTER_CLIENT_ID}
    - OAUTH_MASTER_CLIENT_SECRET=${OAUTH_MASTER_CLIENT_SECRET}
    - PROCESS_MONITORING=${PROCESS_MONITORING}
    - VAULT_PROXY_DEBUG=${VAULT_PROXY_DEBUG}
    - VAULT_URL=${VAULT_URL}
    build: .
    image: ${IDENTTIYPROVIDER_IMAGE:-<REPO_URL>identity-provider:<VERSION>}
    restart: unless-stopped
    volumes: 
      - ./rootCert.pem:/identity-provider/rootCert.pem:ro
      - ./rootPriv.pem:/identity-provider/rootPriv.pem:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
  nginx:
    depends_on:
    - identity-provider
    environment:
    # TODO: investigate why these are needed (referenced in docker-run.sh to update lua template
    # ...but what is nginx using these vaules for??)
    - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
    - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}
    - OAUTH_SCOPE=${OAUTH_SCOPE}
    - ssl=${ssl}
    - sslCertFileType=${sslCertFileType}
    - IDENTITY_PROVIDER_HOSTNAME=${IDENTITY_PROVIDER_HOSTNAME}
    - IDENTITY_PORT_VAULT_PROXY=${IDENTITY_PORT_VAULT_PROXY}
    build: .
    image: ${IDENTITYNGINX_IMAGE:-<REPO_URL>identity-nginx:<VERSION>}
    ports:
    - ${HTTP_PORT:-8000}:80 #TAG_REMOVE_WHEN_SSL_CUSTOM_HTTPS_PORT
    - ${HTTPS_PORT:-8001}:443 #TAG_REMOVE_WHEN_NO_SSL
    volumes:
    - ./ssl:/tmp/ssl:ro
    - idpconfig:/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
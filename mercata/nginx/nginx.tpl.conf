user root;
worker_processes  1;

error_log  /usr/local/openresty/nginx/logs/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 10000;
}

http {
    include       mime.types;

    default_type  application/octet-stream;

    real_ip_recursive on;
    real_ip_header X-Forwarded-For;
    # Set the CIDRs of the trusted proxy if you run your node behind one. Allowing all IPs is a security risk (attacker can spoof IPs by setting a random one in X-Forwarded-For).
    # Cloudflare CIDRs below: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"msec":"$msec",'
        '"remote_addr":"$remote_addr",'
        '"X-Forwarded-For":"$http_x_forwarded_for",'
        '"CF-Connecting-IP":"$http_cf_connecting_ip",'
        '"request_method":"$request_method",'
        '"request":"$request",'
        '"status": "$status",'
        '"request_time":"$request_time",'
        '"request_length":"$request_length",'
        '"bytes_sent":"$bytes_sent",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referrer":"$http_referer",'
        '"remote_user":"$remote_user",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time"'
      '}';

    map $request_uri $loggable {
        default   1;
        /metrics  0;
        /_ping    0;
    }

    access_log  /usr/local/openresty/nginx/logs/access.log  json_combined if=$loggable;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_shared_dict  discovery 1m;
    lua_shared_dict  jwks 1m;
    lua_shared_dict introspection 10m;

    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;         #TEMPLATE_MARK_SSL
    lua_ssl_verify_depth 5;                                                 #TEMPLATE_MARK_SSL

    client_body_buffer_size 64K;
    client_header_buffer_size 16k;
    client_max_body_size 4M;

    absolute_redirect off;

    # Exclude the docker network CIDR from rate limiting (e.g. for marketplace-backend calls to nginx)
    geo $bypass_limit {
      default   0;
      __DOCKER_NETWORK_CIDR__   1;
    }
    map $bypass_limit $limit_req_key {
        1   "";
        default   $binary_remote_addr;
    }

    limit_req_zone $limit_req_key zone=server:10m rate=80r/s; # E.g. allows 8 calls within 10ms
    limit_req_status 429;

    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=strato_short_term_cache:1m max_size=5m inactive=1s use_temp_path=off;

    upstream backend {
        server __BACKEND_HOST__:3001;
    }
    upstream ui {
        server __UI_HOST__:8080;
    }
    # Legacy frontend:
    #upstream frontend {
    #    server __FRONTEND_HOST__:3000;
    #}

    server {
      listen 80;
      listen 443 ssl;                                                       #TEMPLATE_MARK_SSL

      ssl_certificate    /etc/ssl/certs/server.pem;        #TEMPLATE_MARK_SSL
      ssl_certificate_key  /etc/ssl/private/server.key;                     #TEMPLATE_MARK_SSL
                                                                            #TEMPLATE_MARK_SSL
      # Restrict older SSL and TLS versions for better security             #TEMPLATE_MARK_SSL
      ssl_protocols TLSv1.2 TLSv1.3;                                        #TEMPLATE_MARK_SSL
                                                                            #TEMPLATE_MARK_SSL
      # Redirect http traffic to https, except internal calls to 'nginx'    #TEMPLATE_MARK_SSL
      set $RWHTTPS "";                                                      #TEMPLATE_MARK_SSL
      if ($ssl_protocol = "") {                                             #TEMPLATE_MARK_SSL
        set $RWHTTPS "Y";                                                   #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL
      if ($host = "nginx") {                                                #TEMPLATE_MARK_SSL
        set $RWHTTPS "";                                                    #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL
      if ($RWHTTPS = "Y") {                                                 #TEMPLATE_MARK_SSL
        rewrite ^ https://$host$request_uri? permanent;                     #TEMPLATE_MARK_SSL
      }                                                                     #TEMPLATE_MARK_SSL

      set $session_name   mercata_session;
      # set $session_secret <SESSION_SECRET>;
      set $ssl_session_tickets off;
      set $session_check_ssi off;
      set $session_cookie_persistent on;
      set $session_cookie_renew 600;
      set $session_cookie_lifetime 2592000;

      resolver 127.0.0.11 8.8.8.8 ipv6=off;

      limit_req zone=server burst=100; # E.g. adds minor delays when exceeding 8 calls within 10ms

      large_client_header_buffers 4 16k;

      set $is_ui "false";
      set $allow_optional_anon_access "false";

      location /_ping {
        return 200 'pong';
      }

      location /auth/openidc/return {
        rewrite_by_lua_file  lua/openid.lua;
      }

      location /auth/logout {
        rewrite_by_lua_file  lua/openid.lua;
      }
     
      location /login {
        set $is_ui "true";
        rewrite_by_lua_file  lua/openid.lua;
        access_by_lua_block {return ngx.redirect('/', 302)}
      }
     
      location / {
        set $is_ui "true";
        proxy_set_header Accept-Encoding "";
        proxy_pass http://ui/;
      }
      
      location /vite-hmr {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_pass http://ui/vite-hmr;
      }
      
      # Legacy frontend:
      #location / {
      #  set $is_ui "true";
      #  rewrite_by_lua_file  lua/openid.lua; # TODO: To be removed when the anonymous mode is added in the UI
      #  proxy_set_header Accept-Encoding "";
      #  proxy_pass http://frontend/;
      #}
      #location /_next/webpack-hmr {
      #  proxy_set_header Upgrade $http_upgrade;
      #  proxy_set_header Connection "upgrade";
      #  proxy_http_version 1.1;
      #  proxy_pass http://frontend/_next/webpack-hmr;
      #}

      location = /api/v1 {
        return 302 /api/v1/;
      }
            
      location /api/ {
        rewrite_by_lua_file lua/openid.lua;
        set $allow_optional_anon_access "true";
        proxy_set_header Accept-Encoding "";
        proxy_pass http://backend$request_uri;
        client_max_body_size 1m;
      }

    }
}
